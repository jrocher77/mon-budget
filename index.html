                <div style={{ display:"flex", gap:8 }}>
                  <button onClick={saveExpense} style={{ flex:2, padding:"9px", borderRadius:8, background:"linear-gradient(135deg,var(--gold-light),var(--gold))", border:"none", color:"#0e0f13", fontSize:13, fontWeight:700 }}>✓ {editingExp ? "Modifier" : "Ajouter"}</button>
                  <button onClick={()=>{setAddingExp(false);setEditingExp(null);setExpTitle("");setExpAmount("");setExpDate(new Date().toISOString().split("T")[0]);}} style={{ flex:1, padding:"9px", borderRadius:8, background:"var(--surface3)", border:"1px solid var(--border)", color:"var(--text-muted)", fontSize:13 }}>Annuler</button>
                </div>
              </div>
            )}

            {!addingExp && (
              <div style={{ padding:"10px 14px 14px", borderTop: monthExp.length > 0 ? "1px solid var(--border)" : "none" }}>
                <button onClick={()=>{setAddingExp(true);setEditingExp(null);setExpTitle("");setExpAmount("");setExpDate(new Date().toISOString().split("T")[0]);}}
                  style={{ width:"100%", padding:"9px", borderRadius:"var(--radius-sm)", background:"rgba(201,168,76,0.06)", border:"1px dashed rgba(201,168,76,0.4)", color:"var(--gold)", fontSize:13, fontWeight:600, display:"flex", alignItems:"center", justifyContent:"center", gap:6 }}>
                  <span style={{ fontSize:15 }}>＋</span> Ajouter une dépense
                </button>
              </div>
            )}
          </div>

          {/* Carry-over info */}
          {(() => {
            const nextMk = (() => { const [y,m]=sel.split("-").map(Number); const nm=m===12?1:m+1; const ny=m===12?y+1:y; return `${ny}-${String(nm).padStart(2,'0')}`; })();
            const remaining = allotted + carryOver - totalExp;
            if (remaining <= 0) return null;
            return (
              <div style={{ display:"flex", gap:10, padding:"10px 14px", background:"rgba(76,175,130,0.08)", border:"1px solid rgba(76,175,130,0.2)", borderRadius:"var(--radius-sm)", alignItems:"center" }}>
                <span style={{ fontSize:16 }}>↩</span>
                <p style={{ fontSize:12, color:"var(--green)", lineHeight:1.5 }}>
                  <strong>{fmtEur(remaining)}</strong> seront automatiquement reportés sur {new Date(nextMk+"-02T00:00:00").toLocaleDateString("fr-FR",{month:"long",year:"numeric"})}.
                </p>
              </div>
            );
          })()}

        </div>

      {/* Delete expense confirm */}
      {deletingExp && (
        <div style={{ position:"fixed", inset:0, zIndex:400, background:"rgba(0,0,0,0.7)", backdropFilter:"blur(6px)", display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}
          onClick={e=>e.target===e.currentTarget&&setDeletingExp(null)}>
          <div className="scale-in" style={{ width:"100%", maxWidth:400, background:"var(--surface)", borderRadius:"var(--radius)", border:"1px solid var(--border)", padding:24 }}>
            <p style={S.modalTitle}>Supprimer la dépense</p>
            <p style={{ fontSize:14, color:"var(--text-muted)", marginBottom:20, lineHeight:1.6 }}>
              Voulez-vous supprimer « {deletingExp.title} » ({fmtEur(deletingExp.amount)}) ?
            </p>
            <div style={S.gap10}>
              <button onClick={()=>setDeletingExp(null)} style={{ flex:1, padding:"10px", borderRadius:"var(--radius-sm)", background:"var(--surface2)", border:"1px solid var(--border)", color:"var(--text)", fontSize:14, fontWeight:600 }}>Annuler</button>
              <button onClick={()=>{store.removeBenefitExpense(account.id,deletingExp.id);setDeletingExp(null);}} style={{ flex:1, padding:"10px", borderRadius:"var(--radius-sm)", background:"var(--red)", border:"none", color:"#fff", fontSize:14, fontWeight:600 }}>Supprimer</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Dashboard ─────────────────────────────────────────────────────────────
// SavingsBalanceRow : ligne de solde d'un compte épargne.
// Reçoit accountRowSize ("compact"|"normal"|"large") et applique ACCOUNT_ROW_SIZES
// à la fois sur le padding, le nom du compte ET le montant affiché/éditable.
function SavingsBalanceRow({ account, balance, store, accountRowSize }) {
  const [editing, setEditing] = useState(false);
  const [draft,   setDraft]   = useState("");
  const inputRef = useRef(null);

  const startEdit = () => {
    setDraft((account.balance || 0).toString());
    setEditing(true);
    setTimeout(() => { inputRef.current?.select(); }, 0);
  };

  const commit = () => {
    const val = parseFloat(draft.replace(",", "."));
    if (!isNaN(val)) store.updateAccount(account.id, { balance: val });
    setEditing(false);
  };

  const onKeyDown = (e) => {
    if (e.key === "Enter")  commit();
    if (e.key === "Escape") setEditing(false);
  };

  const rs = ACCOUNT_ROW_SIZES[accountRowSize] || ACCOUNT_ROW_SIZES.normal;
  return (
    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:rs.padding, background:"var(--surface2)", borderRadius:"var(--radius-sm)" }}>
      <div style={S.flexRow8}>
        <span style={{ fontSize:rs.nameSize, fontWeight:500 }}>{account.name}</span>
        <span style={{ fontSize:10, fontWeight:600, padding:"2px 6px", borderRadius:6, background:account.savingsSubtype==="blocked"?"var(--red-dim)":"var(--green-dim)", color:account.savingsSubtype==="blocked"?"var(--red)":"var(--green)" }}>
          {account.savingsSubtype==="blocked"?"🔒 Bloquée":"✓ Disponible"}
        </span>
      </div>
      {editing ? (
        <div style={{ display:"flex", alignItems:"center", gap:6 }}>
          <input ref={inputRef} type="number" step="0.01" value={draft} onChange={e=>setDraft(e.target.value)} onBlur={commit} onKeyDown={onKeyDown}
            inputMode="decimal"
            style={{ width:110, fontSize:rs.nameSize, fontWeight:700, fontFamily:"'DM Serif Display',serif", textAlign:"right",
              padding:"3px 8px", borderRadius:6, border:"1px solid var(--gold)", background:"var(--bg)", color:"var(--gold)",
              outline:"none" }} />
          <button onMouseDown={e=>{e.preventDefault();commit();}}
            style={{ background:"var(--gold-dim)", border:"none", borderRadius:6, width:24, height:24, color:"var(--gold)", fontSize:13, flexShrink:0, cursor:"pointer" }}>✓</button>
        </div>
      ) : (
        <span onClick={startEdit} title="Cliquer pour modifier"
          style={{ fontSize:rs.nameSize, fontWeight:700, fontFamily:"'DM Serif Display',serif", color:balance>=0?"var(--green)":"var(--red)",
            cursor:"pointer", borderBottom:"1px dashed", borderColor:"transparent",
            transition:"border-color 0.15s" }}
          onMouseEnter={e=>e.currentTarget.style.borderColor="currentColor"}
          onMouseLeave={e=>e.currentTarget.style.borderColor="transparent"}>
          {fmtEur(balance)}
        </span>
      )}
    </div>
  );
}

function SynthCardPanel({ entry, sourceTxs, clickedTxId, setClickedTxId, store, onEdit, onDelete }) {
  const LIMIT = 1000;
  const [showAll, setShowAll] = useState(false);
  const sortedTxs = [...sourceTxs].sort((a, b) => b.date.localeCompare(a.date));
  const unpointed = sortedTxs.filter(t => !t.pointed);
  const pointed   = sortedTxs.filter(t =>  t.pointed);
  const visible   = showAll ? sortedTxs : unpointed.slice(0, LIMIT);
  return (
    <div className="fade-up" style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:"var(--radius)", overflow:"hidden" }}>
      <div style={{ display:"flex", alignItems:"center", gap:10, padding:"12px 16px", background:"var(--surface2)", borderBottom:"1px solid var(--border)" }}>
        <span style={{ fontSize:18 }}>💳</span>
        <div style={S.flex1}>
          <p style={S.fs13fw600}>Prélèvement {entry.cardName}</p>
          <p style={{ fontSize:11, color:"var(--text-muted)" }}>Dépenses de {entry.sourceMonthName} · prélevé le {fmtDate(entry.debitDateStr)}</p>
        </div>
        <p style={{ fontSize:15, fontWeight:700, color: entry.total >= 0 ? "var(--red)" : "var(--green)" }}>{entry.total >= 0 ? "−" : "+"}{fmtEur(Math.abs(entry.total))}</p>
      </div>
      {visible.map((tx, i) => (
        <div key={tx.id}>
          {i > 0 && <div style={{ height:1, background:"var(--border)", margin:"0 16px" }} />}
          <TxRow
            tx={tx}
            isCard
            deletable
            clicked={clickedTxId === tx.id}
            onToggleClicked={id => setClickedTxId(clickedTxId === id ? null : id)}
            onTogglePointed={() => store.togglePointed(tx.id)}
            onEdit={() => onEdit(tx)}
            onDelete={() => onDelete(tx)}
            delay={i * 0.04}
          />
        </div>
      ))}
      {pointed.length > 0 && (
        <button onClick={() => setShowAll(p => !p)}
          style={{ width:"100%", padding:"9px 16px", background:"var(--surface2)", border:"none", borderTop:"1px solid var(--border)", color:"var(--text-muted)", fontSize:12, fontWeight:600, cursor:"pointer", textAlign:"center" }}>
          {showAll ? "▲ Voir moins" : `▼ Voir les ${pointed.length} autre${pointed.length > 1 ? "s" : ""} dépense${pointed.length > 1 ? "s" : ""}`}
        </button>
      )}
    </div>
  );
}

function Dashboard({ store, onAdd, onGoSavings, onGoCheckingStats, onResetRef, accountRowSize }) {
  const [sel,              setSel]            = useState(nowMKey());
  const [selectedAccountId,setSelectedAccount] = useState("all");
  const [editingTx,        setEditingTx]      = useState(null);
  const [deletingTx,       setDeletingTx]     = useState(null);
  const [clickedTxId,      setClickedTxId]    = useState(null);
  const [cardFormAccount,  setCardFormAccount] = useState(null); // accountId for card add form
  const [benefitAccount,   setBenefitAccount] = useState(null); // account shown in BenefitPage

  // Register reset function so TabBar can reset to home view
  useEffect(() => { if (onResetRef) onResetRef.current = () => { setSelectedAccount("all"); setSel(nowMKey()); setBenefitAccount(null); }; }, [onResetRef]);
  // Benefit accounts + current month balance for header button
  const benefitAccounts = store.accounts.filter(a => a.type === "benefit");


  const months = useMemo(() => {
    const today = new Date();
    const Y = today.getFullYear(), M = today.getMonth();
    const fmt = (y,m) => `${y}-${String(m+1).padStart(2,'0')}`;
    const result = [];
    // Always show the previous month if it still has non-deferred transactions —
    // regardless of autoCleanup/cleanupDay, because cleanup may have been blocked.
    const pm = M===0?11:M-1, py = M===0?Y-1:Y;
    const pk = fmt(py,pm);
    const cdd = store.cardDebitDates;
    const currentKey = fmt(Y,M);
    const hasNonDeferredTx = store.transactions.some(t => {
      if (mKey(t.date) !== pk) return false;
      if (t.isCard && t.accountId) {
        const debitDate = cdd[t.accountId]?.[mKey(t.date)];
        if (debitDate && mKey(debitDate) >= currentKey) return false;
      }
      return true;
    });
    if (hasNonDeferredTx) result.push(pk);
    result.push(fmt(Y,M));
    const m1=M===11?0:M+1, y1=M===11?Y+1:Y;
    result.push(fmt(y1,m1));
    const m2=m1===11?0:m1+1, y2=m1===11?y1+1:y1;
    result.push(fmt(y2,m2));
    return result;
  }, [store.transactions, store.cardDebitDates]);

  // Helper: get next month key
  const nextMonthKey = (mk) => {
    const [y, m] = mk.split("-").map(Number);
    const nm = m === 12 ? 1 : m + 1;
    const ny = m === 12 ? y + 1 : y;
    return `${ny}-${String(nm).padStart(2,'0')}`;
  };

  // Separate card transactions from account transactions
  const allTxM = store.transactions.filter(t => mKey(t.date) === sel && (selectedAccountId==="all" || t.accountId === selectedAccountId));
  // Regular (non-card) transactions for the selected month/account
  const txM    = allTxM.filter(t => !t.isCard).sort((a, b) => b.date.localeCompare(a.date));
  // For income/expense display totals: include everything (vision globale)
  const balance = txM.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0)
                - txM.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);

  // For a specific account: get its card info
  const selAcct  = store.accounts.find(a=>a.id===selectedAccountId);
  const hasCard  = selAcct?.type==="checking" && selAcct?.cardName;
  const isSavings = selAcct?.type==="savings";

  // Card transactions for selected account + month
  const cardTxM = hasCard
    ? store.transactions.filter(t => t.isCard && t.accountId === selectedAccountId && mKey(t.date) === sel)
        .sort((a, b) => b.date.localeCompare(a.date))
    : [];
  const cardTotal = cardTxM.reduce((s,t) => s + (t.type==="expense" ? t.amount : -t.amount), 0);

  // Card debit date for this account + month
  const cardDebitDate = hasCard
    ? (store.cardDebitDates[selectedAccountId]?.[sel] || "")
    : "";
  // Determine if card debit is next month
  const isDebitNextMonth = cardDebitDate && mKey(cardDebitDate) !== sel;
  const debitMonthName = cardDebitDate
    ? new Date(cardDebitDate + "T00:00:00").toLocaleDateString("fr-FR", { month: "long" })
    : "";

  // Balance always includes card total (deducted in the month expenses occur)
  const balanceWithCard = balance - cardTotal;

  // Check if a synthetic "Prélèvement carte" transaction should appear for this month
  // (i.e., previous month had card transactions with debit date in THIS month)
  const synthCardEntries = useMemo(() => {
    if (selectedAccountId === "all") return [];
    const acct = store.accounts.find(a=>a.id===selectedAccountId);
    if (!acct?.cardName) return [];
    // Look at previous month's card debit dates for this account
    const entries = [];
    // Check all months to see if any debit date falls in 'sel'
    const cdd = store.cardDebitDates[selectedAccountId] || {};
    Object.entries(cdd).forEach(([sourceMk, debitDateStr]) => {
      if (!debitDateStr) return;
      if (mKey(debitDateStr) === sel && sourceMk !== sel) {
        // This month's display should show a synthesis line from sourceMk
        const sourceTxs = store.transactions.filter(t => t.isCard && t.accountId === selectedAccountId && mKey(t.date) === sourceMk);
        const total = sourceTxs.reduce((s,t) => s + (t.type==="expense" ? t.amount : -t.amount), 0);
        if (sourceTxs.length > 0) {
          const sourceMonthName = new Date(sourceMk + "-02T00:00:00").toLocaleDateString("fr-FR", { month: "long", year: "numeric" });
          entries.push({ sourceMk, debitDateStr, total, sourceMonthName, cardName: acct.cardName });
        }
      }
    });
    return entries;
  }, [store.transactions, store.cardDebitDates, store.accounts, selectedAccountId, sel]);

  // synthCardEntries impact the balance of the month where the debit actually occurs
  const synthTotal = synthCardEntries.reduce((s,e) => s + e.total, 0);
  const displayBalance = balanceWithCard - synthTotal;

  // Solde pointé : uniquement les transactions pointées du mois
  const pointedBalance = useMemo(() => {
    const ptxM = store.transactions.filter(t =>
      !t.isCard &&
      t.accountId === selectedAccountId &&
      mKey(t.date) === sel &&
      t.pointed
    );
    const ptBal = ptxM.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0)
                - ptxM.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
    const ptCard = (hasCard
      ? store.transactions.filter(t => t.isCard && t.accountId === selectedAccountId && mKey(t.date) === sel && t.pointed)
      : []).reduce((s,t) => s + (t.type==="expense" ? t.amount : -t.amount), 0);
    return ptBal - ptCard - synthTotal;
  }, [store.transactions, selectedAccountId, sel, hasCard, synthTotal]);

  // Solde pointé sans carte du mois courant, mais avec les prélèvements carte
  // des mois précédents dont la date de débit est passée ou aujourd'hui.
  const pointedNoCardBalance = useMemo(() => {
    const today = nowMKey(); // "YYYY-MM" du jour
    const todayStr = new Date().toISOString().slice(0, 10); // "YYYY-MM-DD"

    // Transactions pointées du mois, hors carte
    const ptxM = store.transactions.filter(t =>
      !t.isCard &&
      t.accountId === selectedAccountId &&
      mKey(t.date) === sel &&
      t.pointed
    );
    const ptBal = ptxM.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0)
                - ptxM.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);

    // Prélèvements carte de mois précédents dont la date de débit tombe dans
    // le mois affiché (sel) ET est déjà passée ou aujourd'hui
    const cdd = store.cardDebitDates[selectedAccountId] || {};
    let pastSynthTotal = 0;
    Object.entries(cdd).forEach(([sourceMk, debitDateStr]) => {
      if (!debitDateStr) return;
      if (mKey(debitDateStr) === sel && sourceMk !== sel && debitDateStr <= todayStr) {
        const sourceTxs = store.transactions.filter(t =>
          t.isCard && t.accountId === selectedAccountId && mKey(t.date) === sourceMk
        );
        pastSynthTotal += sourceTxs.reduce((s,t) => s + (t.type==="expense" ? t.amount : -t.amount), 0);
      }
    });

    return ptBal - pastSynthTotal;
  }, [store.transactions, store.cardDebitDates, selectedAccountId, sel]);

  // Income/expense display totals: include all transactions + synth card debits

  const expns  = allTxM.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0) + Math.max(0, synthTotal);
  const synthIncome = Math.max(0, -synthTotal); // crédit carte différé (solde positif)
  const income = allTxM.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0) + synthIncome;

  const nextMk = nextMonthKey(sel);
  const nextMonthName = new Date(nextMk + "-02T00:00:00").toLocaleDateString("fr-FR", { month: "long", year: "numeric" });

  // Transfer balance:
  // - Prélèvement carte ce mois-ci → carte déjà soldée → on transfère displayBalance (carte déduite)
  // - Prélèvement carte mois suivant → la ligne synthèse est déjà en nextMk → on transfère AVANT déduction carte
  const cardDebitInNextMonth = hasCard && cardDebitDate && mKey(cardDebitDate) === nextMk;
  const transferBalance = cardDebitInNextMonth ? balance : displayBalance;

  // Check if a transfer transaction already exists for this account+month combo
  const TRANSFER_TAG = "__transfer__";
  const transferExists = selectedAccountId !== "all" && store.transactions.some(
    t => t.accountId === selectedAccountId && t._transferFrom === sel
  );

  const [showTransferConfirm,   setShowTransferConfirm]   = useState(false);
  const [showUnpointedWarning,  setShowUnpointedWarning]  = useState(false);
  const [balanceView, setBalanceView] = useState(0); // 0=complet 1=pointé sans carte
  // Réinitialiser le cycle solde à chaque changement de compte / mois
  useEffect(() => { setBalanceView(0); }, [selectedAccountId, sel]);

  // Transactions du mois source non-pointées (hors carte et hors reports)
  const unpointedTxs = useMemo(() => {
    if (selectedAccountId === "all") return [];
    return store.transactions.filter(t =>
      t.accountId === selectedAccountId &&
      mKey(t.date) === sel &&
      !t._transferFrom &&
      !t.pointed
    );
  }, [store.transactions, selectedAccountId, sel]);

  const accountBalances = useMemo(() => {
    if (selectedAccountId!=="all") return { checking:[], savings:[] };
    const checking=[], savings=[];
    store.accounts.forEach(acc => {
      if (acc.type==="checking") {
        const at=store.transactions.filter(t=>mKey(t.date)===sel&&t.accountId===acc.id&&!t.isCard);
        const inc=at.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
        const exp=at.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
        // Card expenses always deducted in the month they occur
        const cardExp = acc.cardName
          ? store.transactions.filter(t=>t.isCard&&t.accountId===acc.id&&mKey(t.date)===sel)
              .reduce((s,t)=>s+(t.type==="expense"?t.amount:-t.amount),0)
          : 0;
        // Also subtract synth card debits falling in this month (from previous month's card expenses)
        const acctCdd = store.cardDebitDates[acc.id] || {};
        const acctSynth = Object.entries(acctCdd).reduce((s,[mk,ds]) => {
          if (!ds || mKey(ds)!==sel || mk===sel) return s;
          const txs = store.transactions.filter(t=>t.isCard&&t.accountId===acc.id&&mKey(t.date)===mk);
          return s + txs.reduce((ss,t)=>ss+(t.type==="expense"?t.amount:-t.amount),0);
        }, 0);
        checking.push({account:acc, balance: inc-exp - cardExp - acctSynth });
      } else if (acc.type === "savings") {
        savings.push({account:acc,balance:acc.balance||0});
      }
    });
    return {checking,savings};
  }, [store.transactions,store.accounts,store.cardDebitDates,sel,selectedAccountId]);

  const checkingBalance = accountBalances.checking.reduce((s,a)=>s+a.balance,0);
  const savingsBalance  = accountBalances.savings.reduce((s,a)=>s+a.balance,0);
  const parity   = isEven(sel) ? "even" : "odd";
  const acctTpl  = (store.templates[selectedAccountId] || emptyAcctTpl());
  const hasTpl   = acctTpl[parity].items.length > 0;
  const applied  = selectedAccountId!=="all" && store.transactions.some(t=>t._tpl===sel&&t.accountId===selectedAccountId);

  const handleTransfer = () => {
    // Remove any existing transfer from this month for this account
    const existing = store.transactions.find(t => t.accountId === selectedAccountId && t._transferFrom === sel);
    if (existing) store.remove(existing.id);
    // Create new transfer transaction in next month
    const day = "01";
    store.add({
      title: `Solde reporté`,
      amount: Math.round(Math.abs(transferBalance) * 100) / 100,
      type: transferBalance >= 0 ? "income" : "expense",
      accountId: selectedAccountId,
      date: nextMk + "-" + day,
      note: `Report du solde de ${new Date(sel + "-02T00:00:00").toLocaleDateString("fr-FR", { month: "long", year: "numeric" })}`,
      _transferFrom: sel,
    });
    setShowTransferConfirm(false);
  };

  return (
    <div>
      {benefitAccount && (
        <BenefitPage store={store} account={benefitAccount} onClose={()=>setBenefitAccount(null)} />
      )}
      {!benefitAccount && <>
      {selectedAccountId==="all"
        ? <PageHeader title="Mes Finances" />
        : <div style={{ position:"sticky", top:0, zIndex:50, display:"flex", alignItems:"center", gap:12, padding:"8px 16px", borderBottom:"1px solid var(--border)", background:"var(--header-bg)", backdropFilter:"blur(20px)" }}>
            <button onClick={()=>setSelectedAccount("all")} style={{ background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:8, padding:"4px 10px", height:30, color:"var(--header-muted)", fontSize:13, fontWeight:500, display:"flex", alignItems:"center", justifyContent:"center", gap:4, flexShrink:0 }}>← Retour</button>
            <p style={{ fontFamily:"'DM Serif Display',serif", fontSize:18, letterSpacing:"-0.02em", color:"var(--header-text)", flex:1, margin:0 }}>
              {store.accounts.find(a=>a.id===selectedAccountId)?.name || "Compte"}
            </p>
          </div>
      }
      <div style={{ padding:"16px", display:"flex", flexDirection:"column", gap:14 }}>

        {/* Month tabs */}
        <MonthTabs months={months} selected={sel} onSelect={setSel} />



        {/* Parity + template */}
        {selectedAccountId!=="all" && !isSavings && (
          <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
            <span style={{ fontSize:11, fontWeight:600, padding:"3px 10px", borderRadius:20, background:isEven(sel)?"var(--gold-dim)":"var(--green-dim)", color:isEven(sel)?"var(--gold)":"var(--green)", border:`1px solid ${isEven(sel)?"var(--gold)":"var(--green)"}` }}>Mois {isEven(sel)?"pair":"impair"}</span>
            {hasTpl && !applied && <button onClick={()=>store.applyTemplate(sel,selectedAccountId)} style={{ fontSize:11, fontWeight:600, padding:"3px 10px", borderRadius:20, background:"var(--gold-dim)", border:"1px solid var(--gold)", color:"var(--gold)" }}>↓ Appliquer le modèle</button>}
            {applied && <span style={{ fontSize:11, color:"var(--text-sub)" }}>✓ Modèle appliqué</span>}
          </div>
        )}

        {/* Balance card (individual account) */}
        {selectedAccountId!=="all" && (() => {
          const VIEWS = [
            { bal: displayBalance,        label: `Solde ${selAcct?.name||""} prévu`, sub: "toutes opérations",                       dot: "○" },
            { bal: pointedNoCardBalance,  label: `Solde ${selAcct?.name||""} réel`,  sub: "hors non pointées + carte mois en cours", dot: "◎" },
          ];
          const view      = VIEWS[balanceView];
          const shownBal  = view.bal;
          const isPos     = shownBal >= 0;
          const bgGrad    = isPos ? "linear-gradient(135deg,#1e2a1e,#162216)" : "linear-gradient(135deg,#2a1e1e,#221616)";
          const borderClr = isPos ? "rgba(76,175,130,0.3)" : "rgba(224,92,92,0.3)";
          const amtClr    = isPos ? "#4caf82" : "#e05c5c";
          const glowClr   = isPos ? "rgba(76,175,130,0.06)" : "rgba(224,92,92,0.06)";
          const titles    = ["Afficher le solde pointé sans carte", "Afficher le solde complet"];
          return (
          <div className="fade-up" style={{ background:bgGrad, border:`1px solid ${borderClr}`, borderRadius:"var(--radius)", padding:"16px", position:"relative", overflow:"hidden" }}>
            <div style={{ position:"absolute", top:-15, right:-15, width:80, height:80, borderRadius:"50%", background:glowClr }} />
            <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", gap:12 }}>
              <div
                onClick={() => !isSavings && setBalanceView(v => (v + 1) % 2)}
                title={!isSavings ? titles[balanceView] : undefined}
                style={{ cursor: isSavings ? "default" : "pointer", userSelect:"none" }}>
                <p style={{ fontSize:11, fontWeight:500, color:"rgba(240,236,228,0.5)", letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:6, display:"flex", alignItems:"center", gap:6 }}>
                  {view.label}
                  {!isSavings && <span style={{ fontSize:10, opacity:0.5, fontWeight:400 }}>{view.dot}</span>}
                </p>
                <p style={{ fontFamily:"'DM Serif Display',serif", fontSize:28, color:amtClr, letterSpacing:"-0.02em", transition:"color 0.2s" }}>{fmtEur(shownBal)}</p>
                {!isSavings && (
                  <p style={{ fontSize:10, color:"rgba(240,236,228,0.35)", marginTop:3, fontWeight:400 }}>
                    {view.sub}
                  </p>
                )}
              </div>
              {!isSavings && sel <= nowMKey() && (
                <button
                  onClick={() => unpointedTxs.length > 0 ? setShowUnpointedWarning(true) : setShowTransferConfirm(true)}
                  title={`Reporter le solde vers ${nextMonthName}`}
                  style={{ flexShrink:0, marginTop:2, padding:"6px 11px", borderRadius:8,
                    background: transferExists ? "rgba(201,168,76,0.15)" : "rgba(255,255,255,0.07)",
                    border: transferExists ? "1px solid rgba(201,168,76,0.5)" : "1px solid rgba(255,255,255,0.15)",
                    color: transferExists ? "var(--gold)" : "rgba(240,236,228,0.6)",
                    fontSize:12, fontWeight:600, cursor:"pointer", whiteSpace:"nowrap",
                    display:"flex", alignItems:"center", gap:5 }}>
                  <span style={{ fontSize:14 }}>→</span>
                  {transferExists ? "Reporté ✓" : nextMonthName.split(" ")[0]}
                </button>
              )}
            </div>
          </div>
          );
        })()}

        {/* All accounts breakdown */}
        {selectedAccountId==="all" && (accountBalances.checking.length>0||accountBalances.savings.length>0) && (
          <div className="fade-up" style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:"var(--radius)", padding:16, animationDelay:"0.05s" }}>
            {accountBalances.checking.length>0 && <>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 }}>
                <div style={S.flexRow10}><span style={{ fontSize:24 }}>💳</span><p style={{ fontSize:14, fontWeight:600, color:"var(--text)", letterSpacing:"0.04em", textTransform:"uppercase" }}>Comptes courants</p></div>
                <p style={{ fontSize:22, fontWeight:700, fontFamily:"'DM Serif Display',serif", color:checkingBalance>=0?"var(--green)":"var(--red)" }}>{fmtEur(checkingBalance)}</p>
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:8, marginBottom:8 }}>
                {accountBalances.checking.map(({account,balance})=>{
                  const rs = ACCOUNT_ROW_SIZES[accountRowSize] || ACCOUNT_ROW_SIZES.normal;
                  return (
                  <div key={account.id} onClick={()=>setSelectedAccount(account.id)} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:rs.padding, background:"var(--surface2)", borderRadius:"var(--radius-sm)", cursor:"pointer", transition:"background 0.15s" }}
                    onMouseEnter={e=>e.currentTarget.style.background="var(--surface3)"}
                    onMouseLeave={e=>e.currentTarget.style.background="var(--surface2)"}>
                    <div style={S.flexRow8}>
                      <span style={{ fontSize:rs.nameSize, fontWeight:500 }}>{account.name}</span>
                      {account.cardName && <span style={{ fontSize:10, padding:"1px 6px", borderRadius:4, background:"rgba(201,168,76,0.12)", color:"var(--gold)", fontWeight:600, border:"1px solid rgba(201,168,76,0.25)" }}>💳 {account.cardName}</span>}
                    </div>
                    <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                      <span style={{ fontSize:rs.nameSize, fontWeight:700, fontFamily:"'DM Serif Display',serif", color:balance>=0?"var(--green)":"var(--red)" }}>{fmtEur(balance)}</span>
                      <span style={{ fontSize:12, color:"var(--text-sub)" }}>›</span>
                    </div>
                  </div>
                  );
                })}
              </div>
              <button onClick={onGoCheckingStats} style={{ width:"100%", padding:"9px", borderRadius:"var(--radius-sm)", background:"rgba(76,175,130,0.06)", border:"1px dashed rgba(76,175,130,0.4)", color:"var(--green)", fontSize:13, fontWeight:600, display:"flex", alignItems:"center", justifyContent:"center", gap:6 }}>
                <span style={{ fontSize:15 }}>📊</span> Statistiques comptes courants
              </button>
            </>}
            {accountBalances.savings.length>0 && <>
              {accountBalances.checking.length>0 && <div style={{ height:1, background:"var(--border)", margin:"16px 0" }} />}
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 }}>
                <div style={S.flexRow10}><span style={{ fontSize:24 }}>💰</span><p style={{ fontSize:14, fontWeight:600, color:"var(--text)", letterSpacing:"0.04em", textTransform:"uppercase" }}>Comptes épargne</p></div>
                <div style={S.flexRow8}>
                  <p style={{ fontSize:22, fontWeight:700, fontFamily:"'DM Serif Display',serif", color:savingsBalance>=0?"var(--green)":"var(--red)" }}>{fmtEur(savingsBalance)}</p>
                </div>
              </div>
              <div style={S.flexCol8}>
                {accountBalances.savings.map(({account,balance})=>(
                  <SavingsBalanceRow key={account.id} account={account} balance={balance} store={store} accountRowSize={accountRowSize} />
                ))}
              </div>
              <button onClick={onGoSavings} style={{ width:"100%", padding:"9px", marginTop:8, borderRadius:"var(--radius-sm)", background:"rgba(201,168,76,0.06)", border:"1px dashed rgba(201,168,76,0.4)", color:"var(--gold)", fontSize:13, fontWeight:600, display:"flex", alignItems:"center", justifyContent:"center", gap:6 }}>
                <span style={{ fontSize:15 }}>📈</span> Statistiques épargne
              </button>
            </>}
            {benefitAccounts.length>0 && <>
              {(accountBalances.checking.length>0||accountBalances.savings.length>0) && <div style={{ height:1, background:"var(--border)", margin:"16px 0" }} />}
              <div style={{ display:"flex", alignItems:"center", marginBottom:12 }}>
                <div style={S.flexRow10}><span style={{ fontSize:24 }}>🎫</span><p style={{ fontSize:14, fontWeight:600, color:"var(--text)", letterSpacing:"0.04em", textTransform:"uppercase" }}>Avantages</p></div>
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                {benefitAccounts.map(acc => {
                  const bd = store.benefitData[acc.id] || { allotments:{}, expenses:[] };
                  const carry    = computeCarryOver(bd, sel);
                  const allotted = allotmentAmount(bd.allotments?.[sel]);
                  const exp      = (bd.expenses||[]).filter(e=>mKey(e.date)===sel).reduce((s,e)=>s+e.amount,0);
                  const available = carry + allotted - exp;
                  const rs = ACCOUNT_ROW_SIZES[accountRowSize] || ACCOUNT_ROW_SIZES.normal;
                  return (
                    <div key={acc.id} onClick={()=>setBenefitAccount(acc)}
                      style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:rs.padding, background:"var(--surface2)", borderRadius:"var(--radius-sm)", cursor:"pointer", transition:"background 0.15s" }}
                      onMouseEnter={e=>e.currentTarget.style.background="var(--surface3)"}
                      onMouseLeave={e=>e.currentTarget.style.background="var(--surface2)"}>
                      <span style={{ fontSize:rs.nameSize, fontWeight:500 }}>{acc.name}</span>
                      <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                        <span style={{ fontSize:rs.nameSize, fontWeight:700, fontFamily:"'DM Serif Display',serif", color:available>=0?"var(--green)":"var(--red)" }}>{fmtEur(available)}</span>
                        <span style={{ fontSize:12, color:"var(--text-sub)" }}>›</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            </>}
          </div>
        )}

        {/* Income / Expense — affiché APRÈS le solde en vue compte individuel */}
        {selectedAccountId!=="all" && (
          <div className="fade-up" style={S.grid2col10}>
            {[{label:"Revenus",val:income,color:"var(--green)",bg:"var(--green-dim)",icon:"↓"},{label:"Dépenses",val:expns,color:"var(--red)",bg:"var(--red-dim)",icon:"↑"}].map(c=>(
              <div key={c.label} style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:"var(--radius)", padding:"16px" }}>
                <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:8 }}>
                  <span style={{ width:26,height:26, borderRadius:8, background:c.bg, display:"flex", alignItems:"center", justifyContent:"center", fontSize:14, color:c.color, fontWeight:700 }}>{c.icon}</span>
                  <span style={{ fontSize:12, color:"var(--text-muted)", fontWeight:500 }}>{c.label}</span>
                </div>
                <p style={{ fontFamily:"'DM Serif Display',serif", fontSize:22, color:c.color }}>{fmtEur(c.val)}</p>
              </div>
            ))}
          </div>
        )}

        {/* ─── Carte à débit différé panel ─── */}
        {hasCard && (
          <CardPanel
            account={selAcct}
            sel={sel}
            cardTxM={cardTxM}
            cardTotal={cardTotal}
            cardDebitDate={cardDebitDate}
            isDebitNextMonth={isDebitNextMonth}
            debitMonthName={debitMonthName}
            store={store}
            onAddCard={() => setCardFormAccount(selectedAccountId)}
            onEditTx={tx => setEditingTx(tx)}
            onDeleteTx={tx => setDeletingTx(tx)}
            clickedTxId={clickedTxId}
            setClickedTxId={setClickedTxId}
          />
        )}

        {/* ─── Synthetic card debit entries (from previous month) ─── */}
        {synthCardEntries.map(entry => (
          <SynthCardPanel
            key={entry.sourceMk}
            entry={entry}
            sourceTxs={store.transactions.filter(t => t.isCard && t.accountId === selectedAccountId && mKey(t.date) === entry.sourceMk)}
            clickedTxId={clickedTxId}
            setClickedTxId={setClickedTxId}
            store={store}
            onEdit={tx => setEditingTx(tx)}
            onDelete={tx => setDeletingTx(tx)}
          />
        ))}

        {/* Recent (non-card) — masqué en vue globale, visible uniquement par compte */}
        {selectedAccountId!=="all" && (
          <div className="fade-up">
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10 }}>
              <p style={{ fontSize:11, fontWeight:600, color:"var(--text-sub)", letterSpacing:"0.06em", textTransform:"uppercase" }}>Récents</p>
              <button onClick={()=>onAdd(selectedAccountId, sel)} style={{ background:"none", border:"none", color:"var(--gold)", fontSize:13, fontWeight:600, padding:0, cursor:"pointer" }}>+ Ajouter</button>
            </div>
            {txM.length===0 ? <EmptyState text="Aucune transaction ce mois-ci" />
              : <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:"var(--radius)", overflow:"hidden" }}>
                  {txM.slice(0,15).map((tx,i)=>(
                    <div key={tx.id}>
                      {i>0&&<div style={{ height:1, background:"var(--border)", margin:"0 16px" }} />}
                      <TxRow tx={tx} deletable clicked={clickedTxId===tx.id} onToggleClicked={id=>setClickedTxId(clickedTxId===id?null:id)} onDelete={()=>setDeletingTx(tx)} onEdit={()=>setEditingTx(tx)} onTogglePointed={()=>store.togglePointed(tx.id)} delay={i*0.04} />
                    </div>
                  ))}
                </div>}
          </div>
        )}
      </div>

      {editingTx && <FormModal store={store} transaction={editingTx} sel={sel} onClose={()=>setEditingTx(null)} />}
      {deletingTx && <DeleteModal tx={deletingTx} onCancel={()=>setDeletingTx(null)} onConfirm={()=>{store.remove(deletingTx.id);setDeletingTx(null);}} />}
      {cardFormAccount && <FormModal store={store} account={cardFormAccount} isCardTransaction sel={sel} onClose={()=>setCardFormAccount(null)} />}
      </>}

      {/* Unpointed transactions warning modal */}
      {showUnpointedWarning && (
        <div style={S.overlay}
          onClick={e=>e.target===e.currentTarget&&setShowUnpointedWarning(false)}>
          <div className="scale-in" style={{ width:"100%", maxWidth:400, background:"var(--surface)", borderRadius:"var(--radius)", border:"1px solid rgba(224,92,92,0.4)", padding:24 }}>
            <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12 }}>
              <span style={{ fontSize:22 }}>⚠️</span>
              <p style={{ fontSize:18, fontWeight:600, color:"var(--red)" }}>Report impossible</p>
            </div>
            <p style={{ fontSize:13, color:"var(--text-muted)", lineHeight:1.7, marginBottom:8 }}>
              <strong style={{ color:"var(--text)" }}>{unpointedTxs.length} transaction{unpointedTxs.length > 1 ? "s" : ""}</strong> du mois de <strong style={{ color:"var(--text)" }}>{new Date(sel+"-02T00:00:00").toLocaleDateString("fr-FR",{month:"long",year:"numeric"})}</strong> {unpointedTxs.length > 1 ? "ne sont pas pointées" : "n'est pas pointée"}.
            </p>
            <p style={{ fontSize:13, color:"var(--text-muted)", lineHeight:1.7, marginBottom:20 }}>
              Pointez toutes les transactions du mois avant de reporter le solde.
            </p>
            <div style={{ background:"var(--surface2)", borderRadius:"var(--radius-sm)", padding:"10px 12px", marginBottom:20, maxHeight:160, overflowY:"auto" }}>
              {unpointedTxs.map((t,i) => (
                <div key={t.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"5px 0", borderBottom: i<unpointedTxs.length-1?"1px solid var(--border)":"none" }}>
                  <span style={{ fontSize:12, color:"var(--text-sub)" }}>{t.title}</span>
                  <span style={{ fontSize:12, fontWeight:600, color:t.type==="income"?"var(--green)":"var(--red)" }}>{t.type==="income"?"+":"-"}{fmtEur(t.amount)}</span>
                </div>
              ))}
            </div>
            <button onClick={()=>setShowUnpointedWarning(false)} style={{ width:"100%", padding:"10px", borderRadius:"var(--radius-sm)", background:"var(--surface2)", border:"1px solid var(--border)", color:"var(--text)", fontSize:14, fontWeight:600, cursor:"pointer" }}>Fermer</button>
          </div>
        </div>
      )}

      {/* Transfer confirmation modal */}
      {showTransferConfirm && (
        <div style={S.overlay}
          onClick={e=>e.target===e.currentTarget&&setShowTransferConfirm(false)}>
          <div className="scale-in" style={{ width:"100%", maxWidth:400, background:"var(--surface)", borderRadius:"var(--radius)", border:"1px solid var(--border)", padding:24 }}>
            <p style={{ fontSize:18, fontWeight:600, marginBottom:8 }}>Reporter le solde</p>
            <p style={{ fontSize:13, color:"var(--text-muted)", marginBottom:20, lineHeight:1.6 }}>
              Une transaction <strong style={{ color: transferBalance>=0 ? "var(--green)" : "var(--red)" }}>
                {transferBalance >= 0 ? "revenu" : "dépense"} de {fmtEur(Math.abs(transferBalance))}
              </strong> sera créée le 1er {nextMonthName} sur le compte <strong>{selAcct?.name}</strong>.
              {transferExists && <span style={{ display:"block", marginTop:8, color:"var(--gold)", fontSize:12 }}>⚠️ Un report existe déjà pour ce mois — il sera remplacé.</span>}
            </p>
            <div style={S.gap10}>
              <button onClick={()=>setShowTransferConfirm(false)} style={{ flex:1, padding:"10px", borderRadius:"var(--radius-sm)", background:"var(--surface2)", border:"1px solid var(--border)", color:"var(--text)", fontSize:14, fontWeight:600 }}>Annuler</button>
              <button onClick={handleTransfer} style={{ flex:2, padding:"10px", borderRadius:"var(--radius-sm)", background:"linear-gradient(135deg,var(--gold-light),var(--gold))", border:"none", color:"#0e0f13", fontSize:14, fontWeight:700 }}>→ Confirmer le report</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Transactions ──────────────────────────────────────────────────────────
function Transactions({ store, onAdd }) {
  const [search,        setSearch]      = useState("");
  const [filterType,    setFilter]      = useState("all");
  const [filterAccount, setFilterAcct]  = useState("all");
  const [editingTx,     setEditingTx]   = useState(null);
  const [deletingTx,    setDeletingTx]  = useState(null);
  const [clickedTxId,   setClickedTxId] = useState(null);

  const filtered = useMemo(()=>store.transactions.filter(t=>{
    // Exclude transactions belonging to benefit accounts
    const acct = store.accounts.find(a => a.id === t.accountId);
    if (acct?.type === "benefit") return false;
    const q=search.toLowerCase().trim();
    if (q) {
      const matchTitle  = t.title.toLowerCase().includes(q);
      const matchNote   = (t.note||"").toLowerCase().includes(q);
      const matchAmount = String(t.amount).includes(q) || fmtEur(t.amount).toLowerCase().includes(q);
      const dateFr = t.date ? t.date.split("-").reverse().join("/") : "";
      const matchDate   = (t.date||"").includes(q) || dateFr.includes(q);
      if (!matchTitle && !matchNote && !matchAmount && !matchDate) return false;
    }
    if (filterAccount !== "all" && t.accountId !== filterAccount) return false;
    if (!store.showFutureTx && !search.trim()) {
      // Masquer les transactions futures (date strictement > aujourd'hui)
      const today = new Date(); today.setHours(0,0,0,0);
      const txDate = new Date(t.date + "T00:00:00");
      if (txDate > today) return false;
    }
    if (filterType==="card") return !!t.isCard;
    if (filterType==="all") return true;
    return t.type===filterType && !t.isCard;
  }),[store.transactions,search,filterType,filterAccount,store.showFutureTx]);

  const grouped = useMemo(()=>{
    const map={};
    filtered.forEach(tx=>{if(!map[tx.date])map[tx.date]=[];map[tx.date].push(tx);});
    return Object.entries(map).sort((a,b)=>b[0].localeCompare(a[0]));
  },[filtered]);

  const hasAnyCard = store.accounts.some(a => a.cardName);
  const checkingAccounts = store.accounts.filter(a => a.type === "checking");

  return (
    <div>
      <PageHeader title="Transactions" />
      <div style={{ padding:"12px 16px 0" }}>
        {/* Type filters */}
        <div style={{ display:"flex", gap:6, overflowX:"auto", paddingBottom:2, marginBottom:8 }}>
          {[["all","Tout"],["expense","Dépenses"],["income","Revenus"], ...(hasAnyCard ? [["card","💳 Carte"]] : [])].map(([v,l])=>(
            <button key={v} onClick={()=>setFilter(v)} style={{ flexShrink:0, padding:"6px 14px", borderRadius:20, border:"1px solid", borderColor:filterType===v?"var(--gold)":"var(--border)", background:filterType===v?"var(--gold-dim)":"var(--surface2)", color:filterType===v?"var(--gold)":"var(--text-muted)", fontSize:13, fontWeight:600, transition:"all 0.2s" }}>{l}</button>
          ))}
        </div>
        {/* Account filters */}
        {checkingAccounts.length > 1 && (
          <div style={{ marginBottom:8 }}>
            <select
              value={filterAccount}
              onChange={e=>setFilterAcct(e.target.value)}
              style={{ width:"100%", padding:"7px 12px", borderRadius:"var(--radius-sm)", border:"1px solid", borderColor:filterAccount!=="all"?"var(--gold)":"var(--border)", background:"var(--surface2)", color:filterAccount!=="all"?"var(--gold)":"var(--text-muted)", fontSize:13, fontWeight:600, appearance:"auto" }}
            >
              <option value="all">📊 Tous les comptes</option>
              {checkingAccounts.map(acc=>(
                <option key={acc.id} value={acc.id}>💳 {acc.name}</option>
              ))}
            </select>
          </div>
        )}
        {/* Search bar */}
        <div style={{ display:"flex", alignItems:"center", gap:8, background:"var(--surface)", border:"1px solid var(--border)", borderRadius:"var(--radius-sm)", padding:"9px 14px", marginBottom:0 }}>
          <span style={{ color:"var(--text-muted)", fontSize:16 }}>⌕</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Titre, montant, date, note…" style={{ flex:1, fontSize:14, color:"var(--text)", background:"transparent" }} />
          {search && <button onClick={()=>setSearch("")} style={{ background:"none", border:"none", color:"var(--text-muted)", fontSize:16, cursor:"pointer", padding:0, lineHeight:1 }}>✕</button>}
        </div>
      </div>
      <div style={{ padding:"12px 16px 16px" }}>
        {grouped.length===0 ? <EmptyState text="Aucune transaction trouvée" />
          : grouped.map(([date,txs], gi)=>(
            <div key={date} className="slide-in">
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", margin:"14px 0 6px 4px" }}>
                <p style={{ fontSize:11, fontWeight:600, color:"var(--text-sub)", textTransform:"uppercase", letterSpacing:"0.08em" }}>{fmtDate(date)}</p>
                {gi===0 && <button onClick={()=>onAdd(filterAccount==="all" ? null : filterAccount)} style={{ background:"none", border:"none", color:"var(--gold)", fontSize:13, fontWeight:600, padding:0, cursor:"pointer" }}>+ Ajouter</button>}
              </div>
              <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:"var(--radius)", overflow:"hidden" }}>
                {txs.map((tx,i)=>(
                  <div key={tx.id}>
                    {i>0&&<div style={{ height:1, background:"var(--border)", margin:"0 16px" }} />}
                    <TxRow tx={tx} deletable clicked={clickedTxId===tx.id} onToggleClicked={id=>setClickedTxId(clickedTxId===id?null:id)} onDelete={()=>setDeletingTx(tx)} onEdit={()=>setEditingTx(tx)} onTogglePointed={()=>store.togglePointed(tx.id)} accountName={filterAccount==="all" && store.accounts.length > 1 ? store.accounts.find(a=>a.id===tx.accountId)?.name : null} />
                  </div>
                ))}
              </div>
            </div>
          ))}
      </div>
      {editingTx  && <FormModal store={store} transaction={editingTx} onClose={()=>setEditingTx(null)} />}
      {deletingTx && <DeleteModal tx={deletingTx} onCancel={()=>setDeletingTx(null)} onConfirm={()=>{store.remove(deletingTx.id);setDeletingTx(null);}} />}
    </div>
  );
}

// ─── Settings ──────────────────────────────────────────────────────────────
function Settings({ store, user, accountRowSize, setAccountRowSize }) {
  const { theme, toggle } = useTheme();
  const checkingAccounts = store.accounts.filter(a => a.type === "checking");
  const [activeParity,       setParity]          = useState("even");
  const [activeAccountId,    setActiveAccountId] = useState(() => checkingAccounts[0]?.id || "");
  const [showAdd,            setShowAdd]          = useState(false);
  const [editingTplItem,     setEditingTplItem]   = useState(null);
  const [editingAccounts,    setEditingAccounts]  = useState(false);
  const [showAddAccModal,    setShowAddAccModal]    = useState(false);
  const [showCleanupConfirm, setShowCleanupConfirm] = useState(false);
  const [cleanupMessage,     setCleanupMessage]   = useState({ text: "", canDelete: false });

  // Keep activeAccountId in sync if accounts change
  React.useEffect(() => {
    if (!checkingAccounts.find(a => a.id === activeAccountId) && checkingAccounts.length > 0) {
      setActiveAccountId(checkingAccounts[0].id);
    }
  }, [store.accounts]);

  const acctTpl     = (store.templates[activeAccountId] || emptyAcctTpl());
  const tpl         = acctTpl[activeParity];
  const totalIncome = tpl.items.filter(i=>i.type==="income").reduce((s,i)=>s+i.amount,0);
  const totalExpense= tpl.items.filter(i=>i.type==="expense").reduce((s,i)=>s+i.amount,0);

  const handleCleanupClick = () => {
    const currentKey = nowMKey();
    const cdd = store.cardDebitDates;

    // Safety check first
    const blockers = store.checkCleanupBlockers();
    if (blockers.length > 0) {
      const blockMsg = `Le nettoyage ne peut pas être effectué :\n\n• ${blockers.join("\n• ")}\n\nCorrigez ces points avant de relancer le nettoyage.`;
      setCleanupMessage({ text: blockMsg, canDelete: false, isBlocked: true });
      setShowCleanupConfirm(true);
      return;
    }

    const toDelete = store.transactions.filter(t => {
      if (mKey(t.date) >= currentKey) return false;
      if (t.isCard && t.accountId) {
        const debitDate = cdd[t.accountId]?.[mKey(t.date)];
        if (debitDate && mKey(debitDate) >= currentKey) return false;
      }
      return true;
    }).length;
    const toKeep = store.transactions.filter(t => {
      if (mKey(t.date) >= currentKey) return false;
      if (t.isCard && t.accountId) {
        const debitDate = cdd[t.accountId]?.[mKey(t.date)];
        if (debitDate && mKey(debitDate) >= currentKey) return true;
      }
      return false;
    }).length;
    // Count past benefit expenses and allotments
    const benefitToDelete = Object.values(store.benefitData).reduce((sum, acct) => {
      const exp = (acct.expenses  || []).filter(e => mKey(e.date) < currentKey).length;
      const all = Object.keys(acct.allotments || {}).filter(mk => mk < currentKey).length;
      return sum + exp + all;
    }, 0);
    const totalToDelete = toDelete + benefitToDelete;
    const currentName = new Date().toLocaleDateString("fr-FR", { month:"long", year:"numeric" });
    let msg;
    if (totalToDelete === 0 && toKeep === 0) {
      msg = `Aucune transaction antérieure à ${currentName}.`;
    } else if (toDelete === 0 && toKeep > 0 && benefitToDelete === 0) {
      msg = `Les ${toKeep} transaction(s) du mois précédent sont des dépenses carte à débit différé — elles seront conservées jusqu'à ce que leur prélèvement soit passé.`;
    } else if (toKeep > 0) {
      const parts = [];
      if (toDelete > 0)       parts.push(`${toDelete} transaction(s)`);
      if (benefitToDelete > 0) parts.push(`${benefitToDelete} entrée(s) Avantages`);
      msg = `Supprimer ${parts.join(" et ")} antérieure(s) à ${currentName} ? Les ${toKeep} transaction(s) carte à débit différé seront conservées jusqu'à leur prélèvement.`;
    } else {
      const parts = [];
      if (toDelete > 0)       parts.push(`${toDelete} transaction(s)`);
      if (benefitToDelete > 0) parts.push(`${benefitToDelete} entrée(s) Avantages`);
      msg = `Supprimer ${parts.join(" et ")} antérieure(s) à ${currentName} ?`;
    }
    setCleanupMessage({ text: msg, canDelete: totalToDelete > 0, isBlocked: false });
    setShowCleanupConfirm(true);
  };

  const confirmCleanup = () => {
    store.cleanupMonth();
    setShowCleanupConfirm(false);
  };

  const handleLogout = async () => {
    const { auth, signOut } = fb();
    localStorage.removeItem("budget_last_activity");
    await signOut(auth);
  };

  const [resetting, setResetting] = useState(false);

    if (!window.confirm("Réinitialiser les données démo ? Toutes les modifications seront perdues.")) return;
    setResetting(true);
    try {

      await fbSave(uid, {

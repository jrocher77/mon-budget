// ─── Template variable resolver ────────────────────────────────────────────
// Supported variables: $month, $Month, $mm, $year / $Year / $yyyy
function resolveTplVars(str, monthK) {
  if (!str || !monthK) return str;
  const [yyyy, mm] = monthK.split("-");
  const date = new Date(Number(yyyy), Number(mm) - 1, 1);
  const monthLower = date.toLocaleDateString("fr-FR", { month: "long" });           // février
  const monthUpper = monthLower.charAt(0).toUpperCase() + monthLower.slice(1);      // Février
  return str
    .replace(/\$Month/g, monthUpper)
    .replace(/\$month/g, monthLower)
    .replace(/\$mm/g,    mm)
    .replace(/\$yyyy/g,  yyyy)

const _debugLogs = [];

function _isDebugEnabled() {
  try { return localStorage.getItem("budget_debug") === "1"; } catch { return false; }
}
function _setDebugEnabled(v) {
  try { if (v) localStorage.setItem("budget_debug","1"); else localStorage.removeItem("budget_debug"); } catch {}

}

function dbg(msg) {
  const ts = new Date().toISOString().slice(11, 23);
  const entry = { ts, msg, time: Date.now() };
  _debugLogs.push(entry);
  if (_debugLogs.length > 120) _debugLogs.shift();
  if (_isDebugEnabled()) console.log("[DBG]", ts, msg);
  _debugListeners.forEach(fn => fn());
}

function DebugOverlay() {
  const [, forceUpdate] = React.useReducer(x => x+1, 0);
  const [collapsed, setCollapsed] = React.useState(false);
  const [filter, setFilter] = React.useState("");
  const listRef = React.useRef(null);

  React.useEffect(() => {
    _debugListeners.add(forceUpdate);
    return () => _debugListeners.delete(forceUpdate);
  }, []);

  const filtered = _debugLogs.filter(l => !filter || l.msg.toLowerCase().includes(filter.toLowerCase()));
  const rows = filtered.slice().reverse();

  const copyAll = () => {
    const text = _debugLogs.map(l => `${l.ts} ${l.msg}`).join("\n");
    try { navigator.clipboard.writeText(text); } catch {}
  };

  const lineColor = (msg) => {
    if (msg.includes("❌")) return "#ff6b6b";
    if (msg.includes("✅")) return "#6bff9e";
    if (msg.includes("⚠️")) return "#ffcc00";
    if (msg.includes("💾")) return "#80cfff";
    if (msg.includes("🔄") || msg.includes("🛑")) return "#c9a84c";
    if (msg.includes("🐢") || msg.includes("🔁")) return "#ff9966";
    return "#bbb";
  };

  return (
    <div style={{ position:"fixed", bottom:88, left:6, right:6, zIndex:9999 }}>
      <div style={{ background:"rgba(10,10,14,0.97)", borderRadius:10, border:"1px solid rgba(201,168,76,0.35)", boxShadow:"0 4px 24px rgba(0,0,0,0.6)", overflow:"hidden" }}>

          <span style={{ fontSize:11, color:"#c9a84c", fontWeight:700, fontFamily:"monospace", flex:1 }}>🔍 DEBUG — {_debugLogs.length} entrées</span>
          <input
            value={filter} onChange={e=>setFilter(e.target.value)}
            placeholder="Filtrer…"
            style={{ fontSize:10, padding:"2px 6px", borderRadius:4, border:"1px solid rgba(255,255,255,0.15)", background:"rgba(255,255,255,0.07)", color:"#eee", width:80, fontFamily:"monospace" }}
          />
          <button onClick={copyAll} title="Copier tout" style={{ background:"none", border:"none", color:"#888", fontSize:12, padding:"0 2px", cursor:"pointer" }}>📋</button>
          <button onClick={()=>{ _debugLogs.length=0; forceUpdate(); }} title="Effacer" style={{ background:"none", border:"none", color:"#888", fontSize:12, padding:"0 2px", cursor:"pointer" }}>🗑</button>
          <button onClick={()=>setCollapsed(c=>!c)} style={{ background:"none", border:"none", color:"#888", fontSize:13, padding:"0 2px", cursor:"pointer" }}>{collapsed?"▲":"▼"}</button>
        </div>
        {/* Log list */}
        {!collapsed && (
          <div ref={listRef} style={{ maxHeight:200, overflowY:"auto" }}>
            {rows.length === 0

                </div>
              ))
            }
          </div>
        )}
      </div>
    </div>
  );
}
const fb = () => window[Symbol.for("__monbudget_fb__")];

function fbSubscribe(uid, onData, onError) {
  const { db, doc, onSnapshot } = fb();
  const ref = doc(db, "budgets", uid);
  return onSnapshot(
    ref,
    snap => onData(snap.exists() ? snap.data() : null, snap.metadata),
    err  => {
      console.error("[fbSubscribe] Firestore error:", err.code, err.message);
      if (onError) onError(err);
    }
  );
}

async function fbSave(uid, data) {
  const { db, doc, setDoc } = fb();
  try {
    await setDoc(doc(db, "budgets", uid), data, { merge: true });
    dbg(`✅ Firestore setDoc OK`);
  } catch(e) {
    dbg(`❌ Firestore setDoc ERREUR: ${e.code || e.message}`);
    throw e;
  }
}

// Helper: get previous month key — defined here so it's accessible inside useStore
function prevMonthKey(mk) {
  const [y, m] = mk.split("-").map(Number);
  const pm = m === 1 ? 12 : m - 1;
  const py = m === 1 ? y - 1 : y;
  return `${py}-${String(pm).padStart(2,'0')}`;
}

// Helper: compute allotment amount from allotment config — defined here so it's accessible inside useStore
function allotmentAmount(allotment) {
  if (!allotment) return 0;
  if (allotment.mode === "units") return (allotment.count || 0) * (allotment.unitValue || 0);
  return allotment.amount || 0;
}

function useStore(uid, email) {
  const isDemo = email === DEMO_EMAIL;
  const [ready,        setReady]       = useState(false);
  const [transactions, setTx]          = useState([]);
  const [templates,    setTpl]         = useState(DEFAULT_TPL);
  const [accounts,     setAccounts]    = useState(DEFAULT_ACCOUNTS);
  const [cleanupDay,   setCleanupDay]   = useState(DEFAULT_CLEANUP_DAY);
  const [autoCleanup,  setAutoCleanup]  = useState(DEFAULT_AUTO_CLEANUP);
  const [savingsHistory,    setSavingsHistory]    = useState(DEFAULT_SAVINGS_HISTORY);
  const [checkingHistory,   setCheckingHistory]   = useState(DEFAULT_CHECKING_HISTORY);
  const [savingsSnapDays,   setSavingsSnapDays]   = useState(DEFAULT_SAVINGS_SNAP_DAYS);
  const [savingsSnapActive, setSavingsSnapActive] = useState(DEFAULT_SAVINGS_SNAP_ACTIVE);
  const [cardDebitDates,    setCardDebitDates]    = useState(DEFAULT_CARD_DEBIT_DATES);
  const [showFutureTx,      setShowFutureTx]      = useState(DEFAULT_SHOW_FUTURE_TX);
  const [benefitData,       setBenefitData]       = useState(DEFAULT_BENEFIT_DATA); // { [accountId]: { allotments:{}, expenses:[] } }
  const [uiPrefs,           setUiPrefs]           = useState({}); // { eurToUsd: bool, ... }
  const saveTimer = useRef(null);
  const loadedRef = useRef(false);      // true once Firestore first snapshot received
  const lastSaveAt = useRef(0);         // timestamp of last local save, to ignore echo
  const hasReceivedData = useRef(false);// true once we've received a non-null document
  const trustedRef = useRef(false);     // true only after Firestore confirmed real data — persist is blocked until then
  const nullGraceTimer = useRef(null);  // delays new-account init for server-null snapshots (safety net for race conditions)
  const [slowConnection, setSlowConnection] = useState(false);
  const slowTimer = useRef(null);       // shows slow connection UI after 4s
  const [retryCount, setRetryCount] = useState(0); // incrementing restarts subscription
  const [saveError, setSaveError]   = useState(false);
  const saveErrorTimer = useRef(null); // auto-dismiss save error after 8s
  const autoCleanupDoneRef = useRef(false); // prevents auto-cleanup from firing more than once per session

  // ── Subscribe to Firestore in real-time ─────────────────────────────────
  useEffect(() => {
    if (!uid) return;

    // Reset all safety flags when uid changes (re-mount / auth oscillation on iOS)
    loadedRef.current       = false;
    hasReceivedData.current = false;
    trustedRef.current      = false;
    autoCleanupDoneRef.current = false;
    if (nullGraceTimer.current) { clearTimeout(nullGraceTimer.current); nullGraceTimer.current = null; }
    if (slowTimer.current) { clearTimeout(slowTimer.current); slowTimer.current = null; }
    setSlowConnection(false);
    dbg(`🔄 useStore init — uid=${uid.slice(0,8)}... retry=${retryCount}`);

    // Show slow connection UI after 4s without any Firestore response
    slowTimer.current = setTimeout(() => {
      if (!loadedRef.current) {
        dbg(`🐢 Connexion lente — affichage écran d'attente`);
        setSlowConnection(true);
      }
    }, 4000);

    const unsub = fbSubscribe(uid, (data, metadata) => {
      // Ignore echoes of our own saves (within 8 seconds)
      if (loadedRef.current && Date.now() - lastSaveAt.current < 8000) {
        dbg(`⏭ Echo ignoré (${Math.round((Date.now()-lastSaveAt.current)/1000)}s depuis save)`);
        return;
      }

      if (data) {
        const txCount = Array.isArray(data.transactions) ? data.transactions.length : "?";
        const acCount = Array.isArray(data.accounts) ? data.accounts.length : "?";
        dbg(`✅ Snapshot reçu — ${txCount} tx, ${acCount} comptes, loadedRef=${loadedRef.current}`);

        // CRITICAL: cancel any pending save that may have been triggered by a null snapshot
        // (e.g. null snapshot arrived first due to slow network, then real data arrives 12ms later)
        if (saveTimer.current) {
          clearTimeout(saveTimer.current);
          saveTimer.current = null;
          dbg(`🛑 Timer de sauvegarde annulé — vraies données reçues`);
        }
        // Cancel null grace timer — real data has arrived, no need to init as new account
        if (nullGraceTimer.current) {
          clearTimeout(nullGraceTimer.current);
          nullGraceTimer.current = null;
          dbg(`🛑 Grace timer annulé — vraies données reçues`);
        }
        if (slowTimer.current) { clearTimeout(slowTimer.current); slowTimer.current = null; }
        setSlowConnection(false);

        hasReceivedData.current = true;
        trustedRef.current = true;

        // SAFETY: never fall back to SAMPLE_TX / DEFAULT_ACCOUNTS if the field is simply
        // missing or empty — that would silently overwrite real data on the next persist.
        const safeTx    = Array.isArray(data.transactions) ? data.transactions : [];
        const safeAccts = Array.isArray(data.accounts) && data.accounts.length > 0
                            ? data.accounts
                            : DEFAULT_ACCOUNTS;

        setTx( safeTx.map(t => ({ ...t, pointed: t.pointed || false })) );
        setTpl( (() => {
            const t = data.templates;
            if (!t) return DEFAULT_TPL;
            // Migrate old format { even:{items:[]}, odd:{items:[]} } → per-account
            if (t.even || t.odd) {
              const firstCheckingId = safeAccts.find(a=>a.type==="checking")?.id;
              return firstCheckingId ? { [firstCheckingId]: { even: t.even||{items:[]}, odd: t.odd||{items:[]} } } : DEFAULT_TPL;
            }
            return t;
          })() );
        setAccounts( safeAccts.map(a => ({ ...a, balance: a.balance || 0, savingsSubtype: a.savingsSubtype || "available" })) );
        setCleanupDay(data.cleanupDay || DEFAULT_CLEANUP_DAY);
        setAutoCleanup(data.autoCleanup !== undefined ? data.autoCleanup : DEFAULT_AUTO_CLEANUP);
        setSavingsHistory(data.savingsHistory || DEFAULT_SAVINGS_HISTORY);
        setCheckingHistory(data.checkingHistory || DEFAULT_CHECKING_HISTORY);
        setSavingsSnapDays(data.savingsSnapDays || DEFAULT_SAVINGS_SNAP_DAYS);
        setSavingsSnapActive(data.savingsSnapActive !== undefined ? data.savingsSnapActive : DEFAULT_SAVINGS_SNAP_ACTIVE);
        setCardDebitDates(data.cardDebitDates || DEFAULT_CARD_DEBIT_DATES);
        setShowFutureTx(data.showFutureTx !== undefined ? data.showFutureTx : DEFAULT_SHOW_FUTURE_TX);
        setBenefitData(data.benefitData || DEFAULT_BENEFIT_DATA);
        setUiPrefs(data.uiPrefs || {});
        snapDaysRef.current   = data.savingsSnapDays   || DEFAULT_SAVINGS_SNAP_DAYS;
        snapActiveRef.current = data.savingsSnapActive !== undefined ? data.savingsSnapActive : DEFAULT_SAVINGS_SNAP_ACTIVE;

      } else if (!loadedRef.current && !hasReceivedData.current) {
        // Null snapshot received before any real data.
        // CRITICAL: on iOS PWA with slow network, Firebase SDK can emit a null cache snapshot
        // BEFORE the real server data arrives (observed: null at t=0, real data at t+12ms).
        // If the snapshot is FROM CACHE (fromCache=true), it means we're offline or the local
        // cache has no document — we MUST NOT treat this as a new account and write SAMPLE_TX.
        // Only a confirmed SERVER null (fromCache=false) means the account truly doesn't exist.
        if (metadata?.fromCache) {
          dbg(`⚠️ Snapshot null FROM CACHE — ne pas initialiser (hors ligne ou cache vide)`);
          // Don't start the grace timer — just wait indefinitely for a server response.
          // The slow-connection UI will appear after 4s if still no response.
          return;
        }

        // Null from SERVER — but we still wait 3s as a safety net for race conditions
        // (e.g. Firestore SDK returning server null before the write propagates).
        dbg(`⚠️ Snapshot null SERVER reçu — attente 3s avant init (nouveau compte ?)`);

        if (nullGraceTimer.current) return; // already waiting
        nullGraceTimer.current = setTimeout(() => {
          nullGraceTimer.current = null;
          // If real data arrived during the grace period, hasReceivedData is now true → abort
          if (hasReceivedData.current) {
            dbg(`✅ Grace: vraies données arrivées entre-temps — init annulée`);
            return;
          }
          // Still no data after 3s → genuinely new account
          dbg(`⚠️ Grace expirée — init nouveau compte avec SAMPLE_TX`);
          const initTx      = isDemo ? DEMO_TX      : SAMPLE_TX;
          const initAccts   = isDemo ? DEMO_ACCOUNTS : DEFAULT_ACCOUNTS;
          const initHistory = isDemo ? DEMO_SAVINGS_HISTORY : DEFAULT_SAVINGS_HISTORY;
          const initCdd     = isDemo ? DEMO_CARD_DEBIT_DATES : DEFAULT_CARD_DEBIT_DATES;
          const initBd      = isDemo ? DEMO_BENEFIT_DATA : DEFAULT_BENEFIT_DATA;
          setTx(initTx);
          setAccounts(initAccts);
          setSavingsHistory(initHistory);
          setCardDebitDates(initCdd);
          setBenefitData(initBd);
          trustedRef.current = true; // New account — we just wrote the initial data, persist is allowed
          lastSaveAt.current = Date.now(); // SAFETY: block echo of this init write immediately
          if (!loadedRef.current) { loadedRef.current = true; dbg(`✅ ready=true (nouveau compte)`); setReady(true); }
          fbSave(uid, { transactions:initTx, templates:DEFAULT_TPL, accounts:initAccts, cleanupDay:DEFAULT_CLEANUP_DAY, autoCleanup:DEFAULT_AUTO_CLEANUP, savingsHistory:initHistory, checkingHistory:DEFAULT_CHECKING_HISTORY, savingsSnapDays:DEFAULT_SAVINGS_SNAP_DAYS, savingsSnapActive:DEFAULT_SAVINGS_SNAP_ACTIVE, cardDebitDates:initCdd, showFutureTx:DEFAULT_SHOW_FUTURE_TX, benefitData:initBd });
        }, 3000);

        // Don't set ready yet — we're waiting for real data or the grace timer
        return;

      } else {
        // Document disappeared AFTER we had data → do NOT reinitialise.
        dbg(`⚠️ Snapshot null ignoré (loadedRef=${loadedRef.current}, hasData=${hasReceivedData.current})`);
        console.warn("[useStore] Firestore returned null after data was loaded — ignoring to protect existing data.");
      }

      if (!loadedRef.current) {
        loadedRef.current = true;
        dbg(`✅ ready=true, trustedRef=${trustedRef.current}`);
        setReady(true);
      }
    },
    err => {
      // Firestore error (permissions, network) — do NOT reinitialise, just unblock loading
      dbg(`❌ Erreur Firestore: ${err.code} — trustedRef reste false`);
      console.error("[useStore] Firestore subscription error:", err.code);
      if (!loadedRef.current) {
        loadedRef.current = true;
        setReady(true);
        // trustedRef stays false → persist remains blocked
      }
    });
    return () => { unsub(); if (nullGraceTimer.current) { clearTimeout(nullGraceTimer.current); nullGraceTimer.current = null; } if (slowTimer.current) { clearTimeout(slowTimer.current); slowTimer.current = null; } };
  }, [uid, retryCount]);

  // ── Auto-save to Firestore (debounced 1s) ───────────────────────────────
  const persist = useCallback((tx, tpl, acct, cd, ac, sh, ch, ssd, ssa, cdd, sft, bd) => {
    // SAFETY: never write to Firestore before we've confirmed real data from the server.
    // This prevents wiping data on iOS PWA reload when Firestore cache is empty.
    if (!uid || !ready || !trustedRef.current) {
      if (!trustedRef.current) dbg(`⚠️ persist bloqué — trustedRef=false`);
      return;
    }
    if (saveTimer.current) clearTimeout(saveTimer.current);
    // Mark save as pending immediately so echo guard works during the debounce window
    lastSaveAt.current = Date.now();
    saveTimer.current = setTimeout(() => {
      // Clean undefined values that Firestore rejects
      const cleanTx = tx.map(t => {
        const clean = {};
        Object.keys(t).forEach(k => { if (t[k] !== undefined) clean[k] = t[k]; });
        return clean;
      });
      dbg(`💾 Sauvegarde Firestore — ${cleanTx.length} tx, ${acct?.length} comptes`);
      fbSave(uid, { transactions: cleanTx, templates: tpl, accounts: acct, cleanupDay: cd, autoCleanup: ac, savingsHistory: sh, checkingHistory: ch, savingsSnapDays: ssd, savingsSnapActive: ssa, cardDebitDates: cdd, showFutureTx: sft, benefitData: bd })
        .then(() => { setSaveError(false); })
        .catch(() => {
          setSaveError(true);
          if (saveErrorTimer.current) clearTimeout(saveErrorTimer.current);
          saveErrorTimer.current = setTimeout(() => setSaveError(false), 8000);
        });
    }, 1000);
  }, [uid, ready]);

  // ── Auto-cleanup ────────────────────────────────────────────────────────
  // ── Cleanup safety checks ──────────────────────────────────────────────
  // Returns an array of blocking reason strings (empty = safe to proceed).
  // Checks: (1) transactions to delete that are not pointed,
  //         (2) checking accounts whose month balance has not been carried over.
  const cleanupBlockers = useCallback((txList, acctList, cdd) => {
    const currentKey = nowMKey();
    const prevKey    = prevMonthKey(currentKey);
    const reasons    = [];

    // 1. Unpointed transactions that would be deleted (including card transactions)
    const unpointedToDelete = txList.filter(t => {
      if (mKey(t.date) >= currentKey) return false;
      if (t.isCard && t.accountId) {
        const debitDate = cdd[t.accountId]?.[mKey(t.date)];
        if (debitDate && mKey(debitDate) >= currentKey) return false;
      }
      return !t.pointed && !t._transferFrom;
    });
    if (unpointedToDelete.length > 0) {
      reasons.push(`${unpointedToDelete.length} transaction(s) non pointée(s) seraient supprimées.`);
    }

    // 2. Checking accounts with past transactions but no carry-over
    const checkingAccts = acctList.filter(a => a.type === "checking");
    const missingCarry = checkingAccts.filter(acc => {
      // Does the previous month have any non-deferred transactions for this account?
      const hasPastTx = txList.some(t =>
        t.accountId === acc.id &&
        mKey(t.date) < currentKey &&
        !(t.isCard && cdd[acc.id]?.[mKey(t.date)] && mKey(cdd[acc.id][mKey(t.date)]) >= currentKey)
      );
      if (!hasPastTx) return false;
      // Is there already a carry-over transaction for the previous month?
      const hasCarry = txList.some(t =>
        t.accountId === acc.id &&
        t._transferFrom === prevKey
      );
      return !hasCarry;
    });
    if (missingCarry.length > 0) {
      const names = missingCarry.map(a => a.name).join(", ");
      reasons.push(`Le solde du mois précédent n'a pas été reporté pour : ${names}.`);
    }

    return reasons;
  }, []);

  const doCleanup = useCallback((cdd, bd) => {
    const currentKey = nowMKey();
    // Cleanup regular transactions (unchanged)
    setTx(prev => {
      const filtered = prev.filter(t => {
        if (mKey(t.date) >= currentKey) return true;
        if (t.isCard && t.accountId) {
          const debitDate = cdd[t.accountId]?.[mKey(t.date)];
          if (debitDate && mKey(debitDate) >= currentKey) return true;
        }
        return false;
      });
      return filtered.length !== prev.length ? filtered : prev;
    });
    // Cleanup benefitData: preserve carry-over balance, then remove data strictly before current month.
    // Before purging past months, we compute the accumulated carry-over (allotments − expenses for all
    // months prior to the current one) and inject it as a synthetic allotment on the previous month so
    // that computeCarryOver() can still reconstruct the correct available balance after cleanup.
    if (bd && Object.keys(bd).length > 0) {
      setBenefitData(prev => {
        let changed = false;
        const next = {};
        const prevKey = prevMonthKey(currentKey);
        Object.entries(prev).forEach(([accountId, acct]) => {
          // 1. Compute carry-over from all months strictly before currentKey
          const allMonths = new Set([
            ...Object.keys(acct.allotments || {}),
            ...(acct.expenses || []).map(e => mKey(e.date)),
          ]);
          const pastMonths = [...allMonths].filter(mk => mk < currentKey).sort();
          let carry = 0;
          for (const mk of pastMonths) {
            const allotted = allotmentAmount(acct.allotments?.[mk]);
            const spent    = (acct.expenses || []).filter(e => mKey(e.date) === mk).reduce((s, e) => s + e.amount, 0);
            carry = Math.max(0, carry + allotted - spent);
          }

          // 2. Keep only current-month-and-future data
          const expenses = (acct.expenses || []).filter(e => mKey(e.date) >= currentKey);
          const allotments = Object.fromEntries(
            Object.entries(acct.allotments || {}).filter(([mk]) => mk >= currentKey)
          );

          // 3. If there is a positive carry-over to preserve, inject it as a synthetic dotation
          //    on the previous month (flagged _isCarryOver: true).
          //    This allows computeCarryOver() to return the correct amount for the current month.
          //    The _isCarryOver flag also prevents this entry from appearing as a navigable month
          //    in the BenefitPage month selector (only real allotments/expenses show as months).
          if (carry > 0) {
            allotments[prevKey] = { mode: "amount", amount: carry, _isCarryOver: true };
          }

          const expChanged = expenses.length !== (acct.expenses || []).length;
          const allChanged = Object.keys(allotments).length !== Object.keys(acct.allotments || {}).length;
          // Also changed if we added or updated the carry-over entry
          const prevEntry = acct.allotments?.[prevKey];
          const carryChanged = carry > 0 && (!prevEntry || prevEntry.amount !== carry || !prevEntry._isCarryOver);
          if (expChanged || allChanged || carryChanged) changed = true;
          next[accountId] = { allotments, expenses };
        });
        return changed ? next : prev;
      });
    }
  }, []);

  // Toast state for blocked auto-cleanup — consumed by App component
  const [autoCleanupBlockedReasons, setAutoCleanupBlockedReasons] = useState(null);

  // ── Persist on every state change ───────────────────────────────────────
  useEffect(() => { if (ready) persist(transactions, templates, accounts, cleanupDay, autoCleanup, savingsHistory, checkingHistory, savingsSnapDays, savingsSnapActive, cardDebitDates, showFutureTx, benefitData); },
    [transactions, templates, accounts, cleanupDay, autoCleanup, savingsHistory, checkingHistory, savingsSnapDays, savingsSnapActive, cardDebitDates, showFutureTx, benefitData, ready, persist]);

  // ── Actions ─────────────────────────────────────────────────────────────
  const add    = tx  => setTx(p => [{ ...tx, id:genId(), pointed:false }, ...p]);
  const remove = id  => setTx(p => p.filter(t => t.id !== id));
  const update = (id, u) => setTx(p => p.map(t => {
    if (t.id !== id) return t;
    const updated = { ...t, ...u };
    delete updated._tpl;
    return updated;
  }));
  const togglePointed = id => setTx(p => p.map(t => t.id===id ? {...t,pointed:!t.pointed} : t));

  const addTplItem    = (accountId, parity, item) => setTpl(p => {
    const acct = p[accountId] || emptyAcctTpl();
    return { ...p, [accountId]: { ...acct, [parity]: { items: [...acct[parity].items, {...item, id:genId()}] } } };
  });
  const removeTplItem = (accountId, parity, id) => setTpl(p => {
    const acct = p[accountId] || emptyAcctTpl();
    return { ...p, [accountId]: { ...acct, [parity]: { items: acct[parity].items.filter(i=>i.id!==id) } } };
  });
  const updateTplItem = (accountId, parity, id, updates) => setTpl(p => {
    const acct = p[accountId] || emptyAcctTpl();
    return { ...p, [accountId]: { ...acct, [parity]: { items: acct[parity].items.map(i => i.id===id ? {...i,...updates} : i) } } };
  });
  const applyTemplate = (monthK, accountId) => {
    const parity = isEven(monthK) ? "even" : "odd";
    const acct   = templates[accountId] || emptyAcctTpl();
    const items  = acct[parity].items;
    if (!items.length) return;
    if (transactions.some(t => t._tpl===monthK && t.accountId===accountId)) return;
    setTx(p => [...items.map(item => {
      const day = String(item.day || 1).padStart(2, '0');
      return {
        ...item,
        id:      genId(),
        date:    monthK+"-"+day,
        accountId,
        _tpl:    monthK,
        // Resolve template variables in title and note
        title:   resolveTplVars(item.title, monthK),
        ...(item.note ? { note: resolveTplVars(item.note, monthK) } : {}),
      };
    }), ...p]);
  };

  const addAccount    = (opts={})   => { if (accounts.length>=15) return; const {type="checking",name,savingsSubtype} = opts; const newAcc = {id:genId(),name:name||`Nouveau compte ${accounts.length+1}`,type,balance:0}; if (type==="savings") newAcc.savingsSubtype = savingsSubtype||"available"; setAccounts(p=>[...p,newAcc]); };
  const removeAccount = id => {
    if (accounts.length<=1) return;
    if (!trustedRef.current) return; // SAFETY: never write to Firestore before data confirmed
    // Cancel any pending debounced save — the direct setDoc below will carry the deletion,
    // and the useEffect will schedule a fresh persist with the updated state afterwards.
    if (saveTimer.current) { clearTimeout(saveTimer.current); saveTimer.current = null; }
    setAccounts(p => p.filter(a => a.id !== id));
    setTx(p => p.filter(t => t.accountId !== id));
    setTpl(p => { const next = {...p}; delete next[id]; return next; });
    // Clean up benefitData for this account (benefit accounts have no transactions in setTx)
    setBenefitData(p => { const next = {...p}; delete next[id]; return next; });
    // Explicitly delete nested fields in Firestore (merge:true won't delete missing fields)
    const { db, doc, setDoc, deleteField } = fb();
    lastSaveAt.current = Date.now(); // SAFETY: block echo of this deleteField write
    setDoc(doc(db, "budgets", uid), { templates: { [id]: deleteField() }, benefitData: { [id]: deleteField() } }, { merge: true });
  };
  const updateAccount = (id,updates)=> setAccounts(p=>p.map(a=>a.id===id?{...a,...updates}:a));
  const moveAccount   = (id, dir) => {
    setAccounts(p => {
      const type  = p.find(a => a.id === id)?.type;
      const group = p.filter(a => a.type === type);
      const rest  = p.filter(a => a.type !== type);
      const idx   = group.findIndex(a => a.id === id);
      const newIdx = idx + dir;
      if (newIdx < 0 || newIdx >= group.length) return p;
      const newGroup = [...group];
      [newGroup[idx], newGroup[newIdx]] = [newGroup[newIdx], newGroup[idx]];
      // Rebuild full array preserving relative positions of the other group
      return p.map(a => {
        if (a.type === type) return newGroup.shift();
        return a;
      });
    });
  };
  const updateCleanupDay  = day  => setCleanupDay(day);
  const updateAutoCleanup = val  => setAutoCleanup(val);
  const cleanupMonth  = () => doCleanup(cardDebitDates, benefitData);
  const checkCleanupBlockers = () => cleanupBlockers(transactions, accounts, cardDebitDates);

  // ── Card debit dates actions ─────────────────────────────────────────────
  // cardDebitDates: { [accountId]: { [monthKey]: "YYYY-MM-DD" } }
  const setCardDebitDate = (accountId, monthKey, dateStr) => {
    setCardDebitDates(prev => ({
      ...prev,
      [accountId]: { ...(prev[accountId]||{}), [monthKey]: dateStr }
    }));
  };
  const clearCardDebitDate = (accountId, monthKey) => {
    setCardDebitDates(prev => {
      const acct = { ...(prev[accountId]||{}) };
      delete acct[monthKey];
      return { ...prev, [accountId]: acct };
    });
  };

  // ── Benefit data actions ─────────────────────────────────────────────────
  // benefitData: { [accountId]: { allotments: { [monthKey]: {mode,amount?,count?,unitValue?} }, expenses: [{id,title,amount,date}] } }
  const getBenefitAcct = (bd, accountId) => bd[accountId] || { allotments: {}, expenses: [] };

  const setBenefitAllotment = (accountId, monthKey, allotment) => {
    setBenefitData(prev => {
      const acct = getBenefitAcct(prev, accountId);
      return { ...prev, [accountId]: { ...acct, allotments: { ...acct.allotments, [monthKey]: allotment } } };
    });
  };
  const clearBenefitAllotment = (accountId, monthKey) => {
    setBenefitData(prev => {
      const acct = getBenefitAcct(prev, accountId);
      const allotments = { ...acct.allotments };
      delete allotments[monthKey];
      return { ...prev, [accountId]: { ...acct, allotments } };
    });
  };
  const addBenefitExpense = (accountId, expense) => {
    setBenefitData(prev => {
      const acct = getBenefitAcct(prev, accountId);
      return { ...prev, [accountId]: { ...acct, expenses: [...acct.expenses, { ...expense, id: genId() }] } };
    });
  };
  const removeBenefitExpense = (accountId, expenseId) => {
    setBenefitData(prev => {
      const acct = getBenefitAcct(prev, accountId);
      return { ...prev, [accountId]: { ...acct, expenses: acct.expenses.filter(e => e.id !== expenseId) } };
    });
  };
  const updateBenefitExpense = (accountId, expenseId, updates) => {
    setBenefitData(prev => {
      const acct = getBenefitAcct(prev, accountId);
      return { ...prev, [accountId]: { ...acct, expenses: acct.expenses.map(e => e.id === expenseId ? { ...e, ...updates } : e) } };
    });
  };

  // ── Savings history actions ──────────────────────────────────────────────
  const addSavingsSnapshot = (entry) => setSavingsHistory(p => [{ ...entry, id: genId() }, ...p].sort((a,b) => b.date.localeCompare(a.date)));
  const updateSavingsSnapshot = (id, updates) => setSavingsHistory(p => p.map(e => e.id===id ? {...e,...updates} : e));
  const removeSavingsSnapshot = (id) => setSavingsHistory(p => p.filter(e => e.id !== id));

  // ── Checking history actions ─────────────────────────────────────────────
  // Entries: { id, date, monthKey, accountId, accountName, income, expense, balance, total, pointed, auto }
  const addCheckingSnapshot    = (entry)          => setCheckingHistory(p => [{ ...entry, id: genId() }, ...p].sort((a,b) => b.date.localeCompare(a.date) || b.monthKey.localeCompare(a.monthKey)));
  const removeCheckingSnapshot = (id)             => setCheckingHistory(p => p.filter(e => e.id !== id));

  // Ref to always have fresh transactions/accounts in the auto-snapshot effect
  const txRef       = useRef(transactions);
  const accountsRef = useRef(accounts);
  const cddRef2     = useRef(cardDebitDates);
  const checkingHistoryRef = useRef(checkingHistory);
  useEffect(() => { txRef.current              = transactions;    }, [transactions]);
  useEffect(() => { accountsRef.current        = accounts;        }, [accounts]);
  useEffect(() => { cddRef2.current            = cardDebitDates;  }, [cardDebitDates]);
  useEffect(() => { checkingHistoryRef.current = checkingHistory; }, [checkingHistory]);

  const snapDaysRef        = useRef(DEFAULT_SAVINGS_SNAP_DAYS);
  const snapActiveRef      = useRef(DEFAULT_SAVINGS_SNAP_ACTIVE);
  const cardDebitDatesRef  = useRef(DEFAULT_CARD_DEBIT_DATES);
  useEffect(() => { snapDaysRef.current       = savingsSnapDays;   }, [savingsSnapDays]);
  useEffect(() => { snapActiveRef.current     = savingsSnapActive; }, [savingsSnapActive]);
  useEffect(() => { cardDebitDatesRef.current = cardDebitDates;    }, [cardDebitDates]);

  // ── Auto-snapshot on configured days ────────────────────────────────────
  // Runs once after Firestore data is fully loaded (loadedRef) to avoid
  // triggering with default values before real config is available.
  useEffect(() => {
    if (!ready || !loadedRef.current || !trustedRef.current) return;
    if (!snapActiveRef.current) return;
    const savingsAccounts = accounts.filter(a => a.type === "savings");
    if (savingsAccounts.length === 0) return;

    const today = new Date();
    const d = today.getDate();
    if (!snapDaysRef.current.includes(d)) return;

    const pad = n => String(n).padStart(2, "0");
    const dateKey = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(d)}`;
    if (savingsHistory.some(e => e.date === dateKey)) return;

    const available = savingsAccounts.filter(a => a.savingsSubtype !== "blocked").reduce((s, a) => s + (a.balance || 0), 0);
    const blocked   = savingsAccounts.filter(a => a.savingsSubtype === "blocked").reduce((s, a) => s + (a.balance || 0), 0);
    addSavingsSnapshot({ date: dateKey, available, blocked, auto: true, note: "" });
  }, [ready]);

  // ── Auto-snapshot comptes courants + nettoyage (effet unifié) ──────────────
  // IMPORTANT : le snapshot DOIT s'exécuter avant le nettoyage pour ne pas
  // perdre les transactions du mois précédent. Les deux logiques sont donc
  // réunies dans un seul useEffect avec ordre d'exécution garanti.
  //
  // Le snapshot se déclenche dès la première ouverture du nouveau mois,
  // quel que soit le jour (1er, 2, 3…), tant qu'il n'existe pas encore
  // pour le mois précédent. Cas limite géré : cleanupDay = 1 est autorisé
  // car le snapshot s'exécute toujours EN PREMIER dans cet effet.
  useEffect(() => {
    if (!ready || !loadedRef.current || !trustedRef.current) return;

    const today      = new Date();
    const currentDay = today.getDate();
    const pad        = n => String(n).padStart(2, "0");

    // ── 0. Purge des snapshots checking de plus de 6 mois ───────────────
    // Calcule le monthKey limite : 6 mois avant le mois en cours
    const limitDate = new Date(today.getFullYear(), today.getMonth() - 6, 1);
    const limitMk   = `${limitDate.getFullYear()}-${pad(limitDate.getMonth()+1)}`;
    setCheckingHistory(prev => {
      const pruned = prev.filter(e => e.monthKey > limitMk);
      if (pruned.length === prev.length) return prev; // rien à supprimer
      dbg(`🗑️ Purge checking history — ${prev.length - pruned.length} entrée(s) supprimée(s) (avant ${limitMk})`);
      return pruned;
    });

    // ── 1. Snapshot comptes courants ────────────────────────────────────
    const checkingAccounts = accountsRef.current.filter(a => a.type === "checking");
    if (checkingAccounts.length > 0) {
      const prevM  = today.getMonth() === 0 ? 12 : today.getMonth();
      const prevY  = today.getMonth() === 0 ? today.getFullYear() - 1 : today.getFullYear();
      const prevMk = `${prevY}-${pad(prevM)}`;
      const tx     = txRef.current;

      checkingAccounts.forEach(acc => {
        // Un seul snapshot par compte par mois précédent
        if (checkingHistoryRef.current.some(e => e.accountId === acc.id && e.monthKey === prevMk)) return;

        const regular = tx.filter(t => mKey(t.date) === prevMk && t.accountId === acc.id && !t.isCard);
        const cardTxs = tx.filter(t => mKey(t.date) === prevMk && t.accountId === acc.id && t.isCard);
        if (regular.length === 0 && cardTxs.length === 0) return;

        const statRegular = regular.filter(isExternalStatTx);
        const statCardTxs = cardTxs.filter(isExternalStatTx);
        const income  = statRegular.filter(t => t.type === "income").reduce((s,t) => s+t.amount, 0);
        const expense = statRegular.filter(t => t.type === "expense").reduce((s,t) => s+t.amount, 0)
                      + statCardTxs.reduce((s,t) => s+(t.type==="expense"?t.amount:-t.amount), 0);
        const balance = income - expense;
        const statTxs = [...statRegular, ...statCardTxs];
        const total   = statTxs.length;
        const pointed = statTxs.filter(t => t.pointed).length;
        const dateKey = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(currentDay)}`;
        addCheckingSnapshot({
          date: dateKey, monthKey: prevMk,
          accountId: acc.id, accountName: acc.name,
          income, expense, balance,
          total, pointed, auto: true,
        });
        dbg(`📊 Auto-snapshot checking — ${acc.name} / ${prevMk} (pris le ${currentDay})`);
      });
    }

    // ── 2. Nettoyage automatique (après le snapshot) ─────────────────────
    if (autoCleanup && currentDay >= cleanupDay && !autoCleanupDoneRef.current) {
      const blockers = cleanupBlockers(transactions, accounts, cardDebitDates);
      if (blockers.length > 0) {
        dbg(`🚫 Nettoyage auto bloqué — ${blockers.length} raison(s)`);
        setAutoCleanupBlockedReasons(blockers);
      } else {
        dbg(`🧹 Nettoyage auto déclenché (jour ${currentDay} >= ${cleanupDay})`);
        autoCleanupDoneRef.current = true;
        doCleanup(cardDebitDates, benefitData);
      }
    }
  }, [ready, autoCleanup, cleanupDay, cardDebitDates, benefitData, doCleanup, cleanupBlockers, transactions, accounts]);

  // ── Benefit reconciliation batch ─────────────────────────────────────────
  // Runs once after Firestore data is fully loaded.
  // Processes TR expenses without _checked flag (injected by Firebase Function or
  // imported externally) and splits them against dailyCap + available balance,
  // creating overflow card transactions where needed.
  // Expenses are processed oldest-first so multi-day gaps are handled correctly.
  useEffect(() => {
    if (!ready || !loadedRef.current || !trustedRef.current) return;

    const benefitAccounts = accounts.filter(a =>
      a.type === "benefit" && a.dailyCap > 0 && a.overflowAccountId
    );
    if (benefitAccounts.length === 0) return;

    let bdChanged      = false;
    let newCardTxs     = [];
    const nextBd       = { ...benefitData };

    benefitAccounts.forEach(acc => {
      const acct         = nextBd[acc.id] || { allotments: {}, expenses: [] };
      const unchecked    = acct.expenses.filter(e => !e._checked);
      if (unchecked.length === 0) return;

      const overflowAcct = accounts.find(a => a.id === acc.overflowAccountId);
      if (!overflowAcct) return;

      // Sort unchecked oldest-first
      const sorted = [...unchecked].sort((a, b) => a.date.localeCompare(b.date));

      // Build a mutable map of checked expenses to track running state
      // (checked expenses are already correct — don't touch them)
      let checkedExpenses = acct.expenses.filter(e => e._checked).map(e => ({ ...e }));

      // Helper: compute running solde up to (not including) a given expense
      // using only already-checked expenses and the allotments
      const runSolde = (upToDate, upToId) => {
        // Carry-over from all months strictly before the expense's month
        const mk = mKey(upToDate);
        const allMonths = new Set([
          ...Object.keys(acct.allotments || {}),
          ...checkedExpenses.map(e => mKey(e.date)),
        ]);
        const pastMonths = [...allMonths].filter(m => m < mk).sort();
        let carry = 0;
        for (const m of pastMonths) {
          const allotted = allotmentAmount(acct.allotments?.[m]);
          const spent    = checkedExpenses.filter(e => mKey(e.date) === m).reduce((s, e) => s + e.amount, 0);
          carry = Math.max(0, carry + allotted - spent);
        }
        // Add allotment of current month
        const allottedCur = allotmentAmount(acct.allotments?.[mk]);
        // Subtract checked expenses of current month up to (not including) this expense
        const spentCur = checkedExpenses
          .filter(e => mKey(e.date) === mk && e.date <= upToDate && e.id !== upToId)
          .reduce((s, e) => s + e.amount, 0);
        return carry + allottedCur - spentCur;
      };

      // Helper: daily cap already consumed on a given date among checked expenses
      const dailyConsumed = (date) =>
        checkedExpenses.filter(e => e.date === date).reduce((s, e) => s + e.amount, 0);

      const updatedExpenses = [...checkedExpenses]; // will hold all expenses after processing

      sorted.forEach(exp => {
        const solde      = Math.max(0, runSolde(exp.date, exp.id));
        const capRestant = Math.max(0, Math.round((acc.dailyCap - dailyConsumed(exp.date)) * 100) / 100);
        const partTR     = Math.round(Math.min(exp.amount, capRestant, solde) * 100) / 100;
        const partCarte  = Math.round((exp.amount - partTR) * 100) / 100;

        // Update the TR expense: clamp to partTR and mark checked
        const checkedExp = { ...exp, amount: partTR > 0 ? partTR : exp.amount, _checked: true };
        // If partTR is 0 (solde épuisé + plafond épuisé), keep original amount as 0
        // Actually: if partTR===0 we still keep the expense but at 0 so it's visible
        // Better: remove if 0, full amount goes to card
        if (partTR > 0) {
          checkedExpenses = [...checkedExpenses, { ...exp, amount: partTR, _checked: true }];
          updatedExpenses.push({ ...exp, amount: partTR, _checked: true });
        }
        // else: TR expense fully overflows — don't keep it in benefitData

        // Create card transaction for the overflow
        if (partCarte > 0) {
          newCardTxs.push({
            title:     exp.title,
            amount:    partCarte,
            type:      "expense",
            date:      exp.date,
            accountId: acc.overflowAccountId,
            isCard:    !!overflowAcct.cardName,
            pointed:   false,
          });
        }

        bdChanged = true;
      });

      // Replace expenses: checked ones + updated unchecked ones (without the originals)
      nextBd[acc.id] = {
        ...acct,
        expenses: updatedExpenses,
      };
    });

    if (!bdChanged) return;

    dbg(`🔄 Batch TR — rectification de ${newCardTxs.length} transaction(s) carte`);
    setBenefitData(nextBd);
    if (newCardTxs.length > 0) {
      setTx(prev => [...newCardTxs.map(t => ({ ...t, id: genId() })), ...prev]);
    }
  }, [ready]); // runs once after initial load

  const saveUiPref = useCallback((key, value) => {
    if (!uid || !trustedRef.current) return;
    const updated = { ...uiPrefs, [key]: value };
    setUiPrefs(updated);
    if (key === 'yfProxyUrl') _yfProxyUrl = value || YF_PROXY_URL;
    // Update lastSaveAt only after the write completes to avoid blocking unrelated
    // external snapshots (e.g. from another device) during the Firestore round-trip.
    fbSave(uid, { uiPrefs: updated }).then(() => { lastSaveAt.current = Date.now(); }).catch(() => {});
  }, [uid, uiPrefs]);

  // Sync _yfProxyUrl dès que uiPrefs est chargé depuis Firestore
  useEffect(() => {
    _yfProxyUrl = uiPrefs?.yfProxyUrl || YF_PROXY_URL;
  }, [uiPrefs?.yfProxyUrl]);

  return { ready, transactions, add, remove, update, togglePointed,
    templates, addTplItem, removeTplItem, updateTplItem, applyTemplate,
    accounts, addAccount, removeAccount, updateAccount, moveAccount,
    cleanupDay, updateCleanupDay, autoCleanup, updateAutoCleanup, cleanupMonth, checkCleanupBlockers,
    autoCleanupBlockedReasons, clearAutoCleanupBlockedReasons: () => setAutoCleanupBlockedReasons(null),
    savingsHistory, addSavingsSnapshot, updateSavingsSnapshot, removeSavingsSnapshot,
    checkingHistory, addCheckingSnapshot, removeCheckingSnapshot,
    savingsSnapDays, setSavingsSnapDays, savingsSnapActive, setSavingsSnapActive,
    cardDebitDates, setCardDebitDate, clearCardDebitDate,
    showFutureTx, setShowFutureTx,
    benefitData, setBenefitAllotment, clearBenefitAllotment, addBenefitExpense, removeBenefitExpense, updateBenefitExpense,
    uiPrefs, saveUiPref,
    isDemo, slowConnection, retry: () => setRetryCount(c => c+1),
    saveError, clearSaveError: () => { setSaveError(false); if (saveErrorTimer.current) { clearTimeout(saveErrorTimer.current); saveErrorTimer.current = null; } } };
}

// ─── Magic Word Hash (SHA-256 — le mot n'apparaît pas en clair) ────────────
// Le mot de passe démo est stocké sous forme de paires [index, charCode]
// mélangées — non lisible directement, reconstruit à l'exécution uniquement
// après validation du mot magique.
const _dp = () => { const p=[[0,68],[3,111],[7,52],[2,109],[1,101],[6,51],[4,49],[5,50],[8,33]]; return p.sort((a,b)=>a[0]-b[0]).map(x=>String.fromCharCode(x[1])).join(""); };
const DEMO_MAGIC_HASH = "4c3a8520131aa73f453d04a72434d92727d8d002465ac5716bdf0dd02d971951";

async function hashString(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

// ─── Modale Mot Magique ────────────────────────────────────────────────────
function MagicWordModal({ onSuccess, onClose }) {
  const [word, setWord]       = useState("");
  const [error, setError]     = useState("");
  const [shaking, setShaking] = useState(false);
  const inputRef              = React.useRef(null);

  React.useEffect(() => { setTimeout(() => inputRef.current?.focus(), 80); }, []);

  const handleCheck = async () => {
    const hash = await hashString(word.trim().toLowerCase());
    if (hash === DEMO_MAGIC_HASH) {
      onSuccess(); // mot magique validé
    } else {
      setError("✗ Ce n'est pas le bon mot…");
      setShaking(true);
      setTimeout(() => setShaking(false), 500);
      setWord("");
    }
  };

  return (
    <div style={{
      position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", backdropFilter:"blur(4px)",

        borderRadius:"var(--radius)", padding:32, maxWidth:360, width:"100%",
        boxShadow:"0 0 40px rgba(212,175,55,0.15)",

      }}>
        {/* Icône */}
        <div style={{ textAlign:"center", marginBottom:20 }}>
          <div style={{
            display:"inline-flex", alignItems:"center", justifyContent:"center",
            width:64, height:64, borderRadius:"50%",
            background:"linear-gradient(135deg, #2a2208, #3d3010)",
            border:"2px solid var(--gold)", fontSize:28, marginBottom:12
          }}>🗝️</div>
          <p style={{ fontFamily:"'DM Serif Display',serif", fontSize:22, color:"var(--gold)", margin:0 }}>
            Accès restreint
          </p>
          <p style={{ fontSize:13, color:"var(--text-muted)", marginTop:6, lineHeight:1.5 }}>
            Entrez le mot magique pour accéder au mode démo.
          </p>
        </div>

        {/* Champ */}
        <input
          ref={inputRef}
          type="password"
          value={word}
          onChange={e => { setWord(e.target.value); setError(""); }}

          placeholder="Mot magique…"
          style={{
            width:"100%", fontSize:15, padding:"11px 14px", boxSizing:"border-box",
            background:"var(--surface2)", border:`1px solid ${error ? "var(--red)" : "var(--border)"}`,
            borderRadius:"var(--radius-sm)", color:"var(--text)", marginBottom:8,
            textAlign:"center", letterSpacing:"0.15em"
          }}
        />
        {error && <p style={{ fontSize:12, color:"var(--red)", textAlign:"center", marginBottom:8 }}>{error}</p>}

        {/* Boutons */}
        <div style={{ display:"flex", gap:10, marginTop:4 }}>
          <button onClick={onClose} style={{
            flex:1, padding:"11px", borderRadius:"var(--radius-sm)",
            background:"var(--surface2)", border:"1px solid var(--border)",
            color:"var(--text-muted)", fontSize:14, fontWeight:600, cursor:"pointer"
          }}>Annuler</button>
          <button onClick={handleCheck} style={{
            flex:2, padding:"11px", borderRadius:"var(--radius-sm)",
            background:"linear-gradient(135deg, var(--gold-light), var(--gold))",
            border:"none", color:"#0e0f13", fontSize:14, fontWeight:700, cursor:"pointer"
          }}>✨ Entrer</button>
        </div>
      </div>

      <style>{`
        @keyframes fadeInUp {
          from { opacity:0; transform:translateY(16px); }
          to   { opacity:1; transform:translateY(0); }
        }
        @keyframes shake {
          0%,100% { transform:translateX(0); }

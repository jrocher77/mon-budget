                  </p>
                </div>
              )}
              {store.cleanupDay === 31 && (
                <div style={{ display:"flex", gap:8, padding:"9px 12px", background:"rgba(201,168,76,0.08)", border:"1px solid rgba(201,168,76,0.25)", borderRadius:8, marginBottom:12 }}>
                  <span style={S.fs13shrink0}>⚠️</span>
                  <p style={{ fontSize:12, color:"var(--text-muted)", lineHeight:1.5 }}>
                    Le nettoyage automatique pourrait ne pas fonctionner certains mois — avril, juin, septembre, novembre et février ne comptent pas de 31e jour.
                  </p>
                </div>
              )}
            </div>

            <button onClick={handleCleanupClick} style={{ width:"100%", padding:"10px", borderRadius:"var(--radius-sm)", background:"var(--red-dim)", border:"1px solid var(--red)", color:"var(--red)", fontSize:13, fontWeight:600 }}>
              🗑️ Nettoyer les mois précédents maintenant
            </button>
          </div>
        </Section>

        {/* Snapshots épargne */}
        <Section title="Snapshots épargne" icon="💰">
          <div style={S.pad1416}>
            {/* Toggle activation */}
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
              <div>
                <p style={S.fs14fw500}>Snapshots automatiques</p>
                <p style={{ fontSize:12, color:"var(--text-muted)", marginTop:2 }}>
                  {store.savingsSnapActive ? "Actifs — l'épargne est enregistrée automatiquement" : "Inactifs — aucun snapshot automatique"}
                </p>
              </div>
              <Toggle checked={store.savingsSnapActive} onChange={()=>store.setSavingsSnapActive(!store.savingsSnapActive)} />
            </div>

            {/* Sélecteur des jours */}
            <div style={{ opacity: store.savingsSnapActive ? 1 : 0.4, pointerEvents: store.savingsSnapActive ? "auto" : "none", transition:"opacity 0.2s" }}>
              <p style={{ fontSize:11, fontWeight:600, color:"var(--text-sub)", letterSpacing:"0.07em", textTransform:"uppercase", marginBottom:10 }}>
                Jours de snapshot — {store.savingsSnapDays.length} sélectionné{store.savingsSnapDays.length > 1 ? "s" : ""}
              </p>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(7, 1fr)", gap:5 }}>
                {Array.from({length:31}, (_,i) => i+1).map(day => {
                  const selected = store.savingsSnapDays.includes(day);
                  const toggle   = () => {
                    if (selected) {
                      store.setSavingsSnapDays(store.savingsSnapDays.filter(d => d !== day));
                    } else {
                      store.setSavingsSnapDays([...store.savingsSnapDays, day].sort((a,b)=>a-b));
                    }
                  };
                  return (
                    <button key={day} onClick={toggle}
                      style={{ padding:"7px 2px", borderRadius:7, border:"1px solid", fontSize:12, fontWeight:600, textAlign:"center",
                        borderColor: selected ? "var(--gold)" : "var(--border)",
                        background:  selected ? "var(--gold-dim)" : "var(--bg)",
                        color:       selected ? "var(--gold)" : "var(--text-muted)",
                        transition:  "all 0.15s" }}>
                      {day}
                    </button>
                  );
                })}
              </div>
              {store.savingsSnapDays.some(d => d === 29 || d === 30) && !store.savingsSnapDays.includes(31) && (
                <div style={{ display:"flex", gap:8, padding:"9px 12px", background:"rgba(201,168,76,0.08)", border:"1px solid rgba(201,168,76,0.25)", borderRadius:8, marginTop:10 }}>
                  <span style={S.fs13shrink0}>⚠️</span>
                  <p style={{ fontSize:12, color:"var(--text-muted)", lineHeight:1.5 }}>
                    Le snapshot automatique du {store.savingsSnapDays.filter(d => d === 29 || d === 30).join(" et du ")} pourrait ne pas se déclencher en février.
                  </p>
                </div>
              )}
              {store.savingsSnapDays.includes(31) && (
                <div style={{ display:"flex", gap:8, padding:"9px 12px", background:"rgba(201,168,76,0.08)", border:"1px solid rgba(201,168,76,0.25)", borderRadius:8, marginTop:10 }}>
                  <span style={S.fs13shrink0}>⚠️</span>
                  <p style={{ fontSize:12, color:"var(--text-muted)", lineHeight:1.5 }}>
                    Le snapshot automatique du 31 pourrait ne pas se déclencher certains mois — avril, juin, septembre, novembre et février ne comptent pas de 31e jour.
                    {store.savingsSnapDays.some(d => d === 29 || d === 30) && ` Les jours ${store.savingsSnapDays.filter(d => d === 29 || d === 30).join(" et ")} pourraient également ne pas se déclencher en février.`}
                  </p>
                </div>
              )}
            </div>
          </div>
        </Section>

        {/* Données */}
        <Section title="Données" icon="💾">
          <div style={S.pad1416}>
            <p style={{ fontSize:13, color:"var(--text-muted)", marginBottom:4 }}>{store.transactions.length} transactions · synchronisées sur Firebase</p>
            <p style={{ fontSize:12, color:"var(--text-sub)", marginBottom:12 }}>Connecté en tant que {user.email}</p>
            {store.isDemo && (
              <button onClick={handleDemoReset} disabled={resetting}
                style={{ width:"100%", padding:"10px", borderRadius:"var(--radius-sm)", background:"rgba(201,168,76,0.1)", border:"1px solid var(--gold)", color:"var(--gold)", fontSize:13, fontWeight:600, marginBottom:10, opacity: resetting ? 0.6 : 1 }}>
                {resetting ? "⏳ Réinitialisation…" : "🔄 Réinitialiser les données démo"}
              </button>
            )}
            <button onClick={handleLogout} style={{ width:"100%", padding:"10px", borderRadius:"var(--radius-sm)", background:"var(--red-dim)", border:"1px solid var(--red)", color:"var(--red)", fontSize:13, fontWeight:600 }}>
              🚪 Se déconnecter
            </button>
          </div>
        </Section>
      </div>

      {showAdd && <TplAddModal onClose={()=>setShowAdd(false)} onSave={item=>{store.addTplItem(activeAccountId, activeParity, item);setShowAdd(false);}} />}
      {showAddAccModal && <AddAccountModal store={store} onClose={()=>setShowAddAccModal(false)} />}
      {editingTplItem && <TplAddModal item={editingTplItem.item} onClose={()=>setEditingTplItem(null)} onSave={updates=>{store.updateTplItem(activeAccountId, editingTplItem.parity, editingTplItem.item.id, updates);setEditingTplItem(null);}} />}

      {showCleanupConfirm && (
        <div style={S.overlay}
          onClick={e=>e.target===e.currentTarget&&setShowCleanupConfirm(false)}>
          <div className="scale-in" style={{ width:"100%", maxWidth:400, background:"var(--surface)", borderRadius:"var(--radius)", border:"1px solid var(--border)", padding:24 }}>
            <p style={S.modalTitle}>{cleanupMessage.isBlocked ? "⚠️ Nettoyage bloqué" : "Confirmation"}</p>
            {cleanupMessage.isBlocked ? (
              <div style={{ marginBottom:20 }}>
                {cleanupMessage.text.split("\n").filter(l=>l.trim()).map((line, i) => (
                  <p key={i} style={{ fontSize:13, color: line.startsWith("•") ? "var(--red)" : "var(--text-muted)", lineHeight:1.6, marginBottom: line.startsWith("•") ? 4 : 8, paddingLeft: line.startsWith("•") ? 4 : 0, fontWeight: line.startsWith("•") ? 600 : 400 }}>
                    {line}
                  </p>
                ))}
              </div>
            ) : (
              <p style={{ fontSize:14, color:"var(--text-muted)", marginBottom:20, lineHeight:1.6 }}>{cleanupMessage.text}</p>
            )}
            <div style={S.gap10}>
              <button onClick={()=>setShowCleanupConfirm(false)} style={{ flex:1, padding:"10px", borderRadius:"var(--radius-sm)", background:"var(--surface2)", border:"1px solid var(--border)", color:"var(--text)", fontSize:14, fontWeight:600 }}>
                {cleanupMessage.isBlocked ? "Fermer" : "Annuler"}
              </button>
              {cleanupMessage.canDelete && <button onClick={confirmCleanup} style={{ flex:1, padding:"10px", borderRadius:"var(--radius-sm)", background:"var(--red)", border:"none", color:"#fff", fontSize:14, fontWeight:600 }}>Supprimer</button>}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Small components ──────────────────────────────────────────────────────
function Section({ title, icon, children }) {
  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:8 }}>
        <span style={{ fontSize:14 }}>{icon}</span>
        <p style={{ fontSize:12, fontWeight:700, color:"var(--text-sub)", textTransform:"uppercase", letterSpacing:"0.08em" }}>{title}</p>
      </div>
      <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:"var(--radius)", overflow:"hidden" }}>{children}</div>
    </div>
  );
}

function Toggle({ checked, onChange }) {
  return (
    <button onClick={onChange} style={{ width:48,height:26, borderRadius:13, background:checked?"var(--gold)":"var(--surface3)", border:"none", position:"relative", transition:"background 0.25s", flexShrink:0 }}>
      <div style={{ width:20,height:20, borderRadius:"50%", background:"#fff", position:"absolute", top:3, left:checked?25:3, transition:"left 0.25s", boxShadow:"0 1px 4px rgba(0,0,0,0.3)" }} />
    </button>
  );
}


// ─── AddAccountModal ───────────────────────────────────────────────────────
function AddAccountModal({ store, onClose }) {
  const [accType,       setAccType]       = React.useState("checking");
  const [accName,       setAccName]       = React.useState("");
  const [savingsSubtype, setSavingsSubtype] = React.useState("available");
  const hasBenefit = store.accounts.some(a => a.type === "benefit");

  const handleConfirm = () => {
    const name = accName.trim() || null;
    store.addAccount({ type: accType, name, savingsSubtype: accType === "savings" ? savingsSubtype : undefined });
    onClose();
  };

  return (
    <div style={{ position:"fixed", inset:0, zIndex:200, display:"flex", alignItems:"flex-end", background:"rgba(0,0,0,0.55)" }}
      onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div style={{ width:"100%", maxWidth:500, margin:"0 auto", background:"var(--surface)", borderRadius:"var(--radius) var(--radius) 0 0", padding:"20px 20px 32px", display:"flex", flexDirection:"column", gap:16 }}>
        {/* Handle */}
        <div style={{ width:36, height:4, borderRadius:2, background:"var(--border2)", margin:"0 auto -8px" }} />
        <p style={{ fontSize:16, fontWeight:700, textAlign:"center" }}>➕ Nouveau compte</p>

        {/* Choix du type */}
        <div>
          <p style={{ fontSize:11, fontWeight:700, color:"var(--text-sub)", textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:8 }}>Type de compte</p>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
            {[["checking","💳","Courant"],["savings","💰","Épargne"],["benefit","🎫","Avantage"]].map(([type,icon,label])=>{
              const isCurrent = accType === type;
              const isDisabled = type === "benefit" && hasBenefit;
              return (
                <button key={type} onClick={()=>{ if(!isDisabled) setAccType(type); }}
                  title={isDisabled ? "Un seul compte Avantage est autorisé" : undefined}
                  style={{ padding:"12px 6px", borderRadius:"var(--radius-sm)", border:"1px solid",
                    borderColor:isCurrent?"var(--gold)":"var(--border)",
                    background:isCurrent?"var(--gold-dim)":"var(--surface2)",
                    color:isCurrent?"var(--gold)":isDisabled?"var(--text-sub)":"var(--text-muted)",
                    fontSize:13, fontWeight:600, opacity:isDisabled?0.4:1,
                    cursor:isDisabled?"not-allowed":"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
                  <span style={{ fontSize:20 }}>{icon}</span>
                  <span>{label}</span>
                </button>
              );
            })}
          </div>
        </div>

        {/* Sous-type épargne */}
        {accType === "savings" && (
          <div>
            <p style={{ fontSize:11, fontWeight:700, color:"var(--text-sub)", textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:8 }}>Disponibilité</p>
            <div style={S.grid2col8}>
              {[["available","var(--green)","var(--green-dim)","✓ Disponible"],["blocked","var(--red)","var(--red-dim)","🔒 Bloquée"]].map(([st,col,bg,lbl])=>(
                <button key={st} onClick={()=>setSavingsSubtype(st)}
                  style={{ padding:"10px", borderRadius:"var(--radius-sm)", border:"1px solid",
                    borderColor:savingsSubtype===st?col:"var(--border)",
                    background:savingsSubtype===st?bg:"var(--surface2)",
                    color:savingsSubtype===st?col:"var(--text-muted)",
                    fontSize:12, fontWeight:600 }}>{lbl}</button>
              ))}
            </div>
          </div>
        )}

        {/* Nom */}
        <div>
          <p style={{ fontSize:11, fontWeight:700, color:"var(--text-sub)", textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:8 }}>Nom du compte</p>
          <input value={accName} onChange={e=>setAccName(e.target.value)}
            placeholder={accType==="checking"?"ex : Compte principal":accType==="savings"?"ex : Livret A":"ex : Ticket Restaurant"}
            style={{ width:"100%", fontSize:14, padding:"10px 12px", background:"var(--bg)", border:"1px solid var(--border)", borderRadius:8, color:"var(--text)" }} />
        </div>

        {/* Boutons */}
        <div style={{ display:"flex", gap:10, marginTop:4 }}>
          <button onClick={onClose}
            style={{ flex:1, padding:"12px", borderRadius:"var(--radius-sm)", background:"var(--surface2)", border:"1px solid var(--border)", color:"var(--text-muted)", fontSize:14, fontWeight:600 }}>Annuler</button>
          <button onClick={handleConfirm}
            style={{ flex:2, padding:"12px", borderRadius:"var(--radius-sm)", background:"linear-gradient(135deg,var(--gold-light),var(--gold))", border:"none", color:"#0e0f13", fontSize:14, fontWeight:700 }}>✓ Créer</button>
        </div>
      </div>
    </div>
  );
}

// ─── AccountRow ────────────────────────────────────────────────────────────
function AccountRow({ acc, store, editingAccounts, accountRowSize }) {
  const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);
  const sameType  = store.accounts.filter(a => a.type === acc.type);
  const idx       = sameType.findIndex(a => a.id === acc.id);
  const isFirst   = idx === 0;
  const isLast    = idx === sameType.length - 1;
  const canDelete = store.accounts.length > 1;
  const txCount   = store.transactions.filter(t => t.accountId === acc.id).length;

  const handleDeleteClick = () => {
    if (!canDelete) return;
    if (txCount > 0) { setShowDeleteConfirm(true); }
    else { store.removeAccount(acc.id); }
  };

  const rs = ACCOUNT_ROW_SIZES[accountRowSize] || ACCOUNT_ROW_SIZES.normal;
  return (
    <div style={{ background:"var(--surface2)", borderRadius:"var(--radius-sm)", padding:rs.padding }}>
      {!editingAccounts ? (
        <div style={{ display:"flex", alignItems:"center", gap:rs.gap }}>
          <span style={{ fontSize:rs.iconSize }}>{acc.type==="savings"?"💰":acc.type==="benefit"?"🎫":"💳"}</span>
          <div style={S.flex1}>
            <p style={{ fontSize:rs.nameSize, fontWeight:500 }}>{acc.name}</p>
            <p style={{ fontSize:rs.subSize, color:"var(--text-muted)" }}>
              {acc.type==="savings"
                ? (acc.savingsSubtype==="blocked" ? "🔒 Bloquée — " : "✓ Disponible — ") + fmtEur(acc.balance)
                : acc.type==="benefit"
                  ? "Avantage salarial"
                  : "Compte courant"}
            </p>
          </div>
        </div>
      ) : (
        <div style={S.flexCol8}>
          {/* Nom + boutons ordre + supprimer */}
          <div style={{ display:"flex", gap:6 }}>
            <input value={acc.name} onChange={e=>store.updateAccount(acc.id,{name:e.target.value})} placeholder="Nom du compte"
              style={{ flex:1, fontSize:14, padding:"8px 10px", background:"var(--bg)", border:"1px solid var(--border)", borderRadius:8, color:"var(--text)" }} />
            {/* Boutons déplacement (uniquement si plusieurs comptes du même type) */}
            {sameType.length > 1 && (
              <div style={{ display:"flex", flexDirection:"column", gap:3 }}>
                <button onClick={()=>store.moveAccount(acc.id,-1)} disabled={isFirst}
                  style={{ padding:"3px 8px", borderRadius:6, background:"var(--surface3)", border:"1px solid var(--border)", color:isFirst?"var(--text-sub)":"var(--text)", fontSize:12, opacity:isFirst?0.3:1, lineHeight:1 }}>▲</button>
                <button onClick={()=>store.moveAccount(acc.id,1)} disabled={isLast}
                  style={{ padding:"3px 8px", borderRadius:6, background:"var(--surface3)", border:"1px solid var(--border)", color:isLast?"var(--text-sub)":"var(--text)", fontSize:12, opacity:isLast?0.3:1, lineHeight:1 }}>▼</button>
              </div>
            )}
            <button onClick={handleDeleteClick} disabled={!canDelete}
              style={{ padding:"8px 12px", borderRadius:8, background:"var(--red-dim)", border:"1px solid var(--red)", color:"var(--red)", fontSize:13, fontWeight:600, opacity:canDelete?1:0.4, alignSelf:"stretch" }}>✕</button>
          </div>
          {/* Type courant / épargne / avantage */}
          {(() => {
            const existingBenefit = store.accounts.find(a => a.type === "benefit" && a.id !== acc.id);
            return (
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:6 }}>
                {[["checking","💳 Courant"],["savings","💰 Épargne"],["benefit","🎫 Avantage"]].map(([type,label])=>{
                  const isCurrent  = acc.type === type;
                  const isDisabled = type === "benefit" && !!existingBenefit && !isCurrent;
                  return (
                    <button key={type}
                      onClick={()=>{ if (!isDisabled) store.updateAccount(acc.id,{type}); }}
                      title={isDisabled ? "Un seul compte Avantage est autorisé" : undefined}
                      style={{ padding:"8px", borderRadius:8, border:"1px solid",
                        borderColor:isCurrent?"var(--gold)":"var(--border)",
                        background:isCurrent?"var(--gold-dim)":"var(--bg)",
                        color:isCurrent?"var(--gold)":isDisabled?"var(--text-sub)":"var(--text-muted)",
                        fontSize:12, fontWeight:600,
                        opacity:isDisabled?0.4:1, cursor:isDisabled?"not-allowed":"pointer" }}>{label}</button>
                  );
                })}
              </div>
            );
          })()}
          {/* Sous-type épargne (disponible / bloquée) */}
          {acc.type==="savings" && (
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:6 }}>
              <button onClick={()=>store.updateAccount(acc.id,{savingsSubtype:"available"})}
                style={{ padding:"8px", borderRadius:8, border:"1px solid", borderColor:(acc.savingsSubtype||"available")==="available"?"var(--green)":"var(--border)", background:(acc.savingsSubtype||"available")==="available"?"var(--green-dim)":"var(--bg)", color:(acc.savingsSubtype||"available")==="available"?"var(--green)":"var(--text-muted)", fontSize:12, fontWeight:600 }}>✓ Disponible</button>
              <button onClick={()=>store.updateAccount(acc.id,{savingsSubtype:"blocked"})}
                style={{ padding:"8px", borderRadius:8, border:"1px solid", borderColor:acc.savingsSubtype==="blocked"?"var(--red)":"var(--border)", background:acc.savingsSubtype==="blocked"?"var(--red-dim)":"var(--bg)", color:acc.savingsSubtype==="blocked"?"var(--red)":"var(--text-muted)", fontSize:12, fontWeight:600 }}>🔒 Bloquée</button>
            </div>
          )}
          {/* Carte à débit différé (comptes courants uniquement) */}
          {acc.type==="checking" && (
            <div>
              <label style={{ fontSize:11, fontWeight:600, color:"var(--text-sub)", textTransform:"uppercase", letterSpacing:"0.06em", display:"block", marginBottom:4 }}>💳 Carte à débit différé</label>
              <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                <input
                  value={acc.cardName||""}
                  onChange={e=>store.updateAccount(acc.id,{cardName:e.target.value})}
                  placeholder="Nom de la carte (ex: Visa SG) — laisser vide si aucune"
                  style={{ flex:1, fontSize:13, padding:"8px 10px", background:"var(--bg)", border:"1px solid var(--border)", borderRadius:8, color:"var(--text)" }}
                />
                {acc.cardName && (
                  <button onClick={()=>store.updateAccount(acc.id,{cardName:""})}
                    style={{ padding:"7px 10px", borderRadius:8, background:"var(--red-dim)", border:"1px solid var(--red)", color:"var(--red)", fontSize:12, fontWeight:600, whiteSpace:"nowrap" }}>
                    ✕ Retirer
                  </button>
                )}
              </div>
              {acc.cardName && <p style={{ fontSize:11, color:"var(--text-sub)", marginTop:4 }}>Les dépenses carte apparaîtront dans un panneau dédié sur le tableau de bord.</p>}
            </div>
          )}
          {/* Valeur unitaire par défaut (avantages uniquement) */}
          {acc.type==="benefit" && (
            <div>
              <label style={{ fontSize:11, fontWeight:600, color:"var(--text-sub)", textTransform:"uppercase", letterSpacing:"0.06em", display:"block", marginBottom:4 }}>Valeur unitaire d'un titre (€)</label>
              <input type="number" step="0.01" min="0" value={acc.defaultUnitValue||""} onChange={e=>store.updateAccount(acc.id,{defaultUnitValue:parseFloat(e.target.value)||0})} placeholder="ex : 9.25"
                inputMode="decimal"
                style={{ width:"100%", fontSize:14, padding:"8px 10px", background:"var(--bg)", border:"1px solid var(--border)", borderRadius:8, color:"var(--text)" }} />
              <p style={{ fontSize:11, color:"var(--text-sub)", marginTop:4 }}>Pré-remplie lors de la saisie d'une dotation.</p>
            </div>
          )}
          {/* Plafond journalier + compte de report (avantages uniquement) */}
          {acc.type==="benefit" && (
            <div style={S.flexCol8}>
              <div>
                <label style={{ fontSize:11, fontWeight:600, color:"var(--text-sub)", textTransform:"uppercase", letterSpacing:"0.06em", display:"block", marginBottom:4 }}>Plafond journalier (€) <span style={{ fontWeight:400, textTransform:"none" }}>— optionnel</span></label>
                <input type="number" step="0.01" min="0" value={acc.dailyCap||""} onChange={e=>store.updateAccount(acc.id,{dailyCap:parseFloat(e.target.value)||0})} placeholder="ex : 25.00"
                  inputMode="decimal"
                  style={{ width:"100%", fontSize:14, padding:"8px 10px", background:"var(--bg)", border:"1px solid var(--border)", borderRadius:8, color:"var(--text)" }} />
              </div>
              {acc.dailyCap > 0 && (
                <div>
                  <label style={{ fontSize:11, fontWeight:600, color:"var(--text-sub)", textTransform:"uppercase", letterSpacing:"0.06em", display:"block", marginBottom:4 }}>Compte de report de la différence</label>
                  <select value={acc.overflowAccountId||""} onChange={e=>store.updateAccount(acc.id,{overflowAccountId:e.target.value})}
                    style={{ width:"100%", fontSize:13, padding:"8px 10px", background:"var(--bg)", border:"1px solid var(--border)", borderRadius:8, color:"var(--text)" }}>
                    <option value="" style={{ background:"var(--select-bg)" }}>— Aucun —</option>
                    {store.accounts.filter(a=>a.type==="checking").map(a=>(
                      <option key={a.id} value={a.id} style={{ background:"var(--select-bg)" }}>💳 {a.name}{a.cardName ? ` · ${a.cardName}` : ""}</option>
                    ))}
                  </select>
                  {acc.overflowAccountId && <p style={{ fontSize:11, color:"var(--text-sub)", marginTop:4 }}>La différence au-delà du plafond ou du solde sera créée comme dépense carte sur ce compte.</p>}
                </div>
              )}
            </div>
          )}
          {/* Solde (épargne uniquement) */}
          {acc.type==="savings" && (
            <div>
              <label style={{ fontSize:11, fontWeight:600, color:"var(--text-sub)", textTransform:"uppercase", letterSpacing:"0.06em", display:"block", marginBottom:4 }}>Solde</label>
              <input type="number" step="0.01" value={acc.balance||0} onChange={e=>store.updateAccount(acc.id,{balance:parseFloat(e.target.value)||0})} placeholder="0.00"
                style={{ width:"100%", fontSize:14, padding:"8px 10px", background:"var(--bg)", border:"1px solid var(--border)", borderRadius:8, color:"var(--text)" }} />
            </div>
          )}
        </div>
      )}

      {showDeleteConfirm && (
        <div style={S.overlay}
          onClick={e=>e.target===e.currentTarget&&setShowDeleteConfirm(false)}>
          <div className="scale-in" style={{ width:"100%", maxWidth:400, background:"var(--surface)", borderRadius:"var(--radius)", border:"1px solid var(--border)", padding:24 }}>
            <p style={S.modalTitle}>Supprimer le compte</p>
            <p style={{ fontSize:14, color:"var(--text-muted)", marginBottom:20, lineHeight:1.6 }}>
              Le compte « {acc.name} » contient <strong style={{ color:"var(--red)" }}>{txCount} transaction{txCount>1?"s":""}</strong> qui {txCount>1?"seront également supprimées":"sera également supprimée"}.
            </p>
            <div style={S.gap10}>
              <button onClick={()=>setShowDeleteConfirm(false)} style={{ flex:1, padding:"10px", borderRadius:"var(--radius-sm)", background:"var(--surface2)", border:"1px solid var(--border)", color:"var(--text)", fontSize:14, fontWeight:600 }}>Annuler</button>
              <button onClick={()=>{store.removeAccount(acc.id);setShowDeleteConfirm(false);}} style={{ flex:1, padding:"10px", borderRadius:"var(--radius-sm)", background:"var(--red)", border:"none", color:"#fff", fontSize:14, fontWeight:600 }}>Supprimer</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

      {hover && <button onClick={onDelete} style={{ background:"var(--red-dim)", border:"none", borderRadius:7, width:26,height:26, display:"flex", alignItems:"center", justifyContent:"center", color:"var(--red)", fontSize:13, flexShrink:0 }}>✕</button>}

  const [type,setType]=useState(item?.type||"expense");
  const [title,setTitle]=useState(item?.title||"");
  const [amount,setAmount]=useState(item?.amount?.toString()||"");
  const [day,setDay]=useState(String(item?.day||"1"));

  const [error,setError]=useState("");
  const handleSave=()=>{
    if(!title.trim()) return setError("Veuillez saisir un libellé.");
    const amt=parseFloat(amount.replace(",","."));
    if(isNaN(amt)||amt<=0) return setError("Montant invalide.");
    onSave({title:title.trim(),amount:amt,type,day:parseInt(day,10),note});

  return (
    <div style={S.overlay}
      onClick={e=>e.target===e.currentTarget&&onClose()}>

          <p style={{ fontSize:17, fontWeight:600 }}>{isEditing ? "Modifier l'opération" : "Opération récurrente"}</p>
          <button onClick={onClose} style={{ background:"transparent", border:"none", color:"var(--text-muted)", fontSize:18 }}>✕</button>
        </div>
        <div style={{ padding:"16px 20px", display:"flex", flexDirection:"column", gap:12 }}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:6, background:"var(--surface2)", borderRadius:"var(--radius-sm)", padding:4 }}>
            {[["expense","Dépense","var(--red)"],["income","Revenu","var(--green)"]].map(([v,l,c])=>(
              <button key={v} onClick={()=>setType(v)} style={{ padding:"9px", borderRadius:8, background:type===v?c+"22":"transparent", border:`1px solid ${type===v?c:"transparent"}`, color:type===v?c:"var(--text-muted)", fontSize:14, fontWeight:600 }}>{l}</button>
            ))}
          </div>
          <Field label="Montant">
            <input value={amount} onChange={e=>setAmount(e.target.value)} placeholder="0,00" inputMode="decimal"
              style={{ fontSize:22, fontFamily:"'DM Serif Display',serif", width:"100%", color:type==="expense"?"var(--red)":"var(--green)" }} />
          </Field>
          <Field label="Libellé">
            <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="Ex: Loyer, Salaire…" style={{ fontSize:15, width:"100%" }} />
          </Field>
          <p style={{ fontSize:11, color:"var(--text-sub)", marginTop:-6, paddingLeft:2 }}>
            Variables disponibles : <span style={{ fontFamily:"monospace", color:"var(--gold)", opacity:0.8 }}>$month</span> · <span style={{ fontFamily:"monospace", color:"var(--gold)", opacity:0.8 }}>$Month</span> · <span style={{ fontFamily:"monospace", color:"var(--gold)", opacity:0.8 }}>$mm</span> · <span style={{ fontFamily:"monospace", color:"var(--gold)", opacity:0.8 }}>$year</span>
          </p>
          <Field label="Jour du mois">
            <select value={day} onChange={e=>setDay(e.target.value)} style={{ fontSize:15, width:"100%", background:"var(--select-bg)", color:"var(--text)" }}>
              {Array.from({length:28},(_,i)=>i+1).map(d=>(
                <option key={d} value={d} style={{ background:"var(--select-bg)" }}>{d===1?"1er":d} du mois</option>
              ))}
            </select>
          </Field>
          <Field label="Note (optionnelle)">
            <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="Commentaire…" rows={2} style={{ fontSize:14, width:"100%", resize:"none", lineHeight:1.5 }} />
          </Field>
          {error && <p style={{ color:"var(--red)", fontSize:13 }}>{error}</p>}
          <button onClick={handleSave} style={{ padding:"13px", borderRadius:"var(--radius-sm)", background:"linear-gradient(135deg,var(--gold-light),var(--gold))", border:"none", color:"#0e0f13", fontSize:15, fontWeight:700 }}>{isEditing ? "Enregistrer" : "Ajouter"}</button>

      </div>

// ─── FormModal ─────────────────────────────────────────────────────────────
// Helper : solde d'un compte pour un mois donné (toutes transactions incluses)
function useAccountMonthBalance(store, accountId, monthKey) {
  return useMemo(() => {
    if (!accountId || !monthKey) return null;
    const txs = store.transactions.filter(t => t.accountId === accountId && t.date.slice(0,7) === monthKey);
    const inc = txs.filter(t => t.type === "income").reduce((s,t)=>s+t.amount, 0);
    const exp = txs.filter(t => t.type === "expense").reduce((s,t)=>s+t.amount, 0);
    return inc - exp;
  }, [store.transactions, accountId, monthKey]);
}

function FormModal({ store, account, transaction, onClose, isCardTransaction=false, sel=null }) {
  const isEditing = !!transaction;
  const startAsCard = isCardTransaction || (transaction?.isCard === true);

  // Date par défaut : si sel correspond à un mois futur, on ouvre sur le 1er du mois filtré.
  const defaultDate = (() => {
    if (transaction?.date) return transaction.date;
    const today = new Date().toISOString().split("T")[0];
    if (!sel) return today;
    const nowMk = today.slice(0, 7);
    if (sel > nowMk) return sel + "-01";
    return today;
  })();

  const checkingAccounts = store.accounts.filter(a => a.type === "checking");
  const firstAcctId  = transaction?.accountId || account || checkingAccounts[0]?.id || "";
  const secondAcctId = checkingAccounts.find(a => a.id !== firstAcctId)?.id || "";

  const [mode,      setMode]      = useState(transaction ? (transaction._virementId ? "transfer" : transaction.type) : "expense");
  const [title,     setTitle]     = useState(transaction?.title || "");
  const [amount,    setAmount]    = useState(transaction?.amount?.toString() || "");
  const [srcAcctId, setSrcAcctId] = useState(firstAcctId);
  const [dstAcctId, setDstAcctId] = useState(secondAcctId);
  const [date,      setDate]      = useState(defaultDate);
  const [note,      setNote]      = useState(transaction?.note || "");
  const [asCard,    setAsCard]    = useState(startAsCard);
  const [error,     setError]     = useState("");

  const isTransfer = mode === "transfer";

  // Compte unique (modes dépense/revenu)
  const selAcctId    = srcAcctId;
  const selAcct      = store.accounts.find(a => a.id === selAcctId);
  const acctHasCard  = !isTransfer && selAcct?.type === "checking" && selAcct?.cardName;

  useEffect(() => { if (!acctHasCard) setAsCard(false); }, [selAcctId, acctHasCard]);

  // Ajustement (édition uniquement)
  const [adjValue, setAdjValue] = useState("");
  const [adjSign,  setAdjSign]  = useState("+");
  const adjNum        = parseFloat(adjValue.replace(",","."));
  const baseNum       = parseFloat(amount.replace(",","."));
  const adjResult     = (!isNaN(baseNum) && !isNaN(adjNum) && adjValue.trim() !== "")
    ? (adjSign === "+" ? baseNum + adjNum : baseNum - adjNum) : null;
  const adjResultValid  = adjResult !== null && adjResult !== 0;
  const adjFlipsType    = adjResultValid && adjResult < 0;
  const adjFinalType    = adjFlipsType ? (mode === "expense" ? "income" : "expense") : mode;
  const adjFinalAmt     = adjResultValid ? Math.round(Math.abs(adjResult) * 100) / 100 : null;
  const applyAdj = () => {
    if (!adjResultValid) return;
    setAmount(String(adjFinalAmt));
    if (adjFlipsType) setMode(adjFinalType);
    setAdjValue(""); setAdjSign("+");
  };

  // ── Soldes prévisionnels ────────────────────────────────────────────────
  const dateMKey     = date ? date.slice(0, 7) : null;
  const parsedAmount = parseFloat(amount.replace(",","."));
  const amountValid  = !isNaN(parsedAmount) && parsedAmount > 0;

  const srcBalance = useAccountMonthBalance(store, srcAcctId, dateMKey);
  const dstBalance = useAccountMonthBalance(store, isTransfer ? dstAcctId : null, dateMKey);

  const srcForecast = useMemo(() => {
    if (srcBalance === null || !amountValid) return null;
    let base = srcBalance;
    if (isEditing && !isTransfer) {
      base += transaction.type === "income" ? -transaction.amount : transaction.amount;
    }
    const delta = isTransfer ? -parsedAmount : (mode === "income" ? parsedAmount : -parsedAmount);
    return base + delta;
  }, [srcBalance, amountValid, parsedAmount, mode, isTransfer, isEditing, transaction]);

  const dstForecast = useMemo(() => {
    if (!isTransfer || dstBalance === null || !amountValid) return null;
    return dstBalance + parsedAmount;
  }, [isTransfer, dstBalance, amountValid, parsedAmount]);

  // ── Soumission ──────────────────────────────────────────────────────────
  const handleSubmit = () => {
    if (!title.trim()) return setError("Veuillez saisir un libellé.");
    const amt = parseFloat(amount.replace(",","."));
    if (isNaN(amt) || amt <= 0) return setError("Montant invalide.");
    if (isTransfer) {
      if (!srcAcctId) return setError("Veuillez sélectionner un compte source.");
      if (!dstAcctId) return setError("Veuillez sélectionner un compte destination.");
      if (srcAcctId === dstAcctId) return setError("Les deux comptes doivent être différents.");
      const vid = genId();
      store.add({ title: title.trim(), amount: amt, type: "expense", accountId: srcAcctId, date, note, isCard: false, _virementId: vid });
      store.add({ title: title.trim(), amount: amt, type: "income",  accountId: dstAcctId, date, note, isCard: false, _virementId: vid });
    } else {
      if (!selAcctId) return setError("Veuillez sélectionner un compte.");
      const txData = { title: title.trim(), amount: amt, type: mode, accountId: selAcctId, date, note, isCard: acctHasCard ? asCard : false };
      if (isEditing) store.update(transaction.id, txData);
      else store.add(txData);
    }
    onClose();
  };

  // Couleur du montant selon le mode
  const amountColor = isTransfer ? "var(--text)" : mode === "expense" ? "var(--red)" : "var(--green)";

  useEffect(() => {
    const previousBodyOverflow = document.body.style.overflow;
    const previousHtmlOverflow = document.documentElement.style.overflow;
    document.body.style.overflow = "hidden";
    document.documentElement.style.overflow = "hidden";
    return () => {
      document.body.style.overflow = previousBodyOverflow;
      document.documentElement.style.overflow = previousHtmlOverflow;
    };
  }, []);

  // ── Bandeau soldes prévisionnels (réutilisé à deux endroits selon le mode) ──
  const forecastBand = amountValid && srcForecast !== null && (
    isTransfer ? (
      /* Mode virement : deux colonnes côte à côte */
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
        {[
          { label: store.accounts.find(a=>a.id===srcAcctId)?.name || "Source", current: srcBalance, forecast: srcForecast, delta: srcForecast - srcBalance },
          { label: store.accounts.find(a=>a.id===dstAcctId)?.name || "Destination", current: dstBalance, forecast: dstForecast, delta: dstForecast !== null ? dstForecast - dstBalance : null },
        ].map(({ label, current, forecast, delta }) => (
          forecast !== null && (
            <div key={label} style={{
              padding:"10px 12px", borderRadius:"var(--radius-sm)",
              background: delta >= 0 ? "rgba(72,199,142,0.07)" : "rgba(224,92,92,0.07)",
              border: `1px solid ${delta >= 0 ? "rgba(72,199,142,0.25)" : "rgba(224,92,92,0.25)"}`,
            }}>
              <span style={{ fontSize:10, color:"var(--text-sub)", fontWeight:600, textTransform:"uppercase", letterSpacing:"0.06em", display:"block", marginBottom:4 }}>{label}</span>
              <span style={{ fontSize:18, fontWeight:700, fontFamily:"'DM Serif Display',serif", color: forecast >= 0 ? "var(--green)" : "var(--red)", display:"block", marginBottom:4 }}>{fmtEur(forecast)}</span>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <span style={{ fontSize:10, color:"var(--text-sub)" }}>{fmtEur(current)}</span>
                <span style={{ fontSize:11, fontWeight:700, padding:"1px 6px", borderRadius:5,
                  background: delta > 0 ? "rgba(72,199,142,0.15)" : delta < 0 ? "rgba(224,92,92,0.15)" : "rgba(255,255,255,0.06)",
                  color: delta > 0 ? "var(--green)" : delta < 0 ? "var(--red)" : "var(--text-muted)"
                }}>{delta > 0 ? "+" : ""}{fmtEur(delta)}</span>
              </div>
            </div>
          )
        ))}
      </div>
    ) : (
      /* Mode normal : un seul bandeau */
      <div style={{
        display:"flex", alignItems:"center", justifyContent:"space-between",
        padding:"12px 16px", borderRadius:"var(--radius-sm)",
        background: (srcForecast - srcBalance) >= 0 ? "rgba(72,199,142,0.07)" : "rgba(224,92,92,0.07)",
        border: `1px solid ${(srcForecast - srcBalance) >= 0 ? "rgba(72,199,142,0.25)" : "rgba(224,92,92,0.25)"}`,
        transition:"all 0.2s"
      }}>
        <div style={{ display:"flex", flexDirection:"column", gap:2 }}>
          <span style={{ fontSize:10, color:"var(--text-sub)", fontWeight:600, textTransform:"uppercase", letterSpacing:"0.07em" }}>Solde prévisionnel</span>
          <span style={{ fontSize:22, fontWeight:700, fontFamily:"'DM Serif Display',serif", color: srcForecast >= 0 ? "var(--green)" : "var(--red)", lineHeight:1.1 }}>{fmtEur(srcForecast)}</span>
        </div>
        <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:4 }}>
          <span style={{ fontSize:11, color:"var(--text-sub)" }}>Actuel&nbsp;: <span style={{ color:"var(--text-muted)", fontWeight:600 }}>{fmtEur(srcBalance)}</span></span>
          <span style={{
            fontSize:13, fontWeight:700, padding:"2px 9px", borderRadius:6,
            background: (srcForecast-srcBalance) > 0 ? "rgba(72,199,142,0.15)" : (srcForecast-srcBalance) < 0 ? "rgba(224,92,92,0.15)" : "rgba(255,255,255,0.06)",
            color: (srcForecast-srcBalance) > 0 ? "var(--green)" : (srcForecast-srcBalance) < 0 ? "var(--red)" : "var(--text-muted)"
          }}>{(srcForecast-srcBalance) > 0 ? "+" : ""}{fmtEur(srcForecast-srcBalance)}</span>
        </div>
      </div>
    )
  );

  return (
    <div className="form-modal-overlay"
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="form-modal-sheet sheet-in">
        <div className="form-modal-header">
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 16px", gap:8 }}>
            <p style={{ fontFamily:"'DM Serif Display',serif", fontSize:18, letterSpacing:"-0.02em", color:"var(--header-text)", flex:1, margin:0 }}>{isEditing ? "Modifier" : "Nouvelle transaction"}</p>
            <button onClick={onClose} style={{ background:"var(--surface2)", border:"1px solid var(--border)", borderRadius:8, width:32,height:32, color:"var(--text-muted)", fontSize:16, display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
          </div>
        </div>
        <div className="form-modal-body" style={{ padding:"0 20px", display:"flex", flexDirection:"column", gap:14 }}>

          {/* ── Sélecteur de mode ── */}
          {!isEditing && (
            <div style={{ display:"grid", gridTemplateColumns:isCardTransaction?"1fr 1fr":"1fr 1fr 1fr", gap:6, background:"var(--surface2)", borderRadius:"var(--radius-sm)", padding:4 }}>
              {[["expense","Dépense","var(--red)"],["income","Revenu","var(--green)"],...(isCardTransaction?[]:[["transfer","Virement","var(--gold)"]])].map(([v,l,c])=>(
                <button key={v} onClick={()=>setMode(v)} style={{ padding:"9px", borderRadius:8, background:mode===v?c+"22":"transparent", border:`1px solid ${mode===v?c:"transparent"}`, color:mode===v?c:"var(--text-muted)", fontSize:13, fontWeight:600 }}>{l}</button>
              ))}
            </div>
          )}
          {isEditing && !isTransfer && (
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:6, background:"var(--surface2)", borderRadius:"var(--radius-sm)", padding:4 }}>
              {[["expense","Dépense","var(--red)"],["income","Revenu","var(--green)"]].map(([v,l,c])=>(
                <button key={v} onClick={()=>setMode(v)} style={{ padding:"9px", borderRadius:8, background:mode===v?c+"22":"transparent", border:`1px solid ${mode===v?c:"transparent"}`, color:mode===v?c:"var(--text-muted)", fontSize:14, fontWeight:600 }}>{l}</button>
              ))}
            </div>
          )}

          {/* ── Solde prévisionnel (au-dessus du montant) ── */}
          {forecastBand}

          {/* ── Montant ── */}
          <div style={{ background:"var(--surface2)", border:"1px solid var(--border)", borderRadius:"var(--radius)", padding:"14px 16px" }}>
            <p style={{ fontSize:11, color:"var(--text-sub)", fontWeight:600, letterSpacing:"0.07em", textTransform:"uppercase", marginBottom:6 }}>Montant</p>
            <div style={{ display:"flex", alignItems:"baseline", gap:6 }}>
              <span style={{ fontSize:24, color:"var(--text-muted)", fontFamily:"'DM Serif Display',serif" }}>€</span>
              <input value={amount} onChange={e=>setAmount(e.target.value)} placeholder="0,00" inputMode="decimal"
                style={{ fontSize:34, fontFamily:"'DM Serif Display',serif", flex:1, color:amountColor }} />
            </div>
          </div>

          {/* ── Ajustement (édition uniquement, hors carte et hors report) ── */}
          {isEditing && !transaction?.isCard && !transaction?._transferFrom && !isTransfer && (
            <div style={{ background:"var(--surface2)", border:"1px solid var(--border)", borderRadius:"var(--radius)", padding:"12px 14px" }}>
              <p style={{ fontSize:11, color:"var(--text-sub)", fontWeight:600, letterSpacing:"0.07em", textTransform:"uppercase", marginBottom:10 }}>Ajustement</p>
              <div style={S.flexRow8}>
                <div style={{ display:"flex", flexDirection:"column", gap:4, flexShrink:0 }}>
                  {["+","-"].map(s=>{
                    const isExpense = mode === "expense";
                    const btnColor = s==="+" ? (isExpense?"var(--red)":"var(--green)") : (isExpense?"var(--green)":"var(--red)");
                    const btnBg    = s==="+" ? (isExpense?"rgba(224,92,92,0.18)":"rgba(76,175,130,0.18)") : (isExpense?"rgba(76,175,130,0.18)":"rgba(224,92,92,0.18)");
                    return (
                      <button key={s} onClick={()=>setAdjSign(s)}
                        style={{ width:32,height:32,borderRadius:8,fontSize:18,fontWeight:700,cursor:"pointer",
                          background:adjSign===s?btnBg:"var(--surface)", border:adjSign===s?`1px solid ${btnColor}`:"1px solid var(--border)",
                          color:adjSign===s?btnColor:"var(--text-muted)", display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1 }}>
                        {s}
                      </button>
                    );
                  })}
                </div>
                <input value={adjValue} onChange={e=>setAdjValue(e.target.value)} placeholder="0,00" inputMode="decimal"
                  style={{ flex:1, fontSize:22, fontFamily:"'DM Serif Display',serif",
                    color:adjSign==="+"?(mode==="expense"?"var(--red)":"var(--green)"):(mode==="expense"?"var(--green)":"var(--red)"),
                    background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"6px 10px", minWidth:0 }} />
                <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:4, flexShrink:0 }}>
                  {adjResultValid ? (
                    <span style={{ fontSize:11, whiteSpace:"nowrap", textAlign:"right", lineHeight:1.5 }}>
                      <span style={{ color:adjFinalType==="expense"?"var(--red)":"var(--green)", fontWeight:700 }}>= {fmtEur(adjFinalAmt)}</span>
                      {adjFlipsType && <span style={{ display:"block", color:"var(--gold)", fontSize:10 }}>⚡ bascule en {adjFinalType==="income"?"revenu":"dépense"}</span>}

          {/* ── Libellé ── */}

          {/* ── Comptes + Date ── */}
          {isTransfer ? (
            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 24px 1fr", alignItems:"end", gap:6 }}>
                <Field label="Compte source">

                <div style={{ display:"flex", justifyContent:"center", alignItems:"center", paddingBottom:6, color:"var(--text-muted)", fontSize:16 }}>→</div>
                <Field label="Compte destination">
                  <select value={dstAcctId} onChange={e=>{ const v=e.target.value; if(v===srcAcctId) setSrcAcctId(dstAcctId); setDstAcctId(v); }} style={{ fontSize:14, width:"100%", background:"var(--select-bg)", color:"var(--text)" }}>
                    {checkingAccounts.map(a=><option key={a.id} value={a.id} style={{ background:"var(--select-bg)" }}>💳 {a.name}</option>)}
                  </select>
                </Field>
              </div>
              <Field label="Date"><input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{ fontSize:14, width:"100%", colorScheme:"var(--colorscheme)" }} /></Field>

            <div style={S.grid2col10}>
              <Field label="Compte">
                <select value={selAcctId} onChange={e=>setSrcAcctId(e.target.value)} style={{ fontSize:14, width:"100%", background:"var(--select-bg)", color:"var(--text)" }}>
                  {checkingAccounts.map(a=><option key={a.id} value={a.id} style={{ background:"var(--select-bg)" }}>💳 {a.name}</option>)}
                </select>
              </Field>
              <Field label="Date"><input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{ fontSize:14, width:"100%", colorScheme:"var(--colorscheme)" }} /></Field>
            </div>
          )}

          {/* ── Toggle carte (hors virement) ── */}
          {acctHasCard && !isTransfer && (
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"12px 14px", background:asCard?"rgba(201,168,76,0.06)":"var(--surface2)", border:`1px solid ${asCard?"rgba(201,168,76,0.3)":"var(--border)"}`, borderRadius:"var(--radius-sm)", transition:"all 0.2s" }}>
              <div style={S.flexRow10}>
                <span style={{ fontSize:18 }}>💳</span>
                <div>
                  <p style={{ fontSize:13, fontWeight:600, color:asCard?"var(--gold)":"var(--text)" }}>Imputer sur la carte</p>
                  <p style={{ fontSize:11, color:"var(--text-muted)" }}>{selAcct.cardName} · débit différé</p>
                </div>
              </div>
              <Toggle checked={asCard} onChange={()=>setAsCard(!asCard)} />
            </div>
          )}

          {/* ── Note ── */}
          <Field label="Note (optionnelle)"><textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="Commentaire…" rows={2} style={{ fontSize:14, width:"100%", resize:"none", lineHeight:1.5 }} /></Field>

          {error && <p style={{ color:"var(--red)", fontSize:13 }}>{error}</p>}
          <button onClick={handleSubmit} style={{ padding:"14px", borderRadius:"var(--radius)", background:"linear-gradient(135deg,var(--gold-light),var(--gold))", border:"none", color:"#0e0f13", fontSize:16, fontWeight:700, boxShadow:"0 4px 20px rgba(201,168,76,0.35)", marginTop:4 }}>Enregistrer</button>
        </div>
      </div>
    </div>
  );
}

function CheckingBarChart({ months }) {
  const [tooltip, setTooltip] = useState(null);
  const W = 440, H = 180, PAD = { top: 16, right: 16, bottom: 36, left: 56 };
  const innerW = W - PAD.left - PAD.right;
  const innerH = H - PAD.top - PAD.bottom;

  const allVals = months.flatMap(m => [m.income, m.expense]);
  const maxV    = Math.max(...allVals, 1);

  const barGroupW = innerW / Math.max(months.length, 1);
  const barW      = Math.min(barGroupW * 0.35, 22);
  const gap       = barW * 0.6;

  const yOf = v => PAD.top + innerH - (v / maxV) * innerH;
  const yTicks = [0, 1, 2, 3].map(i => maxV * i / 3);

  const handleMouseMove = (e) => {
    const svg  = e.currentTarget;
    const rect = svg.getBoundingClientRect();
    const mx   = (e.clientX - rect.left) * (W / rect.width);
    let best = null, bestDist = Infinity;
    months.forEach((m, i) => {
      const cx = PAD.left + barGroupW * i + barGroupW / 2;
      const d  = Math.abs(mx - cx);
      if (d < bestDist) { bestDist = d; best = { ...m, i, cx }; }
    });
    if (best && bestDist < barGroupW * 0.7) setTooltip(best);
    else setTooltip(null);
  };

  return (
    <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:"var(--radius)", padding:"14px 0 0", marginBottom:16, overflow:"hidden" }}>
      <p style={{ fontSize:11, fontWeight:700, color:"var(--text-sub)", textTransform:"uppercase", letterSpacing:"0.08em", padding:"0 16px", marginBottom:8 }}>Revenus / Dépenses par mois</p>
      <div style={{ overflowX:"auto" }}>
        <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} style={{ display:"block", minWidth:280, width:"100%" }}
          onMouseMove={handleMouseMove} onMouseLeave={()=>setTooltip(null)}>
          {yTicks.map((v, i) => (
            <g key={i}>
              <line x1={PAD.left} x2={W - PAD.right} y1={yOf(v)} y2={yOf(v)} stroke="rgba(255,255,255,0.05)" strokeWidth="1"/>
              <text x={PAD.left - 6} y={yOf(v) + 4} textAnchor="end" fontSize="9" fill="rgba(240,236,228,0.35)" fontFamily="DM Sans,sans-serif">
                {v >= 1000 ? `${(v/1000).toFixed(v % 1000 === 0 ? 0 : 1)}k` : Math.round(v)}
              </text>
            </g>
          ))}
          {months.map((m, i) => {
            const cx    = PAD.left + barGroupW * i + barGroupW / 2;
            const incX  = cx - gap / 2 - barW;
            const expX  = cx + gap / 2;
            const incH  = Math.max((m.income  / maxV) * innerH, 1);
            const expH  = Math.max((m.expense / maxV) * innerH, 1);
            const isHov = tooltip?.i === i;
            return (
              <g key={i}>
                <rect x={incX} y={yOf(m.income)}  width={barW} height={incH} rx="3" fill={isHov ? "#5dc994" : "#4caf82"} opacity={isHov ? 1 : 0.75} />
                <rect x={expX} y={yOf(m.expense)} width={barW} height={expH} rx="3" fill={isHov ? "#f07070" : "#e05c5c"} opacity={isHov ? 1 : 0.75} />
                <text x={cx} y={H - 6} textAnchor="middle" fontSize="9" fill="rgba(240,236,228,0.4)" fontFamily="DM Sans,sans-serif">{m.label}</text>
              </g>
            );
          })}
          {tooltip && <line x1={tooltip.cx} x2={tooltip.cx} y1={PAD.top} y2={PAD.top + innerH} stroke="rgba(255,255,255,0.12)" strokeWidth="1" strokeDasharray="3 3"/>}
        </svg>
      </div>
      {tooltip ? (
        <div style={{ padding:"10px 16px 12px", borderTop:"1px solid var(--border)", display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
          {[
            { label:"Revenus",  val:tooltip.income,  color:"#4caf82" },
            { label:"Dépenses", val:tooltip.expense, color:"#e05c5c" },
            { label:"Résultat", val:tooltip.balance, color: tooltip.balance >= 0 ? "#c9a84c" : "#e05c5c" },
          ].map(c => (
            <div key={c.label}>
              <p style={{ fontSize:9, color:"var(--text-sub)", fontWeight:700, textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:3 }}>{c.label}</p>
              <p style={{ fontSize:14, fontWeight:700, color:c.color, fontFamily:"'DM Serif Display',serif" }}>{c.val >= 0 && c.label !== "Dépenses" ? "+" : ""}{fmtEur(c.val)}</p>
            </div>
          ))}
        </div>
      ) : (
        <div style={{ padding:"8px 16px 10px", borderTop:"1px solid var(--border)" }}>
          <p style={{ fontSize:11, color:"var(--text-sub)", textAlign:"center" }}>Survolez le graphique pour voir les détails</p>
        </div>
      )}
    </div>
  );
}

function CheckingStats({ store, onBack }) {
  const checkingAccounts = store.accounts.filter(a => a.type === "checking");
  const [accountId, setAccountId] = useState("all");

  const nowMk = nowMKey();
  const today = new Date();

  // ── Données du MOIS EN COURS (depuis les transactions live) ────────────
  const liveStats = useMemo(() => {
    const accounts = accountId === "all" ? checkingAccounts : checkingAccounts.filter(a => a.id === accountId);
    return accounts.map(acc => {
      const regular = store.transactions.filter(t => mKey(t.date) === nowMk && t.accountId === acc.id && !t.isCard);
      const cardTxs = store.transactions.filter(t => mKey(t.date) === nowMk && t.accountId === acc.id && t.isCard);
      const statRegular = regular.filter(isExternalStatTx);
      const statCardTxs = cardTxs.filter(isExternalStatTx);
      const income  = statRegular.filter(t => t.type === "income").reduce((s,t) => s+t.amount, 0);
      const expense = statRegular.filter(t => t.type === "expense").reduce((s,t) => s+t.amount, 0)
                    + statCardTxs.reduce((s,t) => s+(t.type==="expense"?t.amount:-t.amount), 0);
      const balance = income - expense;
      const statTxs = [...statRegular, ...statCardTxs];
      const total   = statTxs.length;
      const pointed = statTxs.filter(t => t.pointed).length;
      return { accountId: acc.id, accountName: acc.name, income, expense, balance, total, pointed };
    });
  }, [store.transactions, accountId, checkingAccounts, nowMk]);

  const currentLive = useMemo(() => ({
    income:  liveStats.reduce((s,a) => s+a.income,  0),
    expense: liveStats.reduce((s,a) => s+a.expense, 0),
    balance: liveStats.reduce((s,a) => s+a.balance, 0),
    total:   liveStats.reduce((s,a) => s+a.total,   0),
    pointed: liveStats.reduce((s,a) => s+a.pointed, 0),
  }), [liveStats]);

  // ── Snapshots historiques ──────────────────────────────────────────────
  // Filtrés par compte, groupés par monthKey, agrégés si "tous"
  const historyRows = useMemo(() => {
    const entries = accountId === "all"
      ? store.checkingHistory
      : store.checkingHistory.filter(e => e.accountId === accountId);

    // Regrouper par monthKey (important si "tous" = plusieurs comptes par mois)
    const byMonth = {};
    entries.forEach(e => {
      if (!byMonth[e.monthKey]) byMonth[e.monthKey] = { monthKey: e.monthKey, date: e.date, income: 0, expense: 0, balance: 0, total: 0, pointed: 0, accounts: [] };
      byMonth[e.monthKey].income  += e.income;
      byMonth[e.monthKey].expense += e.expense;
      byMonth[e.monthKey].balance += e.balance;
      byMonth[e.monthKey].total   += e.total;
      byMonth[e.monthKey].pointed += e.pointed;
      byMonth[e.monthKey].accounts.push(e.accountName);
    });

    // Tri newest-first
    return Object.values(byMonth).sort((a,b) => b.monthKey.localeCompare(a.monthKey));
  }, [store.checkingHistory, accountId]);

  // ── Combiner historique + mois en cours pour sparklines & graphique ────
  // On prend les 5 derniers mois d'historique + le mois en cours
  const last5History = historyRows.slice(0, 5).reverse(); // oldest→newest
  const allMonthsForChart = useMemo(() => {
    const pad = n => String(n).padStart(2,"0");
    const fmtLabel = mk => new Date(mk+"-02T00:00:00").toLocaleDateString("fr-FR",{month:"short"}).replace(".","");
    const combined = [
      ...last5History.map(r => ({ label: fmtLabel(r.monthKey), income: r.income, expense: r.expense, balance: r.balance })),
      { label: fmtLabel(nowMk), income: currentLive.income, expense: currentLive.expense, balance: currentLive.balance },
    ];
    return combined;
  }, [last5History, currentLive, nowMk]);

  const sparkIncome  = allMonthsForChart.map(m => m.income);
  const sparkExpense = allMonthsForChart.map(m => m.expense);
  const sparkBalance = allMonthsForChart.map(m => m.balance);

  // ── Comparaison vs mois précédent ─────────────────────────────────────
  const prevRow = historyRows[0]; // snapshot du mois précédent (le plus récent de l'historique)
  const diffBalance = prevRow ? currentLive.balance - prevRow.balance : null;
  const diffExpense = prevRow ? currentLive.expense - prevRow.expense : null;
  const diffIncome  = prevRow ? currentLive.income  - prevRow.income  : null;

  // ── Indicateurs jours ──────────────────────────────────────────────────
  const daysInMonth  = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
  const dayOfMonth   = today.getDate();
  const daysLeft     = daysInMonth - dayOfMonth + 1;
  const avgDailyExp  = dayOfMonth > 0 ? currentLive.expense / dayOfMonth : 0;
  const eurPerDayLeft = currentLive.balance > 0 ? currentLive.balance / Math.max(daysLeft, 1) : 0;

  // ── Taux de pointage mois en cours ────────────────────────────────────
  const pointedRate = currentLive.total > 0 ? Math.round((currentLive.pointed / currentLive.total) * 100) : null;

  const fmtMonthLong = mk => new Date(mk+"-02T00:00:00").toLocaleDateString("fr-FR",{month:"long",year:"numeric"});

  return (
    <div style={{ minHeight:"100vh", background:"var(--bg)" }}>
      {/* Header */}
      <div style={{ background:"var(--header-bg)", padding: COMPACT_STICKY_HEADER ? "8px 16px" : "16px 20px", borderBottom:"1px solid var(--border)", ...(COMPACT_STICKY_HEADER ? { position:"sticky", top:0, zIndex:50, backdropFilter:"blur(20px)" } : {}) }}>
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          <button onClick={onBack} style={{ background:"var(--header-btn-bg)", border:"1px solid var(--header-btn-border)", borderRadius:8, padding: COMPACT_STICKY_HEADER ? "4px 10px" : "6px 12px", color:"var(--header-muted)", fontSize:13, fontWeight:500 }}>← Retour</button>
          <p style={{ fontFamily:"'DM Serif Display',serif", fontSize: COMPACT_STICKY_HEADER ? 18 : 26, letterSpacing:"-0.02em", color:"var(--header-text)" }}>Statistiques comptes courants</p>
        </div>
      </div>

      <div style={{ padding:"16px" }}>

        {/* Sélecteur de compte */}
        {checkingAccounts.length > 1 && (
          <div style={{ marginBottom:14 }}>
            <select
              value={accountId}
              onChange={e=>setAccountId(e.target.value)}
              style={{ width:"100%", padding:"7px 12px", borderRadius:"var(--radius-sm)", border:"1px solid", borderColor:accountId!=="all"?"var(--gold)":"var(--border)", background:"var(--surface2)", color:accountId!=="all"?"var(--gold)":"var(--text-muted)", fontSize:13, fontWeight:600, appearance:"auto" }}
            >
              <option value="all">📊 Tous les comptes</option>
              {checkingAccounts.map(acc=>(
                <option key={acc.id} value={acc.id}>💳 {acc.name}</option>
              ))}
            </select>
          </div>
        )}

        {/* KPI mois en cours */}
        <p style={{ fontSize:11, fontWeight:700, color:"var(--text-sub)", textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:8 }}>
          {fmtMonthLong(nowMk)} — en cours
        </p>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:16 }}>
          {[
            { label:"Revenus",  value:currentLive.income,  color:"var(--green)", spark:sparkIncome  },
            { label:"Dépenses", value:currentLive.expense, color:"var(--red)",   spark:sparkExpense },
            { label:"Résultat mois",value:currentLive.balance, color:currentLive.balance>=0?"var(--gold)":"var(--red)", spark:sparkBalance },
          ].map(c => (
            <div key={c.label} style={{ background:"var(--surface)", borderRadius:10, padding:"10px 12px", border:"1px solid var(--border)" }}>
              <p style={{ fontSize:10, color:"var(--text-sub)", fontWeight:600, textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:4 }}>{c.label}</p>
              <p style={{ fontSize:15, fontWeight:700, fontFamily:"'DM Serif Display',serif", color:c.color, marginBottom:4 }}>{fmtEur(c.value)}</p>
              <MiniSparkline data={c.spark} color={c.color} />
            </div>
          ))}
        </div>

        {/* Indicateurs 2×2 */}
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:16 }}>

          {/* Transactions pointées */}
          <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:10, padding:"12px 14px" }}>
            <p style={{ fontSize:10, fontWeight:600, color:"var(--text-sub)", textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:6 }}>Tx pointées</p>
            {pointedRate === null ? (
              <p style={{ fontSize:13, color:"var(--text-muted)" }}>Aucune tx</p>
            ) : <>
              <div style={{ display:"flex", alignItems:"baseline", gap:4, marginBottom:6 }}>
                <span style={{ fontFamily:"'DM Serif Display',serif", fontSize:22, fontWeight:700,
                  color: pointedRate===100?"var(--green)":pointedRate>=50?"var(--gold)":"var(--red)" }}>{pointedRate}%</span>
                <span style={{ fontSize:11, color:"var(--text-muted)" }}>{currentLive.pointed}/{currentLive.total}</span>
              </div>
              <div style={{ height:5, borderRadius:3, background:"var(--surface2)", overflow:"hidden" }}>
                <div style={{ height:"100%", borderRadius:3, width:`${pointedRate}%`, transition:"width 0.4s",
                  background: pointedRate===100?"var(--green)":pointedRate>=50?"var(--gold)":"var(--red)" }} />
              </div>
              <p style={{ fontSize:10, color:"var(--text-muted)", marginTop:5 }}>
                {pointedRate===100?"✓ Mois soldé":`${currentLive.total-currentLive.pointed} non pointée${currentLive.total-currentLive.pointed>1?"s":""}`}
              </p>
            </>}
          </div>

          {/* Dépense moyenne / jour */}
          <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:10, padding:"12px 14px" }}>
            <p style={{ fontSize:10, fontWeight:600, color:"var(--text-sub)", textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:6 }}>Dépense / jour</p>
            <p style={{ fontFamily:"'DM Serif Display',serif", fontSize:22, fontWeight:700, color:"var(--red)", marginBottom:2 }}>{fmtEur(avgDailyExp)}</p>
            <p style={{ fontSize:10, color:"var(--text-muted)" }}>Sur {dayOfMonth}j écoulé{dayOfMonth>1?"s":""}</p>
          </div>

          {/* Euros restants / jour */}
          <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:10, padding:"12px 14px" }}>
            <p style={{ fontSize:10, fontWeight:600, color:"var(--text-sub)", textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:6 }}>Restant / jour</p>
            {currentLive.balance <= 0
              ? <p style={{ fontFamily:"'DM Serif Display',serif", fontSize:22, fontWeight:700, color:"var(--red)" }}>—</p>
              : <>
                  <p style={{ fontFamily:"'DM Serif Display',serif", fontSize:22, fontWeight:700, color:"var(--green)", marginBottom:2 }}>{fmtEur(eurPerDayLeft)}</p>
                  <p style={{ fontSize:10, color:"var(--text-muted)" }}>{daysLeft}j restants ce mois-ci</p>
                </>
            }
          </div>

          {/* vs mois précédent */}
          <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:10, padding:"12px 14px" }}>
            <p style={{ fontSize:10, fontWeight:600, color:"var(--text-sub)", textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:6 }}>
              vs {prevRow ? new Date(prevRow.monthKey+"-02T00:00:00").toLocaleDateString("fr-FR",{month:"short"}).replace(".","") : "mois préc."}
            </p>
            {diffBalance === null
              ? <p style={{ fontSize:12, color:"var(--text-muted)" }}>Pas encore d'historique</p>
              : <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
                  {[
                    { label:"Résultat", diff: diffBalance },
                    { label:"Revenus",  diff: diffIncome  },
                    { label:"Dépenses", diff: -diffExpense }, // moins de dépenses = positif
                  ].map(row => (
                    <div key={row.label} style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                      <span style={{ fontSize:11, color:"var(--text-muted)" }}>{row.label}</span>
                      <span style={{ fontSize:12, fontWeight:700,
                        color: row.diff > 0 ? "var(--green)" : row.diff < 0 ? "var(--red)" : "var(--text-sub)" }}>
                        {row.diff > 0 ? "+" : ""}{fmtEur(row.label === "Dépenses" ? -diffExpense : row.diff)}
                      </span>
                    </div>
                  ))}
                </div>
            }
          </div>
        </div>

        {/* Graphique */}
        {allMonthsForChart.length >= 2 && <CheckingBarChart months={allMonthsForChart} />}

        {/* Légende */}
        <div style={{ display:"flex", gap:12, marginBottom:16, flexWrap:"wrap" }}>
          <span style={{ fontSize:11, color:"var(--green)", fontWeight:600, display:"flex", alignItems:"center", gap:4 }}><span style={{ width:10,height:10,borderRadius:2,background:"var(--green)",display:"inline-block" }}/>Revenus</span>
          <span style={{ fontSize:11, color:"var(--red)", fontWeight:600, display:"flex", alignItems:"center", gap:4 }}><span style={{ width:10,height:10,borderRadius:2,background:"var(--red)",display:"inline-block" }}/>Dépenses</span>
        </div>

        {/* Historique des snapshots */}
        <p style={{ fontSize:11, fontWeight:700, color:"var(--text-sub)", textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:10 }}>
          Historique mensuel {historyRows.length === 0 ? "" : `(${historyRows.length} mois)`}
        </p>

        {historyRows.length === 0 ? (

            {historyRows.map((row, i) => {

              const daysInMonth = new Date(
                parseInt(row.monthKey.split("-")[0]),
                parseInt(row.monthKey.split("-")[1]),

                      {row.accounts && accountId === "all" && row.accounts.length > 1 && (
                        <span style={{ fontSize:10, color:"var(--text-sub)" }}>{row.accounts.length} comptes</span>

                    </div>
                    <div style={{ display:"flex", alignItems:"center", gap:8 }}>

                      </span>
                      {varBal !== null && <Variation value={varBal} />}
                    </div>
                  </div>
                  {/* Données : revenus | dépenses | dépense/jour */}
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:0 }}>
                    <div style={{ padding:"10px 14px", borderRight:"1px solid var(--border)" }}>
                      <p style={{ fontSize:10, color:"var(--text-sub)", fontWeight:600, textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:3 }}>Revenus</p>
                      <p style={{ fontSize:15, fontWeight:700, fontFamily:"'DM Serif Display',serif", color:"var(--green)" }}>{fmtEur(row.income)}</p>
                    </div>
                    <div style={{ padding:"10px 14px", borderRight:"1px solid var(--border)" }}>
                      <p style={{ fontSize:10, color:"var(--text-sub)", fontWeight:600, textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:3 }}>Dépenses</p>
                      <p style={{ fontSize:15, fontWeight:700, fontFamily:"'DM Serif Display',serif", color:"var(--red)" }}>{fmtEur(row.expense)}</p>
                    </div>
                    <div style={{ padding:"10px 14px" }}>
                      <p style={{ fontSize:10, color:"var(--text-sub)", fontWeight:600, textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:3 }}>Moy./jour</p>
                      <p style={{ fontSize:15, fontWeight:700, fontFamily:"'DM Serif Display',serif", color:"var(--text)" }}>{fmtEur(avgDaily)}</p>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

function fmtSnapshotDate(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  const day = d.getDate();
  return `${day===1?"1er":day} ${d.toLocaleDateString("fr-FR",{month:"long",year:"numeric"})}`;
}

function Variation({ value }) {
  if (value === null || value === undefined) return <span style={{ color:"var(--text-sub)", fontSize:12 }}>—</span>;
  const pos = value >= 0;
  return (
    <span style={{ fontSize:12, fontWeight:700, color: pos ? "var(--green)" : "var(--red)" }}>
      {pos ? "+" : ""}{fmtEur(value)}
    </span>
  );
}

// ─── App ───────────────────────────────────────────────────────────────────
function App() {
  const [user,       setUser]    = useState(undefined); // undefined = checking, null = not logged in
  const [tab,        setTab]     = useState("dashboard");
  const previousUserEmailRef = useRef(null);
  const dashboardResetRef = useRef(null);
  const scrollRef = useRef(null);
  const [showForm,   setForm]    = useState(false);
  const [formAccount,setFormAcc] = useState(null);
  const [formSel,    setFormSel] = useState(null);
  const [theme,      setTheme]   = useState(() => { try { return localStorage.getItem("budget_theme") || "dark"; } catch { return "dark"; } });
  const [accountRowSize, setAccountRowSize] = useState(() => { try { return localStorage.getItem("budget_account_row_size") || "normal"; } catch { return "normal"; } });

  const store = useStore(user?.uid, user?.email);

  // Toast for auto-cleanup blocked — shown once per day via localStorage
  const CLEANUP_TOAST_KEY = "budget_cleanup_blocked_shown";
  const [showCleanupBlockedToast, setShowCleanupBlockedToast] = useState(false);
  useEffect(() => {
    if (!store.autoCleanupBlockedReasons) return;
    const today = new Date().toISOString().slice(0, 10); // YYYY-MM-DD
    let lastShown = "";
    try { lastShown = localStorage.getItem(CLEANUP_TOAST_KEY) || ""; } catch { /* ignore */ }
    if (lastShown !== today) {
      setShowCleanupBlockedToast(true);
      try { localStorage.setItem(CLEANUP_TOAST_KEY, today); } catch { /* ignore */ }
    }
  }, [store.autoCleanupBlockedReasons]);

  const INACTIVITY_LIMIT = (user?.email === DEMO_EMAIL ? 15 * 60 : 8 * 60 * 60) * 1000; // 15min demo, 8h normal
  const ACTIVITY_KEY     = "budget_last_activity";

  // Update last activity timestamp on any user interaction
  useEffect(() => {
    const touch = () => localStorage.setItem(ACTIVITY_KEY, Date.now().toString());
    const events = ["mousedown", "keydown", "touchstart", "scroll", "click"];
    events.forEach(e => window.addEventListener(e, touch, { passive: true }));
    return () => events.forEach(e => window.removeEventListener(e, touch));
  }, []);

  useEffect(() => {
    const { auth, onAuthStateChanged, signOut } = fb();
    return onAuthStateChanged(auth, async u => {
      if (u) {
        // Check inactivity on auth state change (app open / tab focus)
        try {
          const last = parseInt(localStorage.getItem(ACTIVITY_KEY) || "0", 10);
          const elapsed = Date.now() - last;
          if (last > 0 && elapsed > INACTIVITY_LIMIT) {
            await signOut(auth);
            localStorage.removeItem(ACTIVITY_KEY);
            return;
          }
          // Record activity on fresh login
          if (!last) localStorage.setItem(ACTIVITY_KEY, Date.now().toString());
        } catch { /* localStorage blocked in iOS private mode — skip inactivity check */ }
      } else {
        try { localStorage.removeItem(ACTIVITY_KEY); } catch { /* ignore */ }
      }
      setUser(u || null);
    });
  }, []);

  // Also check inactivity when tab regains focus (fixes iOS Safari background freeze)
  useEffect(() => {
    const checkInactivity = async () => {
      if (!user) return;
      try {
        const last = parseInt(localStorage.getItem(ACTIVITY_KEY) || "0", 10);
        if (last > 0 && Date.now() - last > INACTIVITY_LIMIT) {
          const { auth, signOut } = fb();
          await signOut(auth);
          localStorage.removeItem(ACTIVITY_KEY);
        }
      } catch (e) {
        // localStorage may be blocked in iOS private mode — ignore silently
      }
    };

    // iOS Safari: visibilitychange is the most reliable event when returning from background
    const onVisibilityChange = () => {
      if (document.visibilityState === "visible") checkInactivity();
    };

    // Fallback for desktop browsers
    const onFocus = () => checkInactivity();

    // pageshow fires on iOS when navigating back (bfcache restore) — critical for iOS
    const onPageShow = (e) => {
      // e.persisted = true means page was restored from bfcache (common on iOS)
      if (e.persisted) checkInactivity();
    };

    window.addEventListener("focus", onFocus);
    window.addEventListener("pageshow", onPageShow);
    document.addEventListener("visibilitychange", onVisibilityChange);

    return () => {
      window.removeEventListener("focus", onFocus);
      window.removeEventListener("pageshow", onPageShow);
      document.removeEventListener("visibilitychange", onVisibilityChange);
    };
  }, [user, INACTIVITY_LIMIT]);

  useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
    try { localStorage.setItem("budget_theme", theme); } catch { /* ignore */ }
  }, [theme]);

  useEffect(() => {
    try { localStorage.setItem("budget_account_row_size", accountRowSize); } catch { /* ignore */ }
  }, [accountRowSize]);

  useEffect(() => {
    const currentEmail = user?.email || null;
    const previousEmail = previousUserEmailRef.current;

    if (currentEmail && currentEmail !== previousEmail) {
      setTab("dashboard");
      if (scrollRef.current) scrollRef.current.scrollTop = 0;
    }

    previousUserEmailRef.current = currentEmail;
  }, [user?.email]);

  if (user === undefined) return <LoadingScreen />;
  if (user === null)      return (
    <ThemeCtx.Provider value={{ theme, toggle:()=>setTheme(t=>t==="dark"?"light":"dark") }}>
      <LoginScreen />
    </ThemeCtx.Provider>
  );

  if (!store.ready) {
    if (store.slowConnection) return <ThemeCtx.Provider value={{ theme, toggle:()=>setTheme(t=>t==="dark"?"light":"dark") }}><SlowConnectionScreen onRetry={store.retry} /></ThemeCtx.Provider>;
    return <LoadingScreen />;
  }

  const handleOpenForm = (account=null, sel=null) => { setFormAcc(account); setFormSel(sel); setForm(true); };

  return (
    <ThemeCtx.Provider value={{ theme, toggle:()=>setTheme(t=>t==="dark"?"light":"dark") }}>
      <div style={{ display:"flex", flexDirection:"column", height:"100vh", maxWidth:480, margin:"0 auto", background:"var(--bg)", transition:"background 0.3s" }}>
        {store.isDemo && (
          <div style={{ background:"linear-gradient(90deg,#c9a84c,#e8c96a)", padding:"8px 16px", display:"flex", alignItems:"center", justifyContent:"center", gap:8, zIndex:50 }}>
            <span style={{ fontSize:14 }}>👀</span>
            <p style={{ fontSize:12, fontWeight:700, color:"#0e0f13", letterSpacing:"0.04em" }}>MODE DÉMO — Les modifications sont visibles par tous les visiteurs</p>
          </div>
        )}
        {_isDebugEnabled() && <DebugOverlay />}
        {showCleanupBlockedToast && store.autoCleanupBlockedReasons && (
          <CleanupBlockedToast
            reasons={store.autoCleanupBlockedReasons}
            onClose={() => { setShowCleanupBlockedToast(false); store.clearAutoCleanupBlockedReasons(); }}
          />
        )}
        {store.saveError && (
          <div style={{ position:"fixed", bottom:90, left:12, right:12, zIndex:9998, display:"flex", alignItems:"center", gap:10, padding:"12px 16px", borderRadius:"var(--radius-sm)", background:"var(--red)", boxShadow:"0 4px 20px rgba(0,0,0,0.35)", animation:"fadeUp 0.3s ease both" }}>
            <span style={{ fontSize:18 }}>&#x26A0;&#xFE0F;</span>
            <span style={{ flex:1, fontSize:13, fontWeight:600, color:"#fff", lineHeight:1.4 }}>Echec de la sauvegarde — verifiez votre connexion</span>
            <button onClick={store.clearSaveError} style={{ background:"rgba(255,255,255,0.2)", border:"none", borderRadius:6, color:"#fff", fontSize:12, fontWeight:700, padding:"4px 10px", cursor:"pointer" }}>&#x2715;</button>
          </div>
        )}
        <div ref={scrollRef} style={{ flex:1, overflowY:"auto", paddingBottom:80 }}>
          {tab==="dashboard"     && <Dashboard    store={store} onAdd={handleOpenForm} onGoSavings={()=>setTab("savingsStats")} onGoCheckingStats={()=>setTab("checkingStats")} onResetRef={dashboardResetRef} accountRowSize={accountRowSize} />}
          {tab==="transactions"  && <Transactions store={store} onAdd={handleOpenForm} />}
          {tab==="bourse"        && <BoursePage   store={store} user={user} />}
          {tab==="settings"      && <Settings     store={store} user={user} accountRowSize={accountRowSize} setAccountRowSize={setAccountRowSize} />}
          {tab==="savingsStats"  && <SavingsStats  store={store} onBack={()=>setTab("dashboard")} />}
          {tab==="checkingStats" && <CheckingStats store={store} onBack={()=>setTab("dashboard")} />}
        </div>
        <TabBar tab={["savingsStats","checkingStats"].includes(tab) ? "dashboard" : tab} setTab={setTab} onDashboardClick={()=>{ if(dashboardResetRef.current) dashboardResetRef.current(); if(scrollRef.current) scrollRef.current.scrollTop=0; }} />
        {showForm && <FormModal store={store} account={formAccount} sel={formSel} onClose={()=>setForm(false)} />}
      </div>
    </ThemeCtx.Provider>
  );
}

// ─── BoursePage ────────────────────────────────────────────────────────────
// Yahoo Finance — sans clé API, proxy CORS pour contourner les restrictions navigateur
// ── Proxy Yahoo Finance ───────────────────────────────────────────────────────
// Les proxies CORS publics (corsproxy.io, allorigins…) sont devenus instables en 2025.
// Solution pérenne : un Cloudflare Worker personnel, gratuit à 100k req/jour.
//
// 📋 DÉPLOIEMENT (2 minutes, gratuit) :
//   1. Créer un compte sur https://dash.cloudflare.com
//   2. Workers & Pages > Create > Create Worker
//   3. Coller le contenu de yahoo-proxy-worker.js, puis Deploy
//   4. Remplacer la valeur de YF_PROXY_URL ci-dessous par l'URL de votre worker
//      (ex: https://yahoo-proxy.monpseudo.workers.dev)
//
// 📡 ENDPOINTS exposés par le worker :
//   GET /proxy?s=SYMBOL&interval=1m&range=1d  → Yahoo Finance v8/chart (cours)
//   GET /search?q=QUERY                        → Yahoo Finance v1/finance/search (autocomplete)
// ─────────────────────────────────────────────────────────────────────────────
const YF_PROXY_URL = "https://aged-cloud-8fab.rocherje.workers.dev"; // ← Valeur par défaut (peut être surchargée via les Réglages → Bourse)
let   _yfProxyUrl  = YF_PROXY_URL; // mis à jour par le store dès que uiPrefs est chargé

const YF_BASE = "https://query1.finance.yahoo.com/v8/finance";

// yfFetch(symbol, queryString) — récupère les données Yahoo Finance pour un symbole.
// Le symbole est passé brut (ex: "AI.PA", "EURUSD=X") sans encodage dans le path,
// ce qui évite les doubles encodages et les problèmes de routage Cloudflare.
async function yfFetch(symbol, qs) {
  const fullUrl = `${YF_BASE}/chart/${encodeURIComponent(symbol)}?${qs}`;

  // Tentative 1 : Cloudflare Worker personnel (URL saisie dans les Réglages ou codée en dur)
  const proxyUrl = _yfProxyUrl;
  if (proxyUrl) {
    try {
      const workerUrl = `${proxyUrl.replace(/\/$/, "")}/proxy?s=${encodeURIComponent(symbol)}&${qs}`;
      const r = await fetch(workerUrl, { signal: AbortSignal.timeout(10000) });
      if (r.ok) { const d = await r.json(); if (d?.chart?.result?.[0]?.meta) return d; }
    } catch {}
  }

  // Tentative 2 : corsproxy.io
  try {
    const r = await fetch(`https://corsproxy.io/?url=${encodeURIComponent(fullUrl)}`, { signal: AbortSignal.timeout(8000) });
    if (r.ok) { const d = await r.json(); if (d?.chart?.result?.[0]?.meta) return d; }
  } catch {}

  // Tentative 3 : allorigins
  try {
    const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(fullUrl)}`, { signal: AbortSignal.timeout(8000) });
    if (r.ok) { const raw = await r.json(); if (raw?.contents) return JSON.parse(raw.contents); }
  } catch {}

  return null;
}
// yfSearch(query) — recherche des actions par nom ou symbole via Yahoo Finance /v1/finance/search.
// Retourne un tableau de { symbol, name, exchange, type } ou [] en cas d'erreur.
// Stratégie : si le worker personnel répond avec succès, on s'arrête là et on n'appelle
// jamais les proxies publics (corsproxy.io / allorigins), qui sont instables et génèrent
// des erreurs réseau visibles dans la console.
async function yfSearch(query) {
  const YF_SEARCH = `https://query1.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(query)}&lang=fr-FR&region=FR&quotesCount=8&newsCount=0&listsCount=0&enableFuzzyQuery=false&enableCb=false&enableNavLinks=false&enableEnhancedTrivialQuery=true`;

  // Tentative 1 : Cloudflare Worker personnel (endpoint /search?q=…)
  // Si le worker répond (même sans résultat), on ne tente pas les proxies publics.
  const proxyUrl = _yfProxyUrl;
  if (proxyUrl) {
    try {
      const workerUrl = `${proxyUrl.replace(/\/$/, "")}/search?q=${encodeURIComponent(query)}`;
      const r = await fetch(workerUrl, { signal: AbortSignal.timeout(6000) });
      if (r.ok) {
        const d = await r.json();
        const quotes = d?.quotes || d?.finance?.result?.[0]?.quotes || [];
        return _mapYfSearchQuotes(quotes); // succès du worker → on s'arrête ici
      }
    } catch {}
    // Le worker a été configuré mais ne répond pas → on tente les fallbacks
  }

  // Tentative 2 : corsproxy.io (timeout court : ce proxy est souvent instable)
  try {
    const r = await fetch(`https://corsproxy.io/?url=${encodeURIComponent(YF_SEARCH)}`, { signal: AbortSignal.timeout(3000) });
    if (r.ok) {
      const d = await r.json();
      const quotes = d?.quotes || [];
      if (quotes.length) return _mapYfSearchQuotes(quotes);
    }
  } catch {}

  // Tentative 3 : allorigins (timeout court)
  try {
    const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(YF_SEARCH)}`, { signal: AbortSignal.timeout(3000) });
    if (r.ok) {
      const raw = await r.json();
      if (raw?.contents) {
        const d = JSON.parse(raw.contents);
        const quotes = d?.quotes || [];
        if (quotes.length) return _mapYfSearchQuotes(quotes);
      }
    }
  } catch {}

  return [];
}

function _mapYfSearchQuotes(quotes) {
  return quotes
    .filter(q => q.symbol && (q.quoteType === "EQUITY" || q.quoteType === "ETF" || q.quoteType === "MUTUALFUND" || !q.quoteType))
    .slice(0, 8)
    .map(q => ({
      symbol:   q.symbol,
      name:     q.longname || q.shortname || q.symbol,
      exchange: q.exchange || q.fullExchangeName || "",
      type:     q.quoteType || "",
    }));
}

function BoursePage({ store, user }) {
  const uid = user?.uid;
  const [positions, setPositions] = useState([]);
  const [quotes, setQuotes]       = useState({});
  const [loading, setLoading]     = useState(false);
  const [saving,  setSaving]      = useState(false);
  const [lastRefresh, setLastRefresh] = useState(null);
  const [showForm, setShowForm]   = useState(false);
  const [editPos, setEditPos]     = useState(null);

  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const searchDebounce = useRef(null);

  // ── Chargement et sync temps réel depuis Firestore ─────────────────────────
  useEffect(() => {
    if (!uid) return;
    const { db, doc, onSnapshot } = fb();
    const ref = doc(db, "budgets", uid);
    const unsub = onSnapshot(ref, snap => {
      const data = snap.exists() ? snap.data() : null;
      setPositions(data?.portefeuille || []);
    });
    return () => unsub();
  }, [uid]);

  // ── Sauvegarde dans Firestore ──────────────────────────────────────────────
  const savePositions = useCallback(async (pos) => {
    if (!uid) return;
    setSaving(true);
    try { await fbSave(uid, { portefeuille: pos }); }
    finally { setSaving(false); }
  }, [uid]);

  // ── Fetch des cours via Yahoo Finance v8/chart ────────────────────────────
  // interval=1m&range=1d : données intraday → regularMarketPrice fiable + chartPreviousClose
  // On utilise chartPreviousClose (clôture officielle J-1) pour calculer la variation
  const fetchQuotes = useCallback(async (pos = positions) => {
    if (!pos.length) return;
    setLoading(true);
    const results = {};
    await Promise.all(pos.map(async p => {
      try {
        const d = await yfFetch(p.symbol, `interval=1m&range=1d`);
        const meta = d?.chart?.result?.[0]?.meta;
        if (meta?.regularMarketPrice != null) {
          const prev = meta.chartPreviousClose ?? meta.previousClose ?? 0;
          const curr = meta.regularMarketPrice;
          results[p.symbol] = {
            c:        curr,
            d:        prev ? curr - prev : 0,
            dp:       prev ? ((curr - prev) / prev) * 100 : 0,
            currency: meta.currency || p.devise,
          };
        }
      } catch {}
    }));
    setQuotes(results);
    setLastRefresh(new Date());
    setLoading(false);
  }, [positions]);

  const fetchedRef    = useRef(false);
  const marketFetched = useRef(false); // garde-fou : lance EUR/USD + CAC40 une seule fois après store.ready
  const [eurusd, setEurusd] = useState(null); // { rate, change, changePct }
  const [cac40, setCac40]   = useState(null); // { price, change, changePct }
  const eurToUsd = store?.uiPrefs?.eurToUsd !== false; // default true

  // ── Fetch du taux EUR/USD via v8/chart ────────────────────────────────────
  const fetchEurusd = useCallback(async () => {
    try {
      const d = await yfFetch('EURUSD=X', `interval=1m&range=1d`);
      const meta = d?.chart?.result?.[0]?.meta;
      if (meta?.regularMarketPrice != null) {
        const prev = meta.chartPreviousClose ?? meta.previousClose ?? 0;
        const curr = meta.regularMarketPrice;
        setEurusd({
          rate:      curr,
          change:    prev ? curr - prev : 0,
          changePct: prev ? ((curr - prev) / prev) * 100 : 0,
        });
      }
    } catch {}
  }, []);

  const fetchCac40 = useCallback(async () => {
    try {
      const d = await yfFetch('^FCHI', `interval=1m&range=1d`);
      const meta = d?.chart?.result?.[0]?.meta;
      if (meta?.regularMarketPrice != null) {
        const prev = meta.chartPreviousClose ?? meta.previousClose ?? 0;
        const curr = meta.regularMarketPrice;
        setCac40({
          price:     curr,
          change:    prev ? curr - prev : 0,
          changePct: prev ? ((curr - prev) / prev) * 100 : 0,
        });
      }
    } catch {}
  }, []);
  useEffect(() => {
    if (positions.length > 0 && !fetchedRef.current) {
      fetchedRef.current = true;
      fetchQuotes(positions);
    }
  }, [positions]);

  // ── Attendre store.ready avant de fetcher EUR/USD et CAC40 ──────────────
  // store.ready devient true après le 1er snapshot Firestore, ce qui garantit
  // que uiPrefs (et donc _yfProxyUrl) est déjà synchronisé.
  // Le proxy Cloudflare est ainsi utilisé en priorité dès le 1er appel réseau.
  useEffect(() => {
    if (!store?.ready || marketFetched.current) return;
    marketFetched.current = true;
    fetchEurusd();
    fetchCac40();
  }, [store?.ready]);


  // ── Calculs portefeuille ───────────────────────────────────────────────────
  const rows = positions.map(p => {
    const q = quotes[p.symbol];
    const currentPrice = q ? q.c : null;
    const valeurActuelle = currentPrice !== null ? currentPrice * p.quantite : null;
    const valeurAchat    = p.prixAchat * p.quantite;
    const pvLatente      = valeurActuelle !== null ? valeurActuelle - valeurAchat : null;
    const pvPct          = valeurActuelle !== null ? ((valeurActuelle - valeurAchat) / valeurAchat) * 100 : null;
    const variJour       = q ? q.d * p.quantite : null;
    const variJourPct    = q ? q.dp : null;
    return { ...p, currentPrice, valeurActuelle, valeurAchat, pvLatente, pvPct, variJour, variJourPct };
  });

  const totalAchat    = rows.reduce((s, r) => s + r.valeurAchat, 0);
  const totalActuel   = rows.reduce((s, r) => r.valeurActuelle !== null ? s + r.valeurActuelle : s, 0);
  const totalPV       = totalActuel - totalAchat;
  const totalPVPct    = totalAchat > 0 ? (totalPV / totalAchat) * 100 : 0;
  const totalVariJour = rows.reduce((s, r) => r.variJour !== null ? s + r.variJour : s, 0);

  // ── Helpers UI ────────────────────────────────────────────────────────────
  const clr = v => v > 0 ? "#4caf7d" : v < 0 ? "#e05c5c" : "var(--text-muted)";
  const fmtN = (n, dec=2) => n === null || n === undefined ? "—" : (n >= 0 ? "+" : "") + n.toFixed(dec);
  const fmtPrice = n => n === null ? "—" : n.toLocaleString("fr-FR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  // ── Formulaire d'ajout/édition ────────────────────────────────────────────
  function PositionForm({ initial, onSave, onClose }) {
    const [symbol,       setSymbol]       = useState(initial?.symbol    || "");
    const [nom,          setNom]          = useState(initial?.nom       || "");
    const [quantite,     setQuantite]     = useState(initial?.quantite  || "");
    const [prixAchat,    setPrixAchat]    = useState(initial?.prixAchat || "");
    const [devise,       setDevise]       = useState(initial?.devise     || "EUR");
    // Autocomplete state
    const [searchQuery,  setSearchQuery]  = useState(initial?.nom || initial?.symbol || "");
    const [suggestions,  setSuggestions]  = useState([]);
    const [searching,    setSearching]    = useState(false);
    const [showSuggest,  setShowSuggest]  = useState(false);
    const searchTimer = React.useRef(null);

    const handleSubmit = () => {
      if (!symbol || !quantite || !prixAchat) return;
      onSave({ id: initial?.id || genId(), symbol: symbol.toUpperCase(), nom: nom || symbol.toUpperCase(), quantite: parseFloat(quantite), prixAchat: parseFloat(prixAchat), devise });
    };

    // Déclenche la recherche Yahoo Finance après 350 ms de saisie
    const handleSearchInput = (val) => {
      setSearchQuery(val);
      if (!val.trim()) { setSuggestions([]); setShowSuggest(false); return; }
      clearTimeout(searchTimer.current);
      searchTimer.current = setTimeout(async () => {
        setSearching(true);
        const results = await yfSearch(val.trim());
        setSuggestions(results);
        setShowSuggest(results.length > 0);
        setSearching(false);
      }, 350);
    };

    // Sélection d'une suggestion
    const handleSelect = (item) => {
      setSymbol(item.symbol);
      setNom(item.name);
      setSearchQuery(item.name);
      setSuggestions([]);
      setShowSuggest(false);
      // Dévine la devise selon l'exchange
      const ex = (item.exchange || "").toUpperCase();
      if (["EPA","ENX","XPAR","PAR","AMS","BRU","LSE","MIL","MCE","GER","FSX","XETRA","ETR"].some(x => ex.includes(x))) setDevise("EUR");
      else if (["LSE","IOB"].some(x => ex.includes(x))) setDevise("GBP");
      else if (["SWX","EBS"].some(x => ex.includes(x))) setDevise("CHF");
      else setDevise("USD");
    };

    const inputStyle = { width:"100%", background:"var(--surface2)", border:"1px solid var(--border)", borderRadius:10, padding:"10px 12px", fontSize:14, color:"var(--text)", boxSizing:"border-box" };

    return (
      <div style={S.overlay} onClick={onClose}>
        <div onClick={e=>e.stopPropagation()} style={{ background:"var(--surface)", borderRadius:20, padding:24, width:"100%", maxWidth:420, display:"flex", flexDirection:"column", gap:14 }}>
          <p style={S.modalTitle}>{initial ? "Modifier la position" : "Ajouter une action"}</p>

          {/* Recherche par nom ou symbole (mode ajout uniquement) */}
          {!initial && (
            <div style={{ position:"relative" }}>
              <div style={{ position:"relative" }}>
                <input
                  style={{...inputStyle, paddingRight:36}}
                  placeholder="🔍 Rechercher par nom ou symbole…"
                  value={searchQuery}
                  onChange={e => handleSearchInput(e.target.value)}
                  onFocus={() => suggestions.length > 0 && setShowSuggest(true)}
                  onBlur={() => setTimeout(() => setShowSuggest(false), 150)}
                  autoComplete="off"
                />
                {searching && (
                  <span style={{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)", fontSize:13, color:"var(--text-muted)" }}>⏳</span>
                )}
              </div>
              {showSuggest && (
                <div style={{ position:"absolute", top:"100%", left:0, right:0, zIndex:999, background:"var(--surface)", border:"1px solid var(--border)", borderRadius:10, marginTop:4, overflow:"hidden", boxShadow:"0 8px 24px rgba(0,0,0,0.3)" }}>
                  {suggestions.map((s, i) => (
                    <div key={s.symbol}
                      onMouseDown={e => { e.preventDefault(); handleSelect(s); }}
                      style={{ padding:"10px 14px", cursor:"pointer", borderBottom: i < suggestions.length-1 ? "1px solid var(--border)" : "none", display:"flex", justifyContent:"space-between", alignItems:"center", gap:8 }}
                      onMouseEnter={e => e.currentTarget.style.background="var(--surface2)"}
                      onMouseLeave={e => e.currentTarget.style.background="transparent"}
                    >
                      <div>
                        <span style={{ fontSize:13, fontWeight:600, color:"var(--text)" }}>{s.name}</span>
                        {s.exchange && <span style={{ fontSize:11, color:"var(--text-muted)", marginLeft:6 }}>{s.exchange}</span>}
                      </div>
                      <span style={{ fontSize:12, fontWeight:700, color:"var(--gold)", whiteSpace:"nowrap" }}>{s.symbol}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          <div style={{ display:"flex", gap:8 }}>
            <input style={{...inputStyle, flex:1}} placeholder="Symbole (ex: TTE.PA)" value={symbol} onChange={e=>setSymbol(e.target.value.toUpperCase())} readOnly={!!initial} />
            <select style={{...inputStyle, width:90, flex:"none"}} value={devise} onChange={e=>setDevise(e.target.value)}>
              <option>USD</option><option>EUR</option><option>GBP</option><option>CHF</option>
            </select>
          </div>

          <input style={inputStyle} placeholder="Nom (ex: TotalEnergies SE)" value={nom} onChange={e=>setNom(e.target.value)} />

          <div style={{ display:"flex", gap:8 }}>
            <input style={{...inputStyle, flex:1}} type="number" placeholder="Quantité" value={quantite} onChange={e=>setQuantite(e.target.value)} min="0" step="any" />
            <input style={{...inputStyle, flex:1}} type="number" placeholder={`Prix d'achat (${devise})`} value={prixAchat} onChange={e=>setPrixAchat(e.target.value)} min="0" step="any" />
          </div>

          <div style={{ display:"flex", gap:8, marginTop:4 }}>
            <button onClick={onClose} style={{ flex:1, padding:"11px 0", borderRadius:12, background:"var(--surface2)", border:"1px solid var(--border)", color:"var(--text-muted)", fontWeight:600, fontSize:14 }}>Annuler</button>
            <button onClick={handleSubmit} disabled={!symbol||!quantite||!prixAchat}
              style={{ flex:2, padding:"11px 0", borderRadius:12, background: (!symbol||!quantite||!prixAchat) ? "var(--surface2)" : "var(--gold-dim)", border:"1px solid var(--gold)", color: (!symbol||!quantite||!prixAchat) ? "var(--text-muted)" : "var(--gold)", fontWeight:600, fontSize:14 }}>
              {initial ? "Enregistrer" : "Ajouter"}
            </button>
          </div>
        </div>
      </div>
    );
  }

  const handleSave = (pos) => {
    let updated;
    if (editPos) {
      updated = positions.map(p => p.id === pos.id ? pos : p);
    } else {
      if (positions.find(p => p.symbol === pos.symbol)) { alert("Cette action est déjà dans votre portefeuille."); return; }
      updated = [...positions, pos];
    }
    setPositions(updated);
    savePositions(updated);
    fetchQuotes(updated);
    setShowForm(false);
    setEditPos(null);
  };

  const handleDelete = (id) => {
    const updated = positions.filter(p => p.id !== id);
    setPositions(updated);
    savePositions(updated);
    setQuotes(q => { const n={...q}; const sym=positions.find(p=>p.id===id)?.symbol; if(sym) delete n[sym]; return n; });
    setDeleteConfirm(null);
  };

  // ── Pull-to-refresh ────────────────────────────────────────────────────────
  const scrollRef = React.useRef(null);
  const ptrStartY = React.useRef(null);
  const ptrActive = React.useRef(false);
  const ptrPullRef = React.useRef(0);
  const [ptrPull, setPtrPull] = React.useState(0); // 0..1 progression
  const [ptrRefreshing, setPtrRefreshing] = React.useState(false);
  const [ptrDone, setPtrDone] = React.useState(false);
  const PTR_THRESHOLD = 64;
  const PTR_HOLD_HEIGHT = 58;

  const setPullProgress = React.useCallback(v => {
    ptrPullRef.current = v;
    setPtrPull(v);
  }, []);

  const runPullRefresh = React.useCallback(async () => {
    if (ptrRefreshing) return;
    setPtrDone(false);
    setPtrRefreshing(true);
    try {
      await Promise.all([
        fetchQuotes(),
        fetchEurusd(),
        fetchCac40(),
      ]);
      setPtrDone(true);
      window.setTimeout(() => setPtrDone(false), 900);
    } finally {
      setPtrRefreshing(false);
    }
  }, [ptrRefreshing, fetchQuotes, fetchEurusd, fetchCac40]);

  React.useEffect(() => {
    const el = scrollRef.current;
    if (!el) return;

    const getScroller = () => el.parentElement || el;
    const isAtTop = () => (getScroller().scrollTop || 0) <= 0;

    const handleTouchStart = e => {
      if (ptrRefreshing) return;
      if (e.touches.length !== 1 || !isAtTop()) return;
      ptrStartY.current = e.touches[0].clientY;
      ptrActive.current = true;
    };

    const handleTouchMove = e => {
      if (!ptrActive.current || ptrStartY.current === null || e.touches.length !== 1) return;
      const dy = e.touches[0].clientY - ptrStartY.current;
      if (dy <= 0) {
        ptrActive.current = false;
        setPullProgress(0);
        return;
      }
      if (!isAtTop()) return;
      e.preventDefault();
      setPullProgress(Math.min(dy / PTR_THRESHOLD, 1));
    };

    const handleTouchEnd = () => {
      if (ptrPullRef.current >= 1) {
        runPullRefresh();
      }
      ptrActive.current = false;
      ptrStartY.current = null;
      setPullProgress(0);
    };

    el.addEventListener("touchstart", handleTouchStart, { passive: true });
    el.addEventListener("touchmove", handleTouchMove, { passive: false });
    el.addEventListener("touchend", handleTouchEnd, { passive: true });
    el.addEventListener("touchcancel", handleTouchEnd, { passive: true });
    return () => {
      el.removeEventListener("touchstart", handleTouchStart);
      el.removeEventListener("touchmove", handleTouchMove);
      el.removeEventListener("touchend", handleTouchEnd);
      el.removeEventListener("touchcancel", handleTouchEnd);
    };
  }, [ptrRefreshing, runPullRefresh, setPullProgress]);

  return (
    <div
      ref={scrollRef}
      style={{ display:"flex", flexDirection:"column", minHeight:"100%", paddingBottom:80, touchAction:"pan-y" }}
    >
      {/* ── Indicateur pull-to-refresh ── */}
      {(ptrPull > 0 || ptrRefreshing || ptrDone) && (
        <div style={{
          display:"flex", justifyContent:"center", alignItems:"center", gap:8,
          height: ptrRefreshing || ptrDone ? PTR_HOLD_HEIGHT : ptrPull * PTR_THRESHOLD,
          overflow:"hidden", transition:"height 0.18s ease, opacity 0.18s ease",
          color: ptrDone ? "var(--green)" : ptrPull >= 1 ? "var(--gold)" : "var(--text-muted)",
          fontSize:12, fontWeight:700, letterSpacing:"0.02em"
        }}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
            style={{
              opacity: ptrRefreshing || ptrDone ? 1 : Math.max(ptrPull, 0.25),
              stroke: ptrDone ? "var(--green)" : ptrPull >= 1 ? "var(--gold)" : "var(--text-muted)",
              animation: ptrRefreshing ? "spin 0.8s linear infinite" : "none",
              transform: ptrRefreshing ? "none" : `rotate(${ptrPull * 360}deg)`,
              transition:"transform 0.1s, stroke 0.15s, opacity 0.15s"
            }}>
            <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
          <span>
            {ptrRefreshing ? "Mise à jour..." : ptrDone ? "Mis à jour" : ptrPull >= 1 ? "Relâcher pour rafraîchir" : "Tirer pour rafraîchir"}
          </span>
        </div>
      )}
      {saving && <div style={{ textAlign:"center", padding:"4px 0", fontSize:11, color:"var(--text-muted)" }}>Sync…</div>}
      <PageHeader title="Bourse" />

      <div style={{ padding:"16px 16px 0" }}>

        <div style={{ display:"flex", flexDirection:"column", gap:10 }}>

          {/* ── Récapitulatif portefeuille ── */}
          {positions.length > 0 && (
            <div className="fade-up" style={{ background:"var(--surface)", borderRadius:16, padding:"16px", border:"1px solid var(--border)" }}>
              <p style={{ fontSize:12, color:"var(--text-muted)", marginBottom:8, fontWeight:500, letterSpacing:"0.05em", textTransform:"uppercase" }}>Portefeuille total</p>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", marginBottom:12 }}>
                <div>
                  <p style={{ fontSize:26, fontWeight:700, letterSpacing:"-0.02em" }}>{fmtPrice(totalActuel)} <span style={{ fontSize:13, color:"var(--text-muted)", fontWeight:400 }}>Euros</span></p>
                  <p style={{ fontSize:12, color:"var(--text-muted)", marginTop:2 }}>Investi : {fmtPrice(totalAchat)}</p>
                </div>
                <div style={{ textAlign:"right" }}>
                  <p style={{ fontSize:16, fontWeight:600, color:clr(totalPV) }}>{fmtN(totalPV)} <span style={{ fontSize:13 }}>({fmtN(totalPVPct)}%)</span></p>
                  <p style={{ fontSize:12, color:clr(totalVariJour), marginTop:2 }}>Aujourd'hui : {fmtN(totalVariJour, 2)}</p>
                </div>
              </div>
              {lastRefresh && <p style={{ fontSize:11, color:"var(--text-sub)", textAlign:"right" }}>Mis à jour {lastRefresh.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})}</p>}
            </div>
          )}

          {/* ── Bouton Ajouter ── */}
          <button
            onClick={()=>{ setEditPos(null); setShowForm(true); }}
            style={{ width:"100%", padding:"8px 0", borderRadius:14, background:"var(--gold-dim)", border:"1px solid var(--gold)", color:"var(--gold)", fontSize:13, fontWeight:600, display:"flex", alignItems:"center", justifyContent:"center", gap:6, cursor:"pointer" }}
          >
            <span style={{ fontSize:16 }}>＋</span> Ajouter une position
          </button>

          {/* ── Liste des positions ── */}
          {positions.length === 0 ? (
            <div className="fade-up" style={{ textAlign:"center", padding:"60px 20px", color:"var(--text-muted)" }}>
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round" style={{ marginBottom:16, opacity:0.4 }}>
                <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>
              </svg>
              <p style={{ fontSize:16, fontWeight:600, marginBottom:6 }}>Aucune action dans votre portefeuille</p>

                      <span style={{ fontSize:12, color:"var(--text-muted)", marginLeft:8 }}>{r.nom}</span>
                      <p style={{ fontSize:11, color:"var(--text-sub)", marginTop:2 }}>{r.quantite} titre{r.quantite>1?"s":""} · Achat {fmtPrice(r.prixAchat)} {r.devise}</p>

                    <div style={{ textAlign:"right", flexShrink:0 }}>
                      <p style={{ fontSize:17, fontWeight:700 }}>{fmtPrice(r.currentPrice)}</p>

                        {r.variJourPct !== null ? `${fmtN(r.variJourPct)}% auj.` : loading ? "…" : "—"}
                      </p>
                    </div>
                  </div>

                  {/* Ligne 2 : valeur + P/V */}
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:6, marginBottom:10 }}>
                    <div style={{ background:"var(--surface2)", borderRadius:8, padding:"8px 10px" }}>
                      <p style={{ fontSize:10, color:"var(--text-muted)", marginBottom:2 }}>Valeur</p>
                      <p style={{ fontSize:13, fontWeight:600 }}>{r.valeurActuelle !== null ? fmtPrice(r.valeurActuelle) : loading ? "…" : "—"}</p>
                    </div>
                    <div style={{ background:"var(--surface2)", borderRadius:8, padding:"8px 10px" }}>
                      <p style={{ fontSize:10, color:"var(--text-muted)", marginBottom:2 }}>+/- latente</p>
                      <p style={{ fontSize:13, fontWeight:600, color:clr(r.pvLatente) }}>{r.pvLatente !== null ? fmtN(r.pvLatente) : loading ? "…" : "—"}</p>
                    </div>
                    <div style={{ background:"var(--surface2)", borderRadius:8, padding:"8px 10px" }}>
                      <p style={{ fontSize:10, color:"var(--text-muted)", marginBottom:2 }}>Perf.</p>
                      <p style={{ fontSize:13, fontWeight:600, color:clr(r.pvPct) }}>{r.pvPct !== null ? `${fmtN(r.pvPct)}%` : loading ? "…" : "—"}</p>

                  {/* Actions */}
                  <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
                    <button onClick={()=>{ setEditPos(r); setShowForm(true); }}
                      style={{ fontSize:12, padding:"5px 12px", borderRadius:20, background:"transparent", border:"1px solid var(--border)", color:"var(--text-muted)" }}>
                      Modifier
                    </button>
                    <button onClick={()=>setDeleteConfirm(r.id)}
                      style={{ fontSize:12, padding:"5px 12px", borderRadius:20, background:"transparent", border:"1px solid rgba(224,92,92,0.3)", color:"#e05c5c" }}>
                      Supprimer
                    </button>
                  </div>
                </div>
              ))}
            </>
          )}

          {/* ── Taux EUR/USD ── */}
          {store?.uiPrefs?.showEurusd !== false && (
          <div className="fade-up" style={{ background:"var(--surface)", borderRadius:16, padding:"14px 16px", border:"1px solid var(--border)", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>

              <div>
                <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:2 }}>
                  <p style={{ fontSize:11, color:"var(--text-muted)", fontWeight:500, letterSpacing:"0.05em", textTransform:"uppercase" }}>{eurToUsd ? "EUR / USD" : "USD / EUR"}</p>
                  <button
                    onClick={() => store?.saveUiPref?.('eurToUsd', !eurToUsd)}
                    title={eurToUsd ? "Afficher USD / EUR" : "Afficher EUR / USD"}
                    style={{ background:"var(--surface2)", border:"1px solid var(--border)", borderRadius:6, width:22, height:22, display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", fontSize:13, color:"var(--text-muted)", padding:0, flexShrink:0, transition:"background 0.15s, color 0.15s" }}
                    onMouseEnter={e => { e.currentTarget.style.background="var(--gold)"; e.currentTarget.style.color="#000"; }}
                    onMouseLeave={e => { e.currentTarget.style.background="var(--surface2)"; e.currentTarget.style.color="var(--text-muted)"; }}
                  >⇄</button>
                </div>
                <p style={{ fontSize:10, color:"var(--text-sub)" }}>Taux de change</p>
              </div>
            </div>
            {eurusd ? (() => {
              const displayRate = eurToUsd ? eurusd.rate : 1 / eurusd.rate;
              const displayChange = eurToUsd ? eurusd.change : -(eurusd.change / (eurusd.rate * eurusd.rate));
              const displayChangePct = eurToUsd ? eurusd.changePct : -eurusd.changePct;
              return (
                <div style={{ textAlign:"right" }}>
                  <p style={{ fontSize:22, fontWeight:700, letterSpacing:"-0.02em" }}>{displayRate.toFixed(4)}</p>
                  <p style={{ fontSize:12, fontWeight:500, color: displayChange >= 0 ? "#4caf7d" : "#e05c5c" }}>
                    {displayChange >= 0 ? "▲" : "▼"} {Math.abs(displayChange).toFixed(4)} ({displayChange >= 0 ? "+" : ""}{displayChangePct.toFixed(2)}%)
                  </p>
                </div>
              );
            })() : (
              <p style={{ fontSize:13, color:"var(--text-muted)" }}>Chargement…</p>
            )}
          </div>
          )}

          {/* ── CAC 40 ── */}
          {store?.uiPrefs?.showCac40 !== false && (
          <div className="fade-up" style={{ background:"var(--surface)", borderRadius:16, padding:"14px 16px", border:"1px solid var(--border)", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <div style={{ width:36, height:36, borderRadius:10, background:"var(--surface2)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16 }}>🇫🇷</div>
              <div>
                <p style={{ fontSize:11, color:"var(--text-muted)", fontWeight:500, letterSpacing:"0.05em", textTransform:"uppercase", marginBottom:2 }}>CAC 40</p>
                <p style={{ fontSize:10, color:"var(--text-sub)" }}>Indice Paris</p>
              </div>
            </div>
            {cac40 ? (
              <div style={{ textAlign:"right" }}>
                <p style={{ fontSize:22, fontWeight:700, letterSpacing:"-0.02em" }}>{cac40.price.toLocaleString("fr-FR", { minimumFractionDigits:2, maximumFractionDigits:2 })}</p>
                <p style={{ fontSize:12, fontWeight:500, color: cac40.change >= 0 ? "#4caf7d" : "#e05c5c" }}>
                  {cac40.change >= 0 ? "▲" : "▼"} {Math.abs(cac40.change).toLocaleString("fr-FR", { minimumFractionDigits:2, maximumFractionDigits:2 })} ({cac40.change >= 0 ? "+" : ""}{cac40.changePct.toFixed(2)}%)
                </p>
              </div>
            ) : (
              <p style={{ fontSize:13, color:"var(--text-muted)" }}>Chargement…</p>
            )}
          </div>
          )}

          <p style={{ fontSize:11, color:"var(--text-sub)", textAlign:"center", paddingBottom:6 }}>
            * Cours fournis par Yahoo Finance · Délai ~15 min · À titre indicatif<br/>
            Actions françaises : suffixe <strong>.PA</strong> (ex: MC.PA, AIR.PA) · Allemandes : <strong>.DE</strong> · Britanniques : <strong>.L</strong>
          </p>

        </div>
      </div>

      {/* Modals */}
      {(showForm || editPos) && (
        <PositionForm
          initial={editPos}
          onSave={handleSave}
          onClose={()=>{ setShowForm(false); setEditPos(null); }}
        />
      )}

      {deleteConfirm && (
        <div style={S.overlay} onClick={()=>setDeleteConfirm(null)}>
          <div onClick={e=>e.stopPropagation()} style={{ background:"var(--surface)", borderRadius:20, padding:24, width:"100%", maxWidth:340, textAlign:"center" }}>
            <p style={{ fontSize:17, fontWeight:600, marginBottom:8 }}>Supprimer cette position ?</p>
            <p style={{ fontSize:14, color:"var(--text-muted)", marginBottom:20 }}>Cette action est irréversible.</p>
            <div style={{ display:"flex", gap:10 }}>
              <button onClick={()=>setDeleteConfirm(null)} style={{ flex:1, padding:"11px 0", borderRadius:12, background:"var(--surface2)", border:"1px solid var(--border)", color:"var(--text-muted)", fontWeight:600 }}>Annuler</button>
              <button onClick={()=>handleDelete(deleteConfirm)} style={{ flex:1, padding:"11px 0", borderRadius:12, background:"rgba(224,92,92,0.15)", border:"1px solid #e05c5c", color:"#e05c5c", fontWeight:600 }}>Supprimer</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── TxRow ─────────────────────────────────────────────────────────────────
function TxRow({ tx, deletable, onDelete, onEdit, onTogglePointed, clicked, onToggleClicked, delay=0, isCard=false, displayDate=null, accountName=null }) {
  const handleTogglePointed = (e) => {
    e.stopPropagation();
    onTogglePointed();
    onToggleClicked && onToggleClicked(null);
  };
  return (
    <div className="slide-in" onClick={()=>deletable&&onToggleClicked&&onToggleClicked(tx.id)}
      style={{ display:"flex", alignItems:"center", gap:12, padding:"12px 16px", background:clicked?"rgba(128,128,128,0.04)":"transparent", transition:"background 0.15s", animationDelay:`${delay}s`, cursor:deletable?"pointer":"default" }}>
      <div style={{ width:38,height:38, borderRadius:10, flexShrink:0, background:tx.type==="expense"?"var(--red-dim)":"var(--green-dim)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, position:"relative" }}>
        {tx.type==="expense"?"↑":"↓"}
        {tx.pointed && <div style={{ position:"absolute", top:-2, right:-2, width:14, height:14, borderRadius:"50%", background:"var(--gold)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, border:"2px solid var(--bg)" }}>✓</div>}
      </div>
      <div style={S.flex1MinW0}>
        <p style={{ fontSize:14, fontWeight:500, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
          {tx.title}
          {(tx.isCard || isCard) && <span style={{ marginLeft:6, fontSize:10, color:"var(--gold)", background:"rgba(201,168,76,0.12)", padding:"1px 5px", borderRadius:4, fontWeight:600, border:"1px solid rgba(201,168,76,0.25)" }}>💳 carte</span>}
          {tx._transferFrom && <span style={{ marginLeft:6, fontSize:10, color:"var(--green)", background:"var(--green-dim)", padding:"1px 5px", borderRadius:4, fontWeight:600 }}>→ report</span>}
          {tx._virementId && <span style={{ marginLeft:6, fontSize:10, color:"var(--text-muted)", background:"var(--surface3)", padding:"1px 5px", borderRadius:4, fontWeight:600 }}>⇄ virement</span>}
          {tx._tpl && !tx.pointed && <span style={{ marginLeft:6, fontSize:10, color:"var(--gold)", background:"var(--gold-dim)", padding:"1px 5px", borderRadius:4, fontWeight:600 }}>modèle</span>}
        </p>
        <p style={{ fontSize:11, color:"var(--text-sub)", marginTop:1 }}>
          {fmtDate(displayDate || tx.date)}
          {accountName && <span style={{ marginLeft:6, fontSize:10, color:"var(--text-muted)", background:"var(--surface3)", padding:"1px 5px", borderRadius:4, fontWeight:500 }}>{accountName}</span>}
        </p>
      </div>
      <p style={{ fontSize:15, fontWeight:700, flexShrink:0, color:tx.type==="expense"?"var(--red)":"var(--green)" }}>
        {tx.type==="expense"?"−":"+"}{fmtEur(tx.amount)}
      </p>
      {deletable && clicked && (
        <>
          {onTogglePointed && <button onClick={handleTogglePointed} style={{ background:tx.pointed?"var(--gold)":"var(--gold-dim)", border:"none", borderRadius:8, width:28,height:28, display:"flex", alignItems:"center", justifyContent:"center", color:tx.pointed?"#0e0f13":"var(--gold)", fontSize:14, flexShrink:0, fontWeight:700 }}>✓</button>}
          {onEdit          && <button onClick={e=>{e.stopPropagation();onEdit();}}   style={{ background:"var(--gold-dim)", border:"none", borderRadius:8, width:28,height:28, display:"flex", alignItems:"center", justifyContent:"center", color:"var(--gold)", fontSize:14, flexShrink:0 }}>✎</button>}
          <button onClick={e=>{e.stopPropagation();onDelete();}} style={{ background:"var(--red-dim)", border:"none", borderRadius:8, width:28,height:28, display:"flex", alignItems:"center", justifyContent:"center", color:"var(--red)", fontSize:14, flexShrink:0 }}>✕</button>
        </>
      )}
    </div>
  );
}

// ─── DeleteModal ───────────────────────────────────────────────────────────

// ─── CardPanel ─────────────────────────────────────────────────────────────
function CardPanel({ account, sel, cardTxM, cardTotal, cardDebitDate, isDebitNextMonth, debitMonthName, store, onAddCard, onEditTx, onDeleteTx, clickedTxId, setClickedTxId }) {
  const [editingDate, setEditingDate] = useState(false);
  const [draftDate,   setDraftDate]   = useState(cardDebitDate || "");
  const [showAllCard, setShowAllCard] = useState(false);
  const CARD_LIMIT = 1000;

  // Sync draft when month changes
  useEffect(() => {
    setDraftDate(cardDebitDate || "");
    setEditingDate(false);
  }, [sel, account.id, cardDebitDate]);

  const commitDate = () => {
    if (draftDate) {
      store.setCardDebitDate(account.id, sel, draftDate);
    } else {
      store.clearCardDebitDate(account.id, sel);
    }
    setEditingDate(false);
  };

  const monthLabel = new Date(sel + "-02T00:00:00").toLocaleDateString("fr-FR", { month: "long", year: "numeric" });

  return (
    <div className="fade-up" style={{ background:"var(--surface)", border:"1px solid rgba(201,168,76,0.3)", borderRadius:"var(--radius)", overflow:"hidden" }}>
      {/* Header */}
      <div style={{ display:"flex", alignItems:"center", gap:10, padding:"12px 16px", background:"linear-gradient(90deg, rgba(201,168,76,0.08), transparent)", borderBottom:"1px solid rgba(201,168,76,0.15)" }}>
        <span style={{ fontSize:20 }}>💳</span>
        <div style={S.flex1}>
          <p style={{ fontSize:13, fontWeight:700, color:"var(--gold)" }}>{account.cardName}</p>
          <p style={{ fontSize:11, color:"var(--text-muted)" }}>Carte à débit différé · {monthLabel}</p>
        </div>
        {cardTotal > 0 && (
          <div style={{ textAlign:"right" }}>
            <p style={{ fontSize:16, fontWeight:700, color:"var(--red)", fontFamily:"'DM Serif Display',serif" }}>−{fmtEur(cardTotal)}</p>
            <p style={{ fontSize:10, color:"var(--text-muted)" }}>{cardTxM.length} dépense{cardTxM.length>1?"s":""}</p>
          </div>
        )}
      </div>

      {/* Debit date row */}
      <div style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 16px", borderBottom:"1px solid var(--border)", background: isDebitNextMonth ? "rgba(224,92,92,0.04)" : "transparent" }}>
        <span style={S.fs14shrink0}>{isDebitNextMonth ? "⚠️" : "📅"}</span>
        <div style={S.flex1}>
          {editingDate ? (
            <div style={S.flexRow8}>
              <input
                type="date"
                value={draftDate}
                onChange={e => setDraftDate(e.target.value)}
                style={{ fontSize:13, padding:"4px 8px", borderRadius:6, border:"1px solid var(--gold)", background:"var(--surface2)", color:"var(--text)", colorScheme:"var(--colorscheme)" }}
              />
              <button onClick={commitDate} style={{ padding:"4px 10px", borderRadius:6, background:"var(--gold)", border:"none", color:"#0e0f13", fontSize:12, fontWeight:700 }}>✓</button>
              <button onClick={()=>setEditingDate(false)} style={{ padding:"4px 8px", borderRadius:6, background:"var(--surface2)", border:"1px solid var(--border)", color:"var(--text-muted)", fontSize:12 }}>✕</button>
            </div>
          ) : (
            <div>
              {cardDebitDate ? (
                <span style={{ fontSize:12, color: isDebitNextMonth ? "var(--red)" : "var(--text-muted)" }}>
                  Prélèvement prévu le <strong style={{ color: isDebitNextMonth ? "var(--red)" : "var(--text)" }}>{fmtDate(cardDebitDate)}</strong>

                </span>
              ) : (
                <span style={{ fontSize:12, color:"var(--text-sub)", fontStyle:"italic" }}>Date de prélèvement non définie</span>
              )}
            </div>
          )}
        </div>
        {!editingDate && (
          <button onClick={()=>{ setDraftDate(cardDebitDate||""); setEditingDate(true); }}
            style={{ padding:"4px 10px", borderRadius:6, background:"var(--gold-dim)", border:"1px solid rgba(201,168,76,0.3)", color:"var(--gold)", fontSize:11, fontWeight:600, flexShrink:0 }}>
            {cardDebitDate ? "✎ Modifier" : "+ Définir"}
          </button>
        )}
      </div>

      {/* Card transactions */}
      {cardTxM.length > 0 && (() => {
        const unpointed = cardTxM.filter(t => !t.pointed);
        const pointed   = cardTxM.filter(t =>  t.pointed);
        const visible   = showAllCard ? cardTxM : unpointed.slice(0, CARD_LIMIT);
        return (
          <div>
            {visible.map((tx, i) => (
              <div key={tx.id}>
                {i > 0 && <div style={{ height:1, background:"var(--border)", margin:"0 16px" }} />}
                <TxRow
                  tx={tx}
                  deletable
                  clicked={clickedTxId === tx.id}
                  onToggleClicked={id => setClickedTxId(clickedTxId === id ? null : id)}
                  onDelete={() => onDeleteTx(tx)}
                  onEdit={() => onEditTx(tx)}
                  onTogglePointed={() => store.togglePointed(tx.id)}
                  delay={i * 0.03}
                  isCard
                />
              </div>
            ))}
            {pointed.length > 0 && (
              <button onClick={() => setShowAllCard(p => !p)}
                style={{ width:"100%", padding:"9px 16px", background:"var(--surface2)", border:"none", borderTop:"1px solid var(--border)", color:"var(--text-muted)", fontSize:12, fontWeight:600, cursor:"pointer", textAlign:"center" }}>
                {showAllCard ? "▲ Voir moins" : `▼ Voir les ${pointed.length} autre${pointed.length > 1 ? "s" : ""} dépense${pointed.length > 1 ? "s" : ""}`}
              </button>
            )}
          </div>
        );
      })()}

      {/* Empty state */}
      {cardTxM.length === 0 && (
        <div style={{ padding:"16px", textAlign:"center" }}>
          <p style={{ fontSize:12, color:"var(--text-sub)" }}>Aucune dépense carte ce mois-ci</p>
        </div>
      )}

      {/* Add button */}
      <div style={{ padding:"10px 16px 14px", borderTop: cardTxM.length > 0 ? "1px solid var(--border)" : "none" }}>
        <button onClick={onAddCard} style={{ width:"100%", padding:"9px", borderRadius:"var(--radius-sm)", background:"rgba(201,168,76,0.06)", border:"1px dashed rgba(201,168,76,0.4)", color:"var(--gold)", fontSize:13, fontWeight:600, display:"flex", alignItems:"center", justifyContent:"center", gap:6 }}>
          <span style={{ fontSize:15 }}>＋</span> Dépense carte
        </button>
      </div>
    </div>
  );
}

// Compute carry-over balance for a given month: sum up from all previous months
// carryover = allotment(prev months) - expenses(prev months), propagated
function computeCarryOver(benefitAcct, upToMonthKey) {
  // Collect all month keys in benefitAcct that are strictly before upToMonthKey
  const allMonths = new Set([
    ...Object.keys(benefitAcct.allotments || {}),
    ...(benefitAcct.expenses || []).map(e => mKey(e.date)),
  ]);
  const pastMonths = [...allMonths].filter(mk => mk < upToMonthKey).sort();
  let carry = 0;
  for (const mk of pastMonths) {
    const all = allotmentAmount(benefitAcct.allotments?.[mk]);
    const exp = (benefitAcct.expenses || []).filter(e => mKey(e.date) === mk).reduce((s,e) => s + e.amount, 0);
    carry = carry + all - exp;
    if (carry < 0) carry = 0; // can't carry negative balance
  }
  return carry;
}

function BenefitPage({ store, account, onClose }) {
  const [sel,          setSel]          = useState(nowMKey());
  const [editAllotment,setEditAllotment]= useState(false);
  const [draftMode,    setDraftMode]    = useState("units");
  const [draftAmount,  setDraftAmount]  = useState("");
  const [draftCount,   setDraftCount]   = useState("");
  const [draftUnit,    setDraftUnit]    = useState("");
  const [addingExp,    setAddingExp]    = useState(false);
  const [expTitle,     setExpTitle]     = useState("");
  const [expAmount,    setExpAmount]    = useState("");
  const [expDate,      setExpDate]      = useState(() => new Date().toISOString().split("T")[0]);
  const [editingExp,   setEditingExp]   = useState(null); // expense id being edited
  const [deletingExp,  setDeletingExp]  = useState(null);

  const benefitAcct = store.benefitData[account.id] || { allotments: {}, expenses: [] };
  const allotment   = benefitAcct.allotments?.[sel];
  const allotted    = allotmentAmount(allotment);
  const carryOver   = computeCarryOver(benefitAcct, sel);
  const monthExp    = (benefitAcct.expenses || []).filter(e => mKey(e.date) === sel).sort((a,b)=>b.date.localeCompare(a.date));
  const totalExp    = monthExp.reduce((s,e) => s + e.amount, 0);
  const available   = carryOver + allotted - totalExp;

  // Build month list: past months with remaining data + current + next 2
  const months = useMemo(() => {
    const today = new Date();
    const Y = today.getFullYear(), M = today.getMonth();
    const fmt = (y,m) => `${y}-${String(m+1).padStart(2,'0')}`;
    const currentKey = fmt(Y, M);
    // Past months that still have real expenses or real allotments.
    // Synthetic carry-over entries (_isCarryOver: true) are excluded so they don't
    // appear as navigable months after a cleanup.
    const pastWithData = new Set();
    (benefitAcct.expenses || []).forEach(e => {
      const mk = mKey(e.date);
      if (mk < currentKey) pastWithData.add(mk);
    });
    Object.keys(benefitAcct.allotments || {}).forEach(mk => {
      if (mk < currentKey && !benefitAcct.allotments[mk]?._isCarryOver) pastWithData.add(mk);
    });
    const result = [...pastWithData].sort();
    result.push(fmt(Y, M));
    for (let i = 1; i <= 2; i++) {
      const d = new Date(Y, M + i, 1);
      result.push(fmt(d.getFullYear(), d.getMonth()));
    }
    return result;
  }, [benefitAcct.expenses, benefitAcct.allotments]);

  const openAllotmentEdit = () => {
    setDraftMode(allotment?.mode || "units");
    setDraftAmount(allotment?.mode === "amount" ? String(allotment.amount || "") : "");
    setDraftCount(allotment?.mode === "units" ? String(allotment.count || "") : "");
    setDraftUnit(allotment?.mode === "units"
      ? String(allotment.unitValue || "")
      : String(account.defaultUnitValue || ""));
    setEditAllotment(true);
  };

  const saveAllotment = () => {
    if (draftMode === "amount") {
      const v = parseFloat(draftAmount.replace(",","."));
      if (isNaN(v) || v <= 0) return;
      store.setBenefitAllotment(account.id, sel, { mode:"amount", amount: Math.round(v*100)/100 });
    } else {
      const c = parseFloat(draftCount.replace(",","."));
      const u = parseFloat(draftUnit.replace(",","."));
      if (isNaN(c) || isNaN(u) || c <= 0 || u <= 0) return;
      store.setBenefitAllotment(account.id, sel, { mode:"units", count: Math.round(c*100)/100, unitValue: Math.round(u*100)/100 });
    }
    setEditAllotment(false);
  };

  const saveExpense = () => {
    const v = parseFloat(expAmount.replace(",","."));
    if (!expTitle.trim() || isNaN(v) || v <= 0 || !expDate) return;

    if (editingExp) {
      // Edition : mise à jour simple, pas de recalcul du split
      store.updateBenefitExpense(account.id, editingExp, { title: expTitle.trim(), amount: Math.round(v*100)/100, date: expDate });
      setEditingExp(null);
    } else {
      // Nouvelle dépense : calcul du split TR / carte
      const dailyCap         = account.dailyCap || 0;
      const overflowAcctId   = account.overflowAccountId || "";
      const overflowAcct     = overflowAcctId ? store.accounts.find(a => a.id === overflowAcctId) : null;
      const hasSplit         = dailyCap > 0 && overflowAcct;

      // Solde disponible à ce moment (report + dotation − dépenses du mois sauf ce jour)
      const solde = available; // already computed in component scope

      // Calcul de la part TR
      let partTR = Math.round(v * 100) / 100;
      let partCarte = 0;

      if (hasSplit) {
        // Dépenses TR déjà saisies ce jour → plafond restant
        const alreadyToday = (benefitAcct.expenses || [])
          .filter(e => e.date === expDate)
          .reduce((s, e) => s + e.amount, 0);
        const capRestant = Math.max(0, Math.round((dailyCap - alreadyToday) * 100) / 100);

        // La part TR est limitée par le plafond restant ET le solde disponible
        partTR    = Math.round(Math.min(v, capRestant, Math.max(0, solde)) * 100) / 100;
        partCarte = Math.round((v - partTR) * 100) / 100;
      } else {
        // Pas de split configuré : on plafonne quand même au solde si positif
        partTR    = Math.round(Math.min(v, Math.max(0, solde > 0 ? v : 0)) * 100) / 100;
        // Si le solde est insuffisant sans compte de report, on laisse passer quand même (solde négatif)
        partTR    = Math.round(v * 100) / 100;
        partCarte = 0;
      }

      // Enregistrement TR
      if (partTR > 0) {
        store.addBenefitExpense(account.id, { title: expTitle.trim(), amount: partTR, date: expDate, _checked: true });
      }
      // Enregistrement carte (transaction isCard sur le compte de report)
      if (partCarte > 0 && overflowAcct) {
        store.add({ title: expTitle.trim(), amount: partCarte, type: "expense", date: expDate, accountId: overflowAcctId, isCard: !!overflowAcct.cardName, pointed: false });
      }
    }

    setExpTitle(""); setExpAmount(""); setExpDate(new Date().toISOString().split("T")[0]);
    setAddingExp(false);
  };

  const openEditExp = (exp) => {
    setEditingExp(exp.id);
    setExpTitle(exp.title);
    setExpAmount(String(exp.amount));
    setExpDate(exp.date);
    setAddingExp(true);
  };

  const monthLabel = mk => new Date(mk+"-02T00:00:00").toLocaleDateString("fr-FR",{month:"short",year:"2-digit"});

  return (
    <div>
        {/* Header */}
        <div style={{ position:"sticky", top:0, zIndex:50, display:"flex", alignItems:"center", gap:12, padding:"8px 16px", borderBottom:"1px solid var(--border)", background:"var(--header-bg)", backdropFilter:"blur(20px)", flexShrink:0 }}>
          <button onClick={onClose} style={{ background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:8, padding:"4px 10px", height:30, color:"var(--header-muted)", fontSize:13, fontWeight:500, display:"flex", alignItems:"center", justifyContent:"center", gap:4, flexShrink:0 }}>← Retour</button>
          <span style={{ fontSize:20 }}>🎫</span>
          <div style={S.flex1}>
            <p style={{ fontSize:18, fontWeight:700, color:"var(--header-text)", fontFamily:"'DM Serif Display',serif", letterSpacing:"-0.02em" }}>{account.name}</p>
          </div>
        </div>

        {/* Month tabs */}
        <div style={{ display:"flex", gap:6, overflowX:"auto", padding:"12px 16px 6px" }} className="scroll-row">
          {months.map(mk=>(
            <button key={mk} onClick={()=>{setSel(mk);setEditAllotment(false);setAddingExp(false);}}
              style={{ flexShrink:0, padding:"6px 14px", borderRadius:20, border:"1px solid", borderColor:sel===mk?"var(--gold)":"var(--border)", background:sel===mk?"var(--gold-dim)":"var(--surface2)", color:sel===mk?"var(--gold)":"var(--text-muted)", fontSize:13, fontWeight:600, transition:"all 0.2s" }}>
              {monthLabel(mk)}
            </button>
          ))}
        </div>

        {/* Body */}
        <div style={{ padding:"12px 16px 24px", display:"flex", flexDirection:"column", gap:12 }}>

          {/* Balance card */}
          <div style={{ background: available >= 0 ? "linear-gradient(135deg,#1e2a1e,#162216)" : "linear-gradient(135deg,#2a1e1e,#221616)", border:`1px solid ${available>=0?"rgba(76,175,130,0.3)":"rgba(224,92,92,0.3)"}`, borderRadius:"var(--radius)", padding:"16px" }}>
            <p style={{ fontSize:11, fontWeight:500, color:"rgba(240,236,228,0.5)", letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:6 }}>Solde disponible</p>
            <p style={{ fontFamily:"'DM Serif Display',serif", fontSize:32, color:available>=0?"#4caf82":"#e05c5c", letterSpacing:"-0.02em" }}>{fmtEur(available)}</p>
            <div style={{ display:"flex", gap:16, marginTop:10, flexWrap:"wrap" }}>
              {carryOver > 0 && <span style={{ fontSize:11, color:"rgba(240,236,228,0.5)" }}>↩ Report {fmtEur(carryOver)}</span>}
              {allotted > 0  && <span style={{ fontSize:11, color:"rgba(240,236,228,0.5)" }}>+ Dotation {fmtEur(allotted)}</span>}
              {totalExp > 0  && <span style={{ fontSize:11, color:"rgba(240,236,228,0.5)" }}>− Dépensé {fmtEur(totalExp)}</span>}
            </div>
          </div>

          {/* Dotation section */}
          <div style={{ background:"var(--surface2)", borderRadius:"var(--radius-sm)", overflow:"hidden" }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"12px 14px", borderBottom: editAllotment ? "1px solid var(--border)" : "none" }}>
              <div>
                <p style={S.fs13fw600}>Dotation du mois</p>
                {allotment ? (
                  <p style={{ fontSize:11, color:"var(--text-muted)", marginTop:2 }}>
                    {allotment.mode === "units"
                      ? `${allotment.count} × ${fmtEur(allotment.unitValue)} = ${fmtEur(allotted)}`
                      : fmtEur(allotted)}
                  </p>
                ) : (
                  <p style={{ fontSize:11, color:"var(--text-sub)", marginTop:2, fontStyle:"italic" }}>Non définie</p>
                )}
              </div>
              {!editAllotment && (
                <button onClick={openAllotmentEdit}
                  style={{ padding:"5px 12px", borderRadius:8, background:"var(--gold-dim)", border:"1px solid rgba(201,168,76,0.3)", color:"var(--gold)", fontSize:12, fontWeight:600 }}>
                  {allotment ? "✎ Modifier" : "+ Définir"}
                </button>
              )}
            </div>

            {editAllotment && (
              <div style={{ padding:"12px 14px", display:"flex", flexDirection:"column", gap:10 }}>
                {/* Mode toggle */}
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:6 }}>
                  {[["units","Titres × valeur"],["amount","Montant fixe"]].map(([m,l])=>(
                    <button key={m} onClick={()=>setDraftMode(m)}
                      style={{ padding:"8px", borderRadius:8, border:"1px solid", borderColor:draftMode===m?"var(--gold)":"var(--border)", background:draftMode===m?"var(--gold-dim)":"var(--bg)", color:draftMode===m?"var(--gold)":"var(--text-muted)", fontSize:12, fontWeight:600 }}>{l}</button>
                  ))}
                </div>
                {draftMode === "units" ? (
                  <div style={S.grid2col8}>
                    <div>
                      <label style={{ fontSize:10, fontWeight:600, color:"var(--text-sub)", textTransform:"uppercase", letterSpacing:"0.06em", display:"block", marginBottom:4 }}>Nb de titres</label>
                      <input type="number" step="1" min="0" value={draftCount} onChange={e=>setDraftCount(e.target.value)} placeholder="20" inputMode="decimal"
                        style={{ width:"100%", fontSize:14, padding:"8px 10px", background:"var(--bg)", border:"1px solid var(--border)", borderRadius:8, color:"var(--text)" }} />
                    </div>
                    <div>
                      <label style={{ fontSize:10, fontWeight:600, color:"var(--text-sub)", textTransform:"uppercase", letterSpacing:"0.06em", display:"block", marginBottom:4 }}>Valeur unitaire (€)</label>
                      <input type="number" step="0.01" min="0" value={draftUnit} onChange={e=>setDraftUnit(e.target.value)} placeholder="9.25" inputMode="decimal"
                        style={{ width:"100%", fontSize:14, padding:"8px 10px", background:"var(--bg)", border:"1px solid var(--border)", borderRadius:8, color:"var(--text)" }} />
                    </div>
                  </div>
                ) : (
                  <div>
                    <label style={{ fontSize:10, fontWeight:600, color:"var(--text-sub)", textTransform:"uppercase", letterSpacing:"0.06em", display:"block", marginBottom:4 }}>Montant (€)</label>
                    <input type="number" step="0.01" min="0" value={draftAmount} onChange={e=>setDraftAmount(e.target.value)} placeholder="185.00" inputMode="decimal"
                      style={{ width:"100%", fontSize:14, padding:"8px 10px", background:"var(--bg)", border:"1px solid var(--border)", borderRadius:8, color:"var(--text)" }} />
                  </div>
                )}
                {draftMode === "units" && draftCount && draftUnit && !isNaN(parseFloat(draftCount)) && !isNaN(parseFloat(draftUnit)) && (
                  <p style={{ fontSize:12, color:"var(--gold)", fontWeight:600 }}>= {fmtEur(parseFloat(draftCount)*parseFloat(draftUnit))}</p>
                )}
                <div style={{ display:"flex", gap:8 }}>
                  <button onClick={saveAllotment} style={{ flex:2, padding:"9px", borderRadius:8, background:"linear-gradient(135deg,var(--gold-light),var(--gold))", border:"none", color:"#0e0f13", fontSize:13, fontWeight:700 }}>✓ Enregistrer</button>
                  <button onClick={()=>setEditAllotment(false)} style={{ flex:1, padding:"9px", borderRadius:8, background:"var(--surface3)", border:"1px solid var(--border)", color:"var(--text-muted)", fontSize:13 }}>Annuler</button>
                  {allotment && <button onClick={()=>{store.clearBenefitAllotment(account.id,sel);setEditAllotment(false);}} style={{ padding:"9px 12px", borderRadius:8, background:"var(--red-dim)", border:"1px solid var(--red)", color:"var(--red)", fontSize:13 }}>✕</button>}
                </div>
              </div>
            )}
          </div>

          {/* Expenses section */}
          <div style={{ background:"var(--surface2)", borderRadius:"var(--radius-sm)", overflow:"hidden" }}>
            <div style={{ padding:"12px 14px", borderBottom:"1px solid var(--border)" }}>
              <p style={S.fs13fw600}>Dépenses du mois</p>
            </div>

            {monthExp.length === 0 && !addingExp && (
              <div style={{ padding:"16px", textAlign:"center" }}>
                <p style={{ fontSize:12, color:"var(--text-sub)", fontStyle:"italic" }}>Aucune dépense ce mois-ci</p>
              </div>
            )}

            {monthExp.map((exp, i) => (
              <div key={exp.id}>
                {i > 0 && <div style={{ height:1, background:"var(--border)", margin:"0 14px" }} />}
                <div style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 14px" }}>
                  <div style={{ width:32, height:32, borderRadius:8, background:"var(--red-dim)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:14, flexShrink:0 }}>↑</div>
                  <div style={S.flex1MinW0}>
                    <p style={{ fontSize:13, fontWeight:500, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{exp.title}</p>
                    <p style={{ fontSize:11, color:"var(--text-sub)" }}>{fmtDate(exp.date)}</p>
                  </div>
                  <p style={{ fontSize:14, fontWeight:700, color:"var(--red)", flexShrink:0 }}>−{fmtEur(exp.amount)}</p>
                  <button onClick={()=>openEditExp(exp)} style={{ background:"var(--gold-dim)", border:"none", borderRadius:7, width:26, height:26, display:"flex", alignItems:"center", justifyContent:"center", color:"var(--gold)", fontSize:13, flexShrink:0 }}>✎</button>
                  <button onClick={()=>setDeletingExp(exp)} style={{ background:"var(--red-dim)", border:"none", borderRadius:7, width:26, height:26, display:"flex", alignItems:"center", justifyContent:"center", color:"var(--red)", fontSize:13, flexShrink:0 }}>✕</button>
                </div>
              </div>
            ))}

            {/* Add/Edit expense form */}
            {addingExp && (
              <div style={{ padding:"12px 14px", borderTop: monthExp.length > 0 ? "1px solid var(--border)" : "none", display:"flex", flexDirection:"column", gap:8 }}>
                <input value={expTitle} onChange={e=>setExpTitle(e.target.value)} placeholder="Intitulé (ex: Boulangerie)"
                  style={{ fontSize:14, padding:"8px 10px", background:"var(--bg)", border:"1px solid var(--border)", borderRadius:8, color:"var(--text)" }} />
                <div style={S.grid2col8}>
                  <input type="number" step="0.01" min="0" value={expAmount} onChange={e=>setExpAmount(e.target.value)} placeholder="Montant (€)" inputMode="decimal"
                    style={{ fontSize:14, padding:"8px 10px", background:"var(--bg)", border:"1px solid var(--border)", borderRadius:8, color:"var(--text)" }} />
                  <input type="date" value={expDate} onChange={e=>setExpDate(e.target.value)}
                    style={{ fontSize:13, padding:"8px 10px", background:"var(--bg)", border:"1px solid var(--border)", borderRadius:8, color:"var(--text)", colorScheme:"var(--colorscheme)" }} />
                </div>
                {/* Split preview — affiché uniquement en création, si plafond + compte de report configurés */}
                {!editingExp && (() => {
                  const v = parseFloat(expAmount.replace(",","."));
                  const dailyCap = account.dailyCap || 0;
                  const overflowAcct = account.overflowAccountId ? store.accounts.find(a => a.id === account.overflowAccountId) : null;
                  if (!dailyCap || !overflowAcct || isNaN(v) || v <= 0) return null;
                  const alreadyToday = (benefitAcct.expenses || []).filter(e => e.date === expDate).reduce((s,e) => s + e.amount, 0);
                  const capRestant = Math.max(0, Math.round((dailyCap - alreadyToday) * 100) / 100);
                  const partTR    = Math.round(Math.min(v, capRestant, Math.max(0, available)) * 100) / 100;
                  const partCarte = Math.round((v - partTR) * 100) / 100;
                  if (partCarte <= 0) return null;
                  return (
                    <div style={{ display:"flex", flexDirection:"column", gap:4, padding:"8px 10px", background:"rgba(201,168,76,0.07)", border:"1px solid rgba(201,168,76,0.25)", borderRadius:8 }}>
                      <p style={{ fontSize:11, fontWeight:700, color:"var(--gold)", letterSpacing:"0.04em", textTransform:"uppercase" }}>Répartition automatique</p>
                      <div style={{ display:"flex", justifyContent:"space-between" }}>
                        <span style={{ fontSize:12, color:"var(--text-muted)" }}>🎫 Ticket Restaurant</span>
                        <span style={{ fontSize:12, fontWeight:700, color:"var(--green)" }}>{fmtEur(partTR)}</span>
                      </div>
                      <div style={{ display:"flex", justifyContent:"space-between" }}>
                        <span style={{ fontSize:12, color:"var(--text-muted)" }}>💳 {overflowAcct.name}</span>
                        <span style={{ fontSize:12, fontWeight:700, color:"var(--red)" }}>{fmtEur(partCarte)}</span>
                      </div>
                    </div>
                  );
